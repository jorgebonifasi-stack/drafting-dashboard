<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;
    const {
      BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
      ComposedChart, LineChart, Line, ReferenceLine, ReferenceArea, Legend, Cell,
      CartesianGrid, LabelList, Label, Customized
    } = Recharts;

    // ─── colour tokens ──────────────────────────────────────────
    const C = {
      bg:"#1a1a1a", bgDarker:"#111", surface:"#242424",
      text:"#CCCCCC", white:"#FFFFFF", grid:"#444444",
      green:"#27AE60", red:"#E74C3C", amber:"#F39C12",
      blue:"#5DADE2", blueFaded:"rgba(93,173,226,0.22)",
      accent:"#3498DB", border:"#333",
    };

    // ─── Saturday-anchored week helpers ─────────────────────────
    // Week starts on Saturday and runs through the following Friday.
    // Anchored to 30 May 2026 (a Saturday) per Ops decision; every prior
    // and future week aligns to that grid. WoW bucket keys are the
    // Saturday's local date in YYYY-MM-DD form, which avoids the
    // ambiguity of ISO week numbers under a non-Mon-Sun scheme.
    //
    // JS Date.getDay() values: Sun=0, Mon=1, Tue=2, Wed=3, Thu=4, Fri=5, Sat=6.
    // To get the Saturday on-or-before any date, subtract:
    //   Sat (6) → 0    (today is already Saturday)
    //   Sun (0) → 1
    //   Mon (1) → 2
    //   ...
    //   Fri (5) → 6
    // i.e. offset = (dow + 1) % 7
    function saturdayOfWeek(d){
      const local=new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0);
      const dow=local.getDay();
      const offset=(dow+1)%7;
      local.setDate(local.getDate()-offset);
      return local;
    }

    // ─── date bucket helpers ────────────────────────────────────
    function dateToBucket(d,gran){
      if(!d)return null;
      if(gran==="DoD") {
        // Use LOCAL Y/M/D — parseHSDate now anchors date-only values to
        // local midnight, so the bucket key must follow the same convention.
        // toISOString() would shift to UTC and produce off-by-one days for
        // viewers in positive-offset timezones (e.g. UK BST mid-summer).
        const y=d.getFullYear();
        const m=String(d.getMonth()+1).padStart(2,"0");
        const day=String(d.getDate()).padStart(2,"0");
        return `${y}-${m}-${day}`;
      }
      if(gran==="WoW"){
        // Saturday-anchored week. Bucket key = Saturday's local date.
        const sat=saturdayOfWeek(d);
        const y=sat.getFullYear();
        const m=String(sat.getMonth()+1).padStart(2,"0");
        const day=String(sat.getDate()).padStart(2,"0");
        return `${y}-${m}-${day}`;
      }
      return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }
    function bucketLabel(bucket,gran){
      const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      if(gran==="DoD"){
        const d=new Date(bucket+"T00:00:00");
        const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        return`${days[d.getDay()]} ${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
      }
      if(gran==="WoW"){
        // bucket = Saturday's date "YYYY-MM-DD". Label shows the Saturday
        // since that's the start day under the Sat-Fri scheme.
        const[y,m,d]=bucket.split("-").map(Number);
        return `Wk of ${String(d).padStart(2,"0")} ${months[m-1]}`;
      }
      const[y,m]=bucket.split("-");
      return`${months[parseInt(m)-1]} ${y}`;
    }
    function bucketEndDate(bucket,gran){
      if(gran==="DoD")return new Date(bucket+"T23:59:59.999");
      if(gran==="WoW"){
        // Saturday + 6 days = the following Friday, end of day.
        const[y,m,d]=bucket.split("-").map(Number);
        return new Date(y,m-1,d+6,23,59,59,999);
      }
      const[y,m]=bucket.split("-");
      return new Date(parseInt(y),parseInt(m),0,23,59,59,999);
    }
    // Start date of a bucket, in UTC, for cutover comparisons.
    function bucketStartDate(bucket,gran){
      if(gran==="DoD")return new Date(bucket+"T00:00:00Z");
      if(gran==="WoW"){
        // Saturday at UTC midnight. Used vs UTC CUTOVER_DATE constants.
        const[y,m,d]=bucket.split("-").map(Number);
        return new Date(Date.UTC(y,m-1,d));
      }
      const[y,m]=bucket.split("-");
      return new Date(Date.UTC(parseInt(y),parseInt(m)-1,1));
    }
    // 00:00 LOCAL of the last day in the bucket. Used by the Pipeline Flow
    // chart so backlog is sampled at one consistent "midnight" reading per
    // bucket (matching how a daily backlog snapshot job would log it).
    function bucketLastMidnight(bucket,gran){
      if(gran==="DoD"){
        const[y,m,d]=bucket.split("-").map(Number);
        return new Date(y,m-1,d,0,0,0,0);
      }
      if(gran==="WoW"){
        // Friday (Saturday + 6) at local midnight.
        const[y,m,d]=bucket.split("-").map(Number);
        return new Date(y,m-1,d+6,0,0,0,0);
      }
      const[y,m]=bucket.split("-").map(Number);
      // Day 0 of next month = last day of current month, in local time
      return new Date(y,m,0,0,0,0,0);
    }

    // ─── parse HubSpot timestamp ────────────────────────────────
    // HubSpot serialises "date" fields (date_of_appointment, original_date_
    // entered_*, etc.) as a Unix millisecond timestamp pinned to UTC
    // midnight. JS Date is timezone-aware, so a UTC-midnight value reads
    // as the PREVIOUS calendar day in any browser running in a negative-
    // offset timezone (e.g. US users see "24 Apr" for a UK 25 Apr
    // appointment, and the working-day calc shifts by one too — leading
    // to deals showing as Breached for one viewer and Met for another).
    //
    // Fix: when we detect "exact UTC midnight" (the date-only signature),
    // re-anchor the Date to LOCAL midnight on the same calendar day. That
    // makes the calendar date timezone-stable across viewers without
    // requiring a timezone library or rewriting every downstream calc.
    //
    // Real datetime stamps (workflow transitions with non-zero hours)
    // have rich time-of-day data and pass through unchanged.
    function parseHSDate(v){
      if(!v)return null;
      let d=new Date(v);
      if(isNaN(d.getTime())){
        const n=parseInt(v,10);
        if(isNaN(n))return null;
        d = n>1e12 ? new Date(n) : (n>1e9 ? new Date(n*1000) : null);
        if(!d)return null;
      }
      // Date-only detection: exact UTC midnight on the dot. Re-anchor to
      // local midnight on the same Y/M/D.
      if(d.getUTCHours()===0&&d.getUTCMinutes()===0&&d.getUTCSeconds()===0&&d.getUTCMilliseconds()===0){
        return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),0,0,0,0);
      }
      return d;
    }

    // ─── productivity status thresholds ────────────────────────
    // met:   count ≥ target                         → green
    // close: target × (1 − 12.5%) ≤ count < target  → amber
    // below: count < target × (1 − 12.5%)           → red
    const CLOSE_MARGIN = 10 / 80; // 12.5%
    function perfState(count, target){
      if (!target || target <= 0) return "below";
      if (count >= target) return "met";
      if (count >= target * (1 - CLOSE_MARGIN)) return "close";
      return "below";
    }
    function perfColor(state){
      if (state === "met") return "#27AE60";
      if (state === "close") return "#F39C12";
      return "#E74C3C";
    }
    // Faded variant of perfColor, used by Chart 1 to render the "partially
    // finished" segment of each drafter's bar (deals currently sitting in
    // Required / Approved Proofreading). Same hue, 38% alpha so the
    // achievement colour stays visually linked to the solid segment.
    function perfColorLight(state){
      if (state === "met") return "rgba(39,174,96,0.38)";
      if (state === "close") return "rgba(243,156,18,0.38)";
      return "rgba(231,76,60,0.38)";
    }
    function perfLabel(state){
      if (state === "met") return "\u2713 Met";
      if (state === "close") return "\u26A0 Close";
      return "\u2717 Below";
    }

    // ─── defaults ───────────────────────────────────────────────
    const DEFAULT_STANDARD_TARGET=80;
    const DEFAULT_OVERRIDES={"Komal Singh":60,"Liam Tuapola":60,"Gurleen Sagoo":30,"Erin James":48};
    const DEFAULT_PROOF_TARGET=425;
    const DEFAULT_PROOF_OVERRIDES={"Neelam Ranchhod":425};

    // ─── business days calculator (Mon-Fri, excludes weekends) ───
    function calcBusinessDays(start,end){
      if(!start||!end||end<=start)return null;
      let count=0;
      const cur=new Date(start);
      cur.setHours(0,0,0,0);
      const endDay=new Date(end);
      endDay.setHours(0,0,0,0);
      while(cur<endDay){
        cur.setDate(cur.getDate()+1);
        const dow=cur.getDay();
        if(dow!==0&&dow!==6)count++;
      }
      return count;
    }

    // ─── UK bank holidays (England & Wales) ──────────────────────
    // Used by the SLA Audit only. Other SLA calcs across the dashboard
    // (deadlines, productivity, RDWC turnaround, etc.) stay weekend-only
    // to match how operational targets are tracked day-to-day.
    const UK_BANK_HOLIDAYS=new Set([
      // 2023
      "2023-01-02","2023-04-07","2023-04-10","2023-05-01","2023-05-08","2023-05-29","2023-08-28","2023-12-25","2023-12-26",
      // 2024
      "2024-01-01","2024-03-29","2024-04-01","2024-05-06","2024-05-27","2024-08-26","2024-12-25","2024-12-26",
      // 2025
      "2025-01-01","2025-04-18","2025-04-21","2025-05-05","2025-05-26","2025-08-25","2025-12-25","2025-12-26",
      // 2026
      "2026-01-01","2026-04-03","2026-04-06","2026-05-04","2026-05-25","2026-08-31","2026-12-25","2026-12-28",
      // 2027
      "2027-01-01","2027-03-26","2027-03-29","2027-05-03","2027-05-31","2027-08-30","2027-12-27","2027-12-28"
    ]);
    // toISOString() converts to UTC and would shift days near midnight in
    // BST. Build the ISO date from local components instead so the lookup
    // matches the locally-rendered calendar day.
    function toIsoLocal(d){
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,"0");
      const day=String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }
    function calcBusinessDaysUK(start,end){
      if(!start||!end||end<=start)return null;
      let count=0;
      const cur=new Date(start);
      cur.setHours(0,0,0,0);
      const endDay=new Date(end);
      endDay.setHours(0,0,0,0);
      while(cur<endDay){
        cur.setDate(cur.getDate()+1);
        const dow=cur.getDay();
        if(dow===0||dow===6)continue;
        if(UK_BANK_HOLIDAYS.has(toIsoLocal(cur)))continue;
        count++;
      }
      return count;
    }
    // Signed business days between start → end (negative if end < start)
    function signedBusinessDays(start,end){
      if(!start||!end)return null;
      const a=new Date(start);a.setHours(0,0,0,0);
      const b=new Date(end);b.setHours(0,0,0,0);
      if(a.getTime()===b.getTime())return 0;
      const sign=b>a?1:-1;
      const days=calcBusinessDays(sign>0?a:b,sign>0?b:a)||0;
      return sign*days;
    }
    // Add N business days to a date
    function addBusinessDays(start,days){
      const result=new Date(start);
      result.setHours(0,0,0,0);
      let added=0;
      while(added<days){
        result.setDate(result.getDate()+1);
        const dow=result.getDay();
        if(dow!==0&&dow!==6)added++;
      }
      return result;
    }

    // ─── process raw deals from server ──────────────────────────
    function processDeals(rawDeals,ownerMap,draftingOwnerOptions,proofOwnerOptions,queryReasonOptions,urgentReasonOptions,amendmentSourceOptions,leadSourceOptions,consultantQueryReasonOptions,legacyAdvisorOptions,waiverOptions,dealExclusions,doNotUseStageIds,leadSourceTier3Options,productOptions,slaBreachReasonOptions,regionOptions,macmillanFollowUpOptions){
      // Pre-compute the property keys to check for any "DO NOT USE" stage entry.
      // If any of these are populated on a deal, the deal has historically lived
      // in an archive pipeline (e.g. "DO NOT USE - Will Appointments") and the
      // audit should exclude it — appointment-date-based SLA windows refer to
      // the original cycle, not the current Estate Planning cycle.
      const doNotUseKeys=(doNotUseStageIds||[]).map(id=>`hs_v2_date_entered_${id}`);
      return rawDeals.map(d=>{
        const p=d.properties||{};
        const wasInDoNotUse=doNotUseKeys.some(k=>!!p[k]);
        const enteredDrafting=parseHSDate(p.hs_v2_date_entered_1223620771);
        const nativeExitedDrafting=parseHSDate(p.hs_v2_date_exited_1223620771);
        const origDraftsWithCustomer=parseHSDate(p.original_date_entered_drafts_with_customer);
        const origReadyForPrinting=parseHSDate(p.original_date_entered_ready_for_printing);
        const origSentToCustomer=parseHSDate(p.original_date_entered_sent_to_customer);
        // Heuristic for FIRST entry into completion stages when the workflow-stamped
        // original_* date is missing or has been overwritten: use the LATEST
        // hs_v2_date_entered minus the hs_v2_cumulative_time_in (an upper bound on
        // first-entry, ignoring gaps between stage sessions). Then take the earlier
        // of the original_* and the heuristic, since either may exist alone.
        const enteredDWC_v2=parseHSDate(p.hs_v2_date_entered_1223620775);
        const enteredRFP_v2=parseHSDate(p.hs_v2_date_entered_1223620777);
        const enteredSTC_v2=parseHSDate(p.hs_v2_date_entered_1223620778);
        const cumDWC=parseFloat(p.hs_v2_cumulative_time_in_1223620775)||0;
        const cumRFP=parseFloat(p.hs_v2_cumulative_time_in_1223620777)||0;
        const cumSTC=parseFloat(p.hs_v2_cumulative_time_in_1223620778)||0;
        const estimateFirstEntry=(orig,entered,cumulative)=>{
          // When the workflow-stamped original_date_entered_* is present, trust
          // it as the authoritative first-entry date — return it directly. The
          // heuristic (latest entry − cumulative time) is only correct when the
          // deal entered the stage exactly once. For re-entry deals (e.g. DWC
          // → RDWC → DWC after an amendment cycle), the heuristic understates
          // the first-entry by however long the second stint lasted, because
          // cumulative time grows but latest_entry jumps to the re-entry stamp.
          //
          // Surfaced via deal 57542012984 (John & Karen Wilkinson): real first
          // DWC entry was 7 May 2026, two stints totalling ~18 days, latest
          // entry 20 May. Heuristic gave 2 May, dashboard then shaved to 1 May
          // through ms-rounding — which the audit took as "End Date" even
          // though it predates the actual first DWC by 6 days.
          //
          // Heuristic stays as the fallback when original_* is missing
          // (bulk-imported / migrated deals where the workflow stamp never
          // fired). For those we'll be wrong on re-entry deals too, but we
          // have no better signal without engagement data.
          if(orig)return orig;
          if(entered&&cumulative>0)return new Date(entered.getTime()-cumulative);
          return null;
        };
        const firstDWC=estimateFirstEntry(origDraftsWithCustomer,enteredDWC_v2,cumDWC);
        const firstRFP=estimateFirstEntry(origReadyForPrinting,enteredRFP_v2,cumRFP);
        const firstSentToCustomer=estimateFirstEntry(origSentToCustomer,enteredSTC_v2,cumSTC);
        const CUTOVER=new Date("2026-04-12T00:00:00");
        // Anchor: when did the deal first enter Drafting Instructions?
        const anchorEntered=parseHSDate(p.original_date_entered_drafting_instructions)||enteredDrafting;
        // Legacy deals (entered DI before cutover): always use exited Drafting Instructions
        // Post-cutover deals (entered DI from cutover): only original_* DWC/RFP completion dates
        // No anchor = migration deal (never entered DI): skip
        let exitedDrafting;
        if(!anchorEntered){exitedDrafting=null;}
        else if(anchorEntered<CUTOVER){
          // Legacy deal: entered DI before cutover
          const legacyExit=nativeExitedDrafting||null;
          if(legacyExit&&legacyExit<CUTOVER){
            // Completed before cutover — use exit DI date
            exitedDrafting=legacyExit;
          }else{
            // Still in-flight after cutover — workflows are active, use DWC/RFP
            const validDates=[origDraftsWithCustomer,origReadyForPrinting].filter(dt=>dt&&dt>=anchorEntered);
            exitedDrafting=validDates.length?new Date(Math.min(...validDates)):null;
          }
        }
        else{const validDates=[origDraftsWithCustomer,origReadyForPrinting].filter(dt=>dt&&dt>=anchorEntered);const newLogic=validDates.length?new Date(Math.min(...validDates)):null;exitedDrafting=newLogic&&newLogic>=CUTOVER?newLogic:null;}
        // Old metric: purely based on Date exited "Drafting Instructions" (for comparison chart)
        const exitedDraftingOld=anchorEntered?nativeExitedDrafting:null;
        const enteredAppointmentOutcome=parseHSDate(p.hs_v2_date_entered_1223751329);
        const exitedAppointmentOutcome=parseHSDate(p.hs_v2_date_exited_1223751329);
        const enteredProofreading=parseHSDate(p.hs_v2_date_entered_1223620773);
        const exitedProofreading=parseHSDate(p.hs_v2_date_exited_1223620773);
        const enteredDraftingQuery=parseHSDate(p.hs_v2_date_entered_1223620772);
        const origEnteredDrafting=parseHSDate(p.original_date_entered_drafting_instructions);
        const origExitedDrafting=parseHSDate(p.first_date_exited_drafting_instructions);
        const draftingStart=origEnteredDrafting||enteredDrafting;
        const rawDraftOwner=p.drafting_owner||"";
        const rawProofOwner=p.proof_reading__owner||"";
        const drafterName=draftingOwnerOptions[rawDraftOwner]||ownerMap[rawDraftOwner]||rawDraftOwner||"Unknown";
        const prooferName=proofOwnerOptions[rawProofOwner]||ownerMap[rawProofOwner]||rawProofOwner||"Unknown";
        // Parse multi-select query reasons (semicolon-separated in HubSpot)
        const rawReasons=p.drafting_query_reason||"";
        const queryReasons=rawReasons?rawReasons.split(";").map(r=>queryReasonOptions[r.trim()]||r.trim()).filter(Boolean):[];
        // Consultant query reason (single-select in HubSpot, but split anyway for safety)
        const rawConsultReasons=p.consultant_query_reason||"";
        const consultantQueryReasons=rawConsultReasons?rawConsultReasons.split(";").map(r=>(consultantQueryReasonOptions||{})[r.trim()]||r.trim()).filter(Boolean):[];
        // Legacy advisor (HubSpot owner-type field) + Replied — Drafts With Customer stage dates
        const rawLegacyAdvisor=p.legacy_advisor__owner||"";
        const legacyAdvisor=rawLegacyAdvisor?((legacyAdvisorOptions||{})[rawLegacyAdvisor.trim()]||ownerMap[rawLegacyAdvisor.trim()]||rawLegacyAdvisor.trim()):"";
        // Estate Planning Consultant ("will_consultant" in HubSpot). Owner-type
        // field — resolve via ownerMap, fall back to raw value if it isn't a
        // numeric owner ID (e.g. a name string already).
        const rawWillConsultant=(p.will_consultant||"").trim();
        const willConsultant=rawWillConsultant?(ownerMap[rawWillConsultant]||rawWillConsultant):"";
        // Macmillan Service KPI fields. createDate is the deal's
        // HubSpot creation timestamp (= Macmillan referral arrival).
        // pendingMacmillanDays = cumulative time spent in stage 112034598
        // ("Pending - Macmillan"), converted from milliseconds to days.
        // firstConnectedCallDate = HubSpot's first-connected-call stamp.
        const createDate=parseHSDate(p.createdate);
        const pendingMacmillanMs=parseFloat(p.hs_v2_cumulative_time_in_112034598);
        const pendingMacmillanDays=isNaN(pendingMacmillanMs)?null:(pendingMacmillanMs/86400000);
        const firstConnectedCallDate=parseHSDate(p.first_connected_call_date);
        // Stage exit timestamps for KPI 6 (Two further call attempts within
        // 5 working days). Pass condition: both populated. See macmillanKPIs.
        const pendingExitedDate=parseHSDate(p.hs_v2_date_exited_112034598);
        const attemptingExitedDate=parseHSDate(p.hs_v2_date_exited_1230854698);
        // KPI 7 (Follow-up email if customer still unreached). Pass =
        // Pending exit populated AND a Macmillan customer email captured.
        const customerEmailMacmillan=(p.customer_email__macmillan_||"").trim();
        const enteredRDWC=parseHSDate(p.hs_v2_date_entered_1223620776);
        const exitedRDWC=parseHSDate(p.hs_v2_date_exited_1223620776);
        const rdwcTurnaroundBizDays=calcBusinessDays(enteredRDWC,exitedRDWC);
        // Priority and urgent reason
        const priority=(p.hs_priority||"").toLowerCase();
        const rawUrgentReason=p.urgent_request_reason||"";
        const urgentReason=rawUrgentReason?rawUrgentReason.split(";").map(r=>(urgentReasonOptions||{})[r.trim()]||r.trim()).filter(Boolean):[];
        const isUrgent=priority==="high";
        // Urgent SLA anchor: date_marked_urgent (post-18 Apr) or draftingStart
        // (pre-18 Apr fallback). Then clamped forward to draftingStart — a deal
        // marked urgent BEFORE it ever entered Drafting Instructions can't tick
        // down the drafter's clock until the drafter actually has the deal.
        // (e.g. a Macmillan deal flagged urgent on import 13 days before its
        // appointment shouldn't accrue 9 days of "drafter time" while it sat
        // pre-DI.)
        const URGENT_CUTOVER=new Date("2026-04-18T00:00:00");
        const dateMarkedUrgent=parseHSDate(p.date_marked_urgent);
        const rawUrgentAnchor=dateMarkedUrgent&&dateMarkedUrgent>=URGENT_CUTOVER?dateMarkedUrgent:draftingStart;
        const urgentStart=(rawUrgentAnchor&&draftingStart&&rawUrgentAnchor<draftingStart)?draftingStart:rawUrgentAnchor;
        // Consultant Query (stage 1223751330)
        const enteredConsultantQuery=parseHSDate(p.hs_v2_date_entered_1223751330);
        // Approved - Proof Reading (stage 1223620774). Entered timestamp is
        // the moment the proofreader signed off; used by the activity heatmap
        // to credit the proof_reading__owner when they're also a drafter.
        const enteredApproved=parseHSDate(p.hs_v2_date_entered_1223620774);
        const exitedApproved=parseHSDate(p.hs_v2_date_exited_1223620774);

        const enteredAmendment=parseHSDate(p.hs_v2_date_entered_1338772492);
        const exitedAmendment=parseHSDate(p.hs_v2_date_exited_1338772492);
        const rawAmendSource=p.amendment_source||"";
        const amendmentSource=rawAmendSource?(amendmentSourceOptions||{})[rawAmendSource.trim()]||rawAmendSource.trim():"";
        // Lead source (multi-select checkbox, ;-separated) + appointment date
        const rawLeadSource=p.ep_lead_source||"";
        const leadSources=rawLeadSource?rawLeadSource.split(";").map(v=>(leadSourceOptions||{})[v.trim()]||v.trim()).filter(Boolean):[];
        // Lead source tier 3 (Coral SLA tab uses this to filter). Treated as
        // ;-separated for safety even if usually single-valued; resolve labels
        // via options when the raw value is an enum internal name.
        const rawLeadTier3=p.lead_source_tier_3||"";
        const leadSourceTier3List=rawLeadTier3?rawLeadTier3.split(";").map(v=>(leadSourceTier3Options||{})[v.trim()]||v.trim()).filter(Boolean):[];
        const leadSourceTier3=leadSourceTier3List.join(", ");
        // Products: source is paid_line_items_summary (multi-line text,
        // populated by the printing workflow). Example raw value:
        //   "Severance of tenancy x1 150.00\nCouple Will with Trust x1 750.00"
        //
        // Categorisation matches the dbt model's product_type derivation:
        //   - "Estate Planning Package" (e.g. "Classic Estate Planning
        //     Package: Simple Will") is a bundle that always includes BOTH
        //     a Will and an LPA → flag both, regardless of which is named
        //     after the colon.
        //   - Otherwise, substring-match "will" → Will, "lpa" / "lasting
        //     power of attorney" → LPA. A deal can match both independently
        //     (e.g. "Couple Simple Will, Single LPA").
        //
        // The dealname fallback (MW / LIT / LPA word-boundary regex) fires
        // when paid_line_items_summary is empty — useful for deals that
        // haven't reached billing yet.
        const rawProducts=p.paid_line_items_summary||"";
        const products=rawProducts?rawProducts.split(/\r?\n/).map(s=>s.trim()).filter(Boolean):[];
        const productsLc=rawProducts.toLowerCase();
        const dealnameLc=(p.dealname||"").toLowerCase();
        const isEstatePlanningPackage=productsLc.includes("estate planning package");
        const willInProducts=isEstatePlanningPackage||productsLc.includes("will");
        const willInDealname=/(^|[^a-z])(will|mw|lit)([^a-z]|$)/.test(dealnameLc);
        const hasWillProduct=willInProducts||willInDealname;
        const lpaInProducts=isEstatePlanningPackage||productsLc.includes("lpa")||productsLc.includes("lasting power of attorney");
        const lpaInDealname=/(^|[^a-z])lpa([^a-z]|$)/.test(dealnameLc);
        const hasLpaProduct=lpaInProducts||lpaInDealname;
        // SLA breach reason — surfaced as a column on the Macmillan and Coral
        // tables. Parsed tolerant of both single-select (one value) and multi-
        // select (semicolon-separated). Empty when the property is unset.
        const rawSlaBreach=p.sla_breach_reason||"";
        const slaBreachReasons=rawSlaBreach?rawSlaBreach.split(";").map(v=>(slaBreachReasonOptions||{})[v.trim()]||v.trim()).filter(Boolean):[];
        const slaBreachReason=slaBreachReasons.join(", ");
        // Region (e.g. "England & Wales") and Macmillan follow-up outcome —
        // both single-select. Empty outcome means the deal is still in the
        // Legacy Advisor → Macmillan follow-up queue.
        const rawRegion=(p.region||"").trim();
        const region=rawRegion?((regionOptions||{})[rawRegion]||rawRegion):"";
        const rawMacFollowUp=(p.confirmed_will_has_been_signed__macmillan__v2||"").trim();
        const macmillanFollowUpOutcome=rawMacFollowUp?((macmillanFollowUpOptions||{})[rawMacFollowUp]||rawMacFollowUp):"";
        // New 3-call SLA tracking. Each property is a Yes / No dropdown:
        //   Yes   = call made, will-signing confirmed (or deal otherwise resolved)
        //   No    = call attempted, no confirmation yet (no answer, voicemail, etc.)
        //   blank = not yet attempted
        // Normalize to lower-case "yes" / "no" / "" so downstream code can do
        // simple equality checks without worrying about casing variants from HubSpot.
        const normalizeYesNo=(v)=>{
          const s=(v||"").toString().trim().toLowerCase();
          if(s==="yes"||s==="true")return"yes";
          if(s==="no"||s==="false")return"no";
          return"";
        };
        const macmillanCall1=normalizeYesNo(p.macmillan_call_1);
        const macmillanCall2=normalizeYesNo(p.macmillan_call_2);
        const macmillanCall3=normalizeYesNo(p.macmillan_call_3);
        const dateOfAppointment=parseHSDate(p.date_of_appointment);
        // Workflow-stamped date: when drafting_query_reason was first populated (from 22/04/2026)
        const firstQueryDate=parseHSDate(p.date_drafting_query);

        // 14-day waiver: HubSpot returns the enum option's internal value (e.g. "Yes"/"No",
        // but sometimes lower-case or a coded value). Resolve via the property options so we
        // match the displayed label, then check for yes/no in a case-insensitive way.
        const rawWaiver=(p.have_they_signed_the_14_day_waiver_||"").toString().trim();
        const waiverLabel=((waiverOptions||{})[rawWaiver]||rawWaiver).toString().trim().toLowerCase();
        const waiverSigned14d=waiverLabel==="yes"||waiverLabel==="true"?true:(waiverLabel==="no"||waiverLabel==="false"?false:null);
        // When the waiver is unsigned, this date drives the SLA extension.
        // Fallback when missing: origEnteredDrafting + 14 calendar days
        // (computed at the SLA-table / audit call site so we can reuse the
        // existing anchor variables).
        const waiverExpiryDate=parseHSDate(p.waiver_expiry_date);
        return{
          id:d.id,dealname:p.dealname||d.id,drafterName,prooferName,dealstage:p.dealstage||"",
          wasInDoNotUse,

          slaBreachReason,slaBreachReasons,
          region,macmillanFollowUpOutcome,macmillanCall1,macmillanCall2,macmillanCall3,

          enteredProofreading,exitedProofreading,enteredDraftingQuery,queryReasons,consultantQueryReasons,

          createDate,pendingMacmillanDays,firstConnectedCallDate,
          pendingExitedDate,attemptingExitedDate,customerEmailMacmillan,

          queryExcludedOriginalDrafter:(dealExclusions&&dealExclusions[String(d.id)])||null,

          enteredAppointmentOutcome,exitedAppointmentOutcome,

          firstDWC,firstRFP,firstSentToCustomer,

    async function fetchDealsFromAPI(force) {
      const url = force ? "/api/deals/refresh" : "/api/deals";
      const options = force ? { method: "POST" } : {};
      const res = await fetch(url, options);
      if (!res.ok) {

      return res.json();

    // ─── SLA-colored smooth line renderer ──────────────────────────
    // Draws smooth color-coded curve segments (no dots) between data points.
    // Uses quadratic Bézier curves for smooth transitions.
    function makeSLALine(thresholds){
      function getColor(val){
        if(val==null)return C.grid;
        for(const t of thresholds){if(val<=t.max)return t.color;}
        return thresholds[thresholds.length-1].color;
      }
      let allPts=[];
      let drawn=false;
      return function SLALineDot(props){
        const{cx,cy,payload,dataKey,index}=props;
        const val=payload?.[dataKey];
        // Reset on first point
        if(index===0){allPts=[];drawn=false;}
        if(val!=null&&cx!=null&&cy!=null)allPts.push({cx,cy,val,index});
        // Draw segment from previous valid point to this one
        if(allPts.length<2)return<g key={`sla-e-${index}`}/>;
        const prev=allPts[allPts.length-2],curr=allPts[allPts.length-1];
        if(curr.index!==index)return<g key={`sla-s-${index}`}/>; // this point was null, skip
        const segCol=getColor(Math.max(prev.val,curr.val));
        // Cubic Bézier control points for smooth curve
        const tension=0.3;
        const prevPrev=allPts.length>=3?allPts[allPts.length-3]:prev;
        const dx=curr.cx-prevPrev.cx;
        const dy=curr.cy-prevPrev.cy;
        const cp1x=prev.cx+dx*tension;
        const cp1y=prev.cy+dy*tension;
        const cp2x=curr.cx-(curr.cx-prev.cx)*tension;
        const cp2y=curr.cy-(curr.cy-prev.cy)*tension;
        return<path key={`sla-${index}`} d={`M${prev.cx},${prev.cy} C${cp1x},${cp1y} ${cp2x},${cp2y} ${curr.cx},${curr.cy}`} stroke={segCol} strokeWidth={3} fill="none" strokeLinecap="round"/>;
      };
    }

    // Tooltip for stacked charts — shows only the hovered segment + line values
    function StackedTooltip({active,payload,label}){
      if(!active||!payload?.length)return null;
      // dataKeys that are LINE values (overall rate or avg), not stacked
      // bar segments. They pass through even when their value is 0 (since
      // they're informational) and they're EXCLUDED from the Total sum
      // below (a rate or average wouldn't add to the segment total).
      const LINE_KEYS=new Set(["rate","avgBizDays","avgDays"]);

      // categories. Skipped when there's only 0 or 1 bar items (no useful
      // total to show in that case).
      const barItems=items.filter(p=>!isLine(p)&&typeof p.value==="number");

    // ─── ChartCard: wraps each chart with data table + CSV ──────

      const[expanded,setExpanded]=useState({});

      const toggle=k=>setExpanded(p=>({...p,[k]:!p[k]}));
      const hasDetails=!!detailMap;

      const doPNG=async()=>{
        const el=chartRef.current;

        try{

          if(titleEl)titleEl.style.display="block";
          const canvas=await html2canvas(el,{backgroundColor:"#1e1e1e",scale:2,useCORS:true,logging:false});
          if(titleEl)titleEl.style.display="none";
          const link=document.createElement("a");
          link.download=(csvName||chartId||"chart").replace(/\.csv$/,"")+".png";
          link.href=canvas.toDataURL("image/png");

          }else{lines.push(columns.map(c=>r[c.key]));}

      const th={padding:"8px 10px",textAlign:"left",borderBottom:`1px solid ${C.border}`,color:C.white,fontWeight:600,fontSize:11,position:"sticky",top:0,background:C.surface};
      const td={padding:"6px 10px",borderBottom:`1px solid ${C.border}`,color:C.text,fontSize:12};

        <div style={S.chartBox}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>

            <div style={{display:"flex",gap:6}}>
              <button style={{...S.btn,padding:"4px 10px",fontSize:11}} onClick={()=>setShowTable(!showTable)}>{showTable?"Hide":"View"} Data</button>

              <button style={{...S.btn,padding:"4px 10px",fontSize:11}} onClick={doPNG}>{"\uD83D\uDDBC"} PNG</button>

          </div>
          <div ref={chartRef} id={chartId||undefined} style={{padding:8}}><div style={{color:C.white,fontSize:13,fontWeight:600,marginBottom:8,display:"none"}} className="png-title">{title}</div>{children}</div>
          {showTable&&(rows||[]).length>0&&(
            <div style={{marginTop:16,maxHeight:400,overflowY:"auto",overflowX:"auto",border:`1px solid ${C.border}`,borderRadius:8}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>{hasDetails&&<th style={{...th,width:44}}></th>}{columns.map(c=><th key={c.key} style={th}>{c.label}</th>)}</tr></thead>
                <tbody>
                  {rows.map((r,i)=>(
                    <React.Fragment key={r._key||i}>
                      <tr style={{cursor:hasDetails?"pointer":"default",background:i%2===0?"transparent":"rgba(255,255,255,0.02)"}} onClick={()=>hasDetails&&toggle(r._key)}>
                        {hasDetails&&<td style={td}>{expanded[r._key]?"\u25BC":"\u25B6"}<span style={{fontSize:10,opacity:0.5,marginLeft:4}}>{(detailMap[r._key]||[]).length}</span></td>}

    // ─── Chart 1: Total Drafts Completed ────────────────────────
    // Stacked bar per drafter, two segments:
    //   - "full":    deals that reached Drafts With Customer / Ready For
    //                Printing / Sent To Customer in the bucket (bucketed by
    //                exitedDrafting — the DWC date, same as before).
    //   - "partial": deals currently sitting in Required Proofreading or
    //                Approved Proofreading whose drafter handed off in this
    //                bucket (bucketed by nativeExitedDrafting — the date
    //                the drafter actually pushed the deal out of DI).
    // Total (full + partial) is what's compared against the drafter's target
    // for the perfState colour, so drafters get credit for finishing their
    // part even when QA hasn't shipped the deal yet. The light segment
    // re-renders as the deal progresses: once it reaches DWC it leaves the
    // partial bucket and lands in the full bucket (potentially a later week).
    const RP_STAGE_ID="1223620773";
    const AP_STAGE_ID="1223620774";
    function Chart1({deals,gran,bucket,standardTarget,overrides}){
      const data=useMemo(()=>{
        const mult=gran==="DoD"?1/5:gran==="MoM"?4.33:1;
        const counts={};
        deals.forEach(d=>{
          const drafter=d.drafterName;
          if(!drafter||drafter==="Unknown"||/^\d+$/.test(drafter))return;
          // FULL segment: existing behaviour, bucketed by exitedDrafting (DWC).
          if(d.exitedDrafting&&dateToBucket(d.exitedDrafting,gran)===bucket){
            (counts[drafter]=counts[drafter]||{full:0,partial:0}).full++;
            return;
          }
          // PARTIAL segment: deal is currently in RP or AP. Bucket by the
          // date the drafter exited DI (their hand-off moment).
          if((d.dealstage===RP_STAGE_ID||d.dealstage===AP_STAGE_ID)&&d.nativeExitedDrafting){
            if(dateToBucket(d.nativeExitedDrafting,gran)===bucket){
              (counts[drafter]=counts[drafter]||{full:0,partial:0}).partial++;
            }
          }
        });
        // Pre-seed drafters with a "partial target" (override < standard) so
        // they appear in the chart even when their bucket count is zero.
        // These are part-time / reduced-hours staff being tracked at a lower
        // expected output, and we want their progress visible every week
        // rather than disappearing the moment they have a slow start.
        Object.keys(overrides).forEach(name=>{
          if(overrides[name]<standardTarget&&!(name in counts)){
            counts[name]={full:0,partial:0};
          }
        });
        return Object.entries(counts)
          .filter(([name,c])=>(c.full+c.partial)>=1||(overrides[name]!==undefined&&overrides[name]<standardTarget))
          .map(([name,c])=>{
            const total=c.full+c.partial;
            const wt=overrides[name]??standardTarget;
            const target=Math.round(wt*mult);
            // Partial-target drafters are evaluated against a lower bar than
            // the global target line shows. Surface their personal target on
            // the bar label ("X / Y") so the chart doesn't make 0/30 look
            // like 0/80 at a glance. Full-target drafters keep the clean
            // single number — they're already measured against the global
            // reference line.
            const isPartialTarget=overrides[name]!==undefined&&overrides[name]<standardTarget;
            const displayCount=isPartialTarget?`${total} / ${target}`:`${total}`;
            return{name,full:c.full,partial:c.partial,count:total,target,displayCount,state:perfState(total,target),isCustom:name in overrides};
          }).sort((a,b)=>b.count-a.count);
      },[deals,gran,bucket,standardTarget,overrides]);

      const globalTarget=Math.round(standardTarget*(gran==="DoD"?1/5:gran==="MoM"?4.33:1));
      const maxVal=Math.max(...data.map(d=>Math.max(d.count,d.target)),globalTarget,10);
      if(!data.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No completed drafts in this period</div>;

      return(
        <ResponsiveContainer width="100%" height={Math.max(280,data.length*42+60)}>
          <BarChart data={data} layout="vertical" margin={{top:30,right:60,left:10,bottom:10}}>
            <CartesianGrid horizontal={false} stroke={C.grid} strokeDasharray="3 3"/>
            <XAxis type="number" domain={[0,Math.ceil(maxVal*1.15)]} tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}}/>
            <YAxis type="category" dataKey="name" width={130} tick={{fill:C.text,fontSize:12}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <ReferenceLine x={globalTarget} stroke={C.white} strokeDasharray="8 4" strokeWidth={2.5} label={{value:`Target: ${globalTarget}`,position:"top",fill:C.white,fontSize:14,fontWeight:700,offset:10}}/>
            <Legend verticalAlign="top" height={28} iconType="square" wrapperStyle={{color:C.text,fontSize:11}}
              payload={[
                {value:"Completed (at customer)",type:"square",color:perfColor("met")},
                {value:"In proofreading",type:"square",color:perfColorLight("met")}
              ]}/>
            <Bar dataKey="full" name="Completed" stackId="completion" barSize={22}>
              {data.map((entry,i)=>(<Cell key={i} fill={perfColor(entry.state)}/>))}
            </Bar>
            <Bar dataKey="partial" name="In proofreading" stackId="completion" radius={[0,6,6,0]} barSize={22}>
              {data.map((entry,i)=>(<Cell key={i} fill={perfColorLight(entry.state)}/>))}
              <LabelList dataKey="displayCount" position="right" fill={C.white} fontSize={12} fontWeight={600}/>
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 16: Amendments Completed per Drafter ──────────
    // Count of deals that exited stage 1338772492 ("Amendment Requested") in the
    // selected period, grouped by current drafter. No target — plain bars.
    function Chart16({deals,gran,bucket}){
      const {data,sources,sourceColor,sourceStroke}=useMemo(()=>{
        if(!bucket)return{data:[],sources:[],sourceColor:{},sourceStroke:{}};
        const byDrafter={}; // drafter → { name, total, bySource: {src→count} }
        const sourceTotals={}; // src → period-wide count, used to order segments
        deals.forEach(d=>{
          if(!d.exitedAmendment)return;
          if(dateToBucket(d.exitedAmendment,gran)!==bucket)return;
          const drafter=d.drafterName;
          if(!drafter||/^\d+$/.test(drafter)||drafter==="Unknown")return;
          const src=d.amendmentSource||"Not specified";
          if(!byDrafter[drafter])byDrafter[drafter]={name:drafter,total:0,bySource:{}};
          byDrafter[drafter].total++;
          byDrafter[drafter].bySource[src]=(byDrafter[drafter].bySource[src]||0)+1;
          sourceTotals[src]=(sourceTotals[src]||0)+1;
        });
        // Drafters sorted by total amendments descending (as before).
        const rowsRaw=Object.values(byDrafter).filter(r=>r.total>=1).sort((a,b)=>b.total-a.total);
        // Stack segment order: most common real source first (leftmost), then by
        // frequency desc, with "Not specified" always pinned last (rightmost).
        const realSources=Object.keys(sourceTotals).filter(s=>s!=="Not specified").sort((a,b)=>sourceTotals[b]-sourceTotals[a]);
        const srcs=sourceTotals["Not specified"]?[...realSources,"Not specified"]:realSources;
        const rows=rowsRaw.map(r=>{
          const row={name:r.name,total:r.total};
          srcs.forEach(s=>{row[s]=r.bySource[s]||0;});
          return row;
        });
        const colorMap={},strokeMap={};
        srcs.forEach((s,i)=>{
          if(s==="Not specified"){colorMap[s]="rgba(150,150,150,0.30)";strokeMap[s]="#999";}
          else{colorMap[s]=AMEND_COLORS[i%AMEND_COLORS.length];strokeMap[s]=AMEND_STROKES[i%AMEND_STROKES.length];}
        });
        return{data:rows,sources:srcs,sourceColor:colorMap,sourceStroke:strokeMap};
      },[deals,gran,bucket]);

      if(!data.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No amendments completed in this period</div>;
      const maxVal=Math.max(...data.map(d=>d.total),5);
      const lastIdx=sources.length-1;
      return(
        <ResponsiveContainer width="100%" height={Math.max(280,data.length*42+80)}>
          <BarChart data={data} layout="vertical" margin={{top:20,right:60,left:10,bottom:10}}>
            <CartesianGrid horizontal={false} stroke={C.grid} strokeDasharray="3 3"/>
            <XAxis type="number" domain={[0,Math.ceil(maxVal*1.15)]} tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false}/>
            <YAxis type="category" dataKey="name" width={130} tick={{fill:C.text,fontSize:12}} axisLine={false} tickLine={false}/>
            <Tooltip content={<StackedTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:11,color:C.text}}/>
            {sources.map((s,i)=>(
              <Bar key={s} dataKey={s} name={s} stackId="src" fill={sourceColor[s]} stroke={sourceStroke[s]} strokeWidth={0.5} barSize={22} radius={i===lastIdx?[0,6,6,0]:[0,0,0,0]}>
                {i===lastIdx&&<LabelList dataKey="total" position="right" fill={C.white} fontSize={12} fontWeight={600}/>}
              </Bar>
            ))}
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // ─── Drafter Workload — open deals per drafter, broken down by SLA status ──
    // Snapshot of deals currently in the five working stages, evaluated per-row using
    // the same SLA logic as the Standard SLA table (drafting branch: 28 cal days from
    // latest of original DI / DOA, +14d if waiver not signed; amendment branch: 10 biz
    // days for "Client amendment", else 1 biz day). Sorted by Breached desc then total.
    function ChartDrafterWorkload({deals,stageLabels}){
      const data=useMemo(()=>{
        const today=new Date();today.setHours(0,0,0,0);
        const normStage=s=>(s||"").toLowerCase().replace(/[–—-]+/g," ").replace(/\s+/g," ").trim();
        const ALLOWED=new Set([
          "drafting instructions","drafting query","required proof reading",
          "approved proof reading","amendment requested"
        ]);
        const AMEND_STAGE="1338772492";
        const SLA_DAYS=28;
        const byDrafter={};
        deals.forEach(d=>{
          const stageLabel=stageLabels[d.dealstage]||d.dealstage||"";
          if(!ALLOWED.has(normStage(stageLabel)))return;
          const isAmend=d.dealstage===AMEND_STAGE;
          let state;
          if(isAmend){
            if(!d.enteredAmendment)return;
            const anchor=new Date(d.enteredAmendment);anchor.setHours(0,0,0,0);
            const isClient=(d.amendmentSource||"").trim().toLowerCase()==="client amendment";
            const target=isClient?10:1;
            const deadline=addBusinessDays(anchor,target);
            const remaining=signedBusinessDays(today,deadline);
            if(remaining==null)state="comfortable";
            else if(remaining<0)state="breached";
            else if(isClient)state=remaining<=1?"close":remaining<=3?"warning":"comfortable";
            else state=remaining===0?"close":"comfortable";
          }else{
            const candidates=[];
            if(d.origEnteredDrafting)candidates.push(new Date(d.origEnteredDrafting).getTime());
            if(d.dateOfAppointment)candidates.push(new Date(d.dateOfAppointment).getTime());
            if(!candidates.length)return;
            const anchor=new Date(Math.max(...candidates));anchor.setHours(0,0,0,0);
            const waiverExt=d.waiverSigned14d===false?14:0;
            const deadline=new Date(anchor);deadline.setDate(deadline.getDate()+SLA_DAYS+waiverExt);
            const remaining=Math.round((deadline-today)/86400000);
            state=remaining<0?"breached":remaining<=3?"close":remaining<=7?"warning":"comfortable";
          }
          const drafter=d.drafterName&&d.drafterName!=="Unknown"?d.drafterName:"Unassigned";
          if(/^\d+$/.test(drafter))return;
          if(!byDrafter[drafter])byDrafter[drafter]={name:drafter,breached:0,close:0,warning:0,comfortable:0,total:0};
          byDrafter[drafter][state]++;
          byDrafter[drafter].total++;
        });
        // Hide drafters with a thin workload — the chart is for spotting load
        // imbalance and SLA risk concentration, not for completeness.
        return Object.values(byDrafter)
          .filter(d=>d.total>=10)
          .map(d=>{
            // Pre-compute the right-edge label so the chart shows both the
            // raw total AND the breached % in one glance.
            const pct=d.total>0?Math.round((d.breached/d.total)*100):0;
            return{...d,breachedPct:pct,totalLabel:`${d.total} · ${pct}% breached`};
          })
          .sort((a,b)=>(b.breached-a.breached)||(b.total-a.total));
      },[deals,stageLabels]);

      if(!data.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No drafters with 10+ open deals in the working stages.</div>;
      const maxVal=Math.max(...data.map(d=>d.total),5);
      // Horizontal stacked bars: drafter names along the Y-axis, deal counts
      // running along the X-axis. Height scales with the drafter count so
      // each bar stays a sensible thickness; chart width is fluid.
      return(
        <ResponsiveContainer width="100%" height={Math.max(300,data.length*36+80)}>
          <BarChart data={data} layout="vertical" margin={{top:20,right:80,left:10,bottom:10}}>
            <CartesianGrid horizontal={false} stroke={C.grid} strokeDasharray="3 3"/>
            <XAxis type="number" domain={[0,Math.ceil(maxVal*1.1)]} tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false}/>
            <YAxis type="category" dataKey="name" width={150} tick={{fill:C.text,fontSize:12}} axisLine={false} tickLine={false}/>
            <Tooltip content={<StackedTooltip/>}/>
            <Legend verticalAlign="top" height={28} wrapperStyle={{color:C.text,fontSize:12}}
              payload={[
                {value:"Breached",type:"square",color:C.red},
                {value:"Close",type:"square",color:C.amber},
                {value:"Warning",type:"square",color:"#F1C40F"},
                {value:"Comfortable",type:"square",color:C.green}
              ]}/>
            <Bar dataKey="breached" name="Breached" stackId="status" fill={C.red} barSize={20}/>
            <Bar dataKey="close" name="Close" stackId="status" fill={C.amber} barSize={20}/>
            <Bar dataKey="warning" name="Warning" stackId="status" fill="#F1C40F" barSize={20}/>
            <Bar dataKey="comfortable" name="Comfortable" stackId="status" fill={C.green} barSize={20} radius={[0,6,6,0]}>
              <LabelList dataKey="totalLabel" position="right" fill={C.white} fontSize={12} fontWeight={700}/>
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 2: Avg Turnaround Days ───────────────────────────
    function Chart2({deals,gran,bucket}){
      const data=useMemo(()=>{
        const groups={};
        deals.forEach(d=>{
          if(!d.exitedDrafting||d.draftingTurnaroundDays==null)return;

          groups[d.drafterName].push(d.draftingTurnaroundDays);
        });

          const avg=days.reduce((s,v)=>s+v,0)/days.length;
          return{name,avg:parseFloat(avg.toFixed(0)),count:days.length};
        }).filter(d=>d.count>=1).sort((a,b)=>b.avg-a.avg);

    // ─── Chart 3: Proofreading Turnaround & Backlog ─────────────
    const BACKLOG_COLORS=["rgba(137,196,225,0.30)","rgba(244,166,160,0.30)","rgba(197,163,217,0.30)","rgba(142,207,176,0.30)","rgba(246,200,138,0.30)","rgba(160,191,224,0.30)","rgba(232,180,200,0.30)","rgba(126,202,193,0.30)","rgba(212,184,150,0.30)","rgba(176,196,239,0.30)"];
    const BACKLOG_STROKES=["#89c4e1","#f4a6a0","#c5a3d9","#8ecfb0","#f6c88a","#a0bfe0","#e8b4c8","#7ecac1","#d4b896","#b0c4ef"];

    function Chart3({deals,gran}){
      const data=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?25:gran==="WoW"?10:8;
        const buckets=[];

          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        // Avg turnaround for completed proofs
        const completed={};
        deals.forEach(d=>{
          if(!d.enteredProofreading||!d.exitedProofreading||d.proofreadingTurnaroundDays==null)return;
          const b=dateToBucket(d.exitedProofreading,gran);
          if(!completed[b])completed[b]=[];
          completed[b].push(d.proofreadingTurnaroundDays);
        });

        // Productivity: deals entering Required - Proof Reading per period
        const entered={};
        deals.forEach(d=>{
          if(!d.enteredProofreading)return;
          const b=dateToBucket(d.enteredProofreading,gran);
          entered[b]=(entered[b]||0)+1;
        });

        return uniq.map(bucket=>{
          const days=completed[bucket]||[];
          const avgTurnaround=days.length?parseFloat((days.reduce((s,v)=>s+v,0)/days.length).toFixed(0)):null;

    // ─── Chart 4: Drafting Query Rate ───────────────────────────
    const REASON_COLORS_C4=["rgba(244,166,160,0.30)","rgba(137,196,225,0.30)","rgba(197,163,217,0.30)","rgba(142,207,176,0.30)","rgba(246,200,138,0.30)","rgba(160,191,224,0.30)","rgba(232,180,200,0.30)","rgba(126,202,193,0.30)","rgba(212,184,150,0.30)","rgba(176,196,239,0.30)","rgba(201,228,154,0.30)","rgba(224,168,168,0.30)"];
    const REASON_STROKES_C4=["#f4a6a0","#89c4e1","#c5a3d9","#8ecfb0","#f6c88a","#a0bfe0","#e8b4c8","#7ecac1","#d4b896","#b0c4ef","#c9e49a","#e0a8a8"];

    function Chart4({deals,gran}){
      const{data,allReasons}=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?25:gran==="WoW"?10:8;
        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){
          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        // Methodology cutover: 22/04/2026 — date_drafting_query workflow went live.
        // Pre-cutover buckets: numerator = deals that exited proofreading in the bucket AND have drafting_query_reason populated.
        // Post-cutover buckets: numerator = deals whose date_drafting_query (workflow-stamped first query) falls in the bucket.
        // Denominator (both): deals that exited Required — Proof Reading in the bucket.
        const CUTOVER_DATE=new Date(Date.UTC(2026,3,22));
        const isNewLogic=b=>bucketStartDate(b,gran)>=CUTOVER_DATE;
        const periodData={};
        const reasonSet=new Set();
        const reasonData={};
        deals.forEach(d=>{
          // Denominator + pre-cutover numerator (both anchored on exitedProofreading)
          if(d.exitedProofreading){
            const b=dateToBucket(d.exitedProofreading,gran);
            if(!periodData[b])periodData[b]={total:0,queried:0};
            periodData[b].total++;
            if(!isNewLogic(b)&&d.queryReasons.length&&!d.queryExcluded){
              periodData[b].queried++;
              if(!reasonData[b])reasonData[b]={};
              d.queryReasons.forEach(r=>{reasonSet.add(r);reasonData[b][r]=(reasonData[b][r]||0)+1;});
            }
          }
          // Post-cutover numerator (anchored on date_drafting_query)
          if(d.firstQueryDate&&d.queryReasons.length>0&&!d.queryExcluded){
            const b=dateToBucket(d.firstQueryDate,gran);
            if(isNewLogic(b)){
              if(!periodData[b])periodData[b]={total:0,queried:0};
              periodData[b].queried++;
              if(d.queryReasons.length){
                if(!reasonData[b])reasonData[b]={};
                d.queryReasons.forEach(r=>{reasonSet.add(r);reasonData[b][r]=(reasonData[b][r]||0)+1;});
              }
            }
          }
        });

        // Sort reasons by total count descending
        const totals={};
        [...reasonSet].forEach(r=>{totals[r]=0;Object.values(reasonData).forEach(w=>{totals[r]+=(w[r]||0);});});
        const allReasons=[...reasonSet].sort((a,b)=>totals[b]-totals[a]);

        const data=uniq.map(bucket=>{
          const wd=periodData[bucket]||{total:0,queried:0};
          const rate=wd.total>0?parseFloat(Math.min((wd.queried/wd.total)*100,100).toFixed(0)):null;
          const row={bucket,label:bucketLabel(bucket,gran),rate,total:wd.total,queried:wd.queried};
          allReasons.forEach(r=>{row[r]=reasonData[bucket]?.[r]||0;});
          return row;
        });
        return{data,allReasons};
      },[deals,gran]);

      return(
        <ResponsiveContainer width="100%" height={380}>
          <ComposedChart data={data} margin={{top:20,right:40,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis yAxisId="left" domain={[0,100]} ticks={[0,5,10,20,50,100]} allowDataOverflow={false} tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} tickFormatter={v=>`${v}%`} label={{value:"Query Rate %",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Reason Count",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>
            <Tooltip content={<StackedTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:10,color:C.text,paddingBottom:4}}/>
            <ReferenceArea yAxisId="left" y1={0} y2={5} fill={C.green} fillOpacity={0.08}/>
            <ReferenceLine yAxisId="left" y={5} stroke={C.green} strokeDasharray="8 4" strokeWidth={2} label={{value:"5%",position:"insideBottomRight",fill:C.green,fontSize:12,fontWeight:700}}/>
            <ReferenceLine yAxisId="left" y={10} stroke={C.amber} strokeDasharray="8 4" strokeWidth={2} label={{value:"10%",position:"insideBottomRight",fill:C.amber,fontSize:12,fontWeight:700}}/>
            {allReasons.map((reason,i)=>(
              <Bar key={reason} yAxisId="right" dataKey={reason} stackId="reasons" fill={REASON_COLORS_C4[i%REASON_COLORS_C4.length]} stroke={REASON_STROKES_C4[i%REASON_STROKES_C4.length]} strokeWidth={0.5} barSize={28} radius={i===0?[4,4,0,0]:[0,0,0,0]}/>
            ))}
            <Line yAxisId="left" type="linear" dataKey="rate" name="Query Rate %" stroke="transparent" strokeWidth={0} dot={makeSLALine([{max:5,color:C.green},{max:10,color:C.amber},{max:Infinity,color:C.red}])} activeDot={false} connectNulls isAnimationActive={false}>
              <LabelList dataKey="rate" position="top" fill={C.white} fontSize={10} fontWeight={600} formatter={v=>v!=null?`${v}%`:""} offset={14}/>
            </Line>
          </ComposedChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 5: Proofread Completed & Backlog per Proofreader ──────
    function Chart5({deals,gran,bucket,proofTarget,proofOverrides}){
      const data=useMemo(()=>{
        if(!bucket)return[];
        const mult=gran==="DoD"?1/5:gran==="MoM"?4.33:1;
        const endOfPeriod=bucketEndDate(bucket,gran);

        // Completed counts
        const completed={};
        deals.forEach(d=>{
          if(!d.exitedProofreading)return;
          if(dateToBucket(d.exitedProofreading,gran)!==bucket)return;
          if(!d.prooferName||d.prooferName==="Unknown"||/^\d+$/.test(d.prooferName))return;
          completed[d.prooferName]=(completed[d.prooferName]||0)+1;
        });

        // Backlog counts
        const backlog={};
        deals.forEach(d=>{
          if(!d.enteredProofreading)return;
          if(d.enteredProofreading>endOfPeriod)return;
          if(d.exitedProofreading&&d.exitedProofreading<=endOfPeriod)return;
          const name=d.prooferName&&d.prooferName!=="Unknown"&&!/^\d+$/.test(d.prooferName)?d.prooferName:"Unassigned";
          backlog[name]=(backlog[name]||0)+1;
        });

        // Merge all proofreader names
        const allNames=new Set([...Object.keys(completed),...Object.keys(backlog)]);
        return Array.from(allNames).map(name=>{
          const comp=completed[name]||0;
          const back=backlog[name]||0;
          const wt=proofOverrides[name]??proofTarget;
          const target=Math.round(wt*mult);
          return{name,completed:comp,backlog:back,target,state:perfState(comp,target)};
        }).filter(d=>d.completed>=1||d.backlog>=1).sort((a,b)=>(b.completed+b.backlog)-(a.completed+a.backlog));
      },[deals,gran,bucket,proofTarget,proofOverrides]);

      const globalTarget=Math.round(proofTarget*(gran==="DoD"?1/5:gran==="MoM"?4.33:1));
      const maxVal=Math.max(...data.map(d=>Math.max(d.completed+d.backlog,d.target)),globalTarget,5);
      if(!data.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No proofreading data in this period</div>;

      const CompletedLabel=({x,y,width,value})=>{
        if(!value)return null;
        return<text x={x+width+4} y={y+11} fill={C.white} fontSize={11} fontWeight={600}>{value}</text>;
      };
      const BacklogLabel=({x,y,width,value})=>{
        if(!value)return null;
        return<text x={x+width+4} y={y+11} fill="rgba(243,156,18,0.9)" fontSize={11} fontWeight={600}>{value}</text>;
      };

      return(
        <ResponsiveContainer width="100%" height={Math.max(280,data.length*52+60)}>
          <BarChart data={data} layout="vertical" margin={{top:30,right:60,left:10,bottom:10}} barCategoryGap="25%">
            <CartesianGrid horizontal={false} stroke={C.grid} strokeDasharray="3 3"/>
            <XAxis type="number" domain={[0,Math.ceil(maxVal*1.15)]} tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false}/>
            <YAxis type="category" dataKey="name" width={130} tick={{fill:C.text,fontSize:12}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Legend verticalAlign="top" height={28} wrapperStyle={{color:C.text,fontSize:12}}
              payload={[
                {value:"Met",type:"square",color:C.green},
                {value:"Close (within 12.5%)",type:"square",color:C.amber},
                {value:"Below",type:"square",color:C.red},
                {value:"Backlog",type:"square",color:"rgba(243,156,18,0.7)"}
              ]}/>
            <ReferenceLine x={globalTarget} stroke={C.white} strokeDasharray="8 4" strokeWidth={2.5} label={{value:`Target: ${globalTarget}`,position:"top",fill:C.white,fontSize:14,fontWeight:700,offset:10}}/>
            <Bar dataKey="completed" name="Completed" radius={[0,6,6,0]} barSize={18} fill={C.red}>
              <LabelList content={<CompletedLabel/>}/>
              {data.map((entry,i)=>(<Cell key={i} fill={perfColor(entry.state)}/>))}
            </Bar>
            <Bar dataKey="backlog" name="Backlog" radius={[0,6,6,0]} barSize={18} fill="rgba(243,156,18,0.7)">
              <LabelList content={<BacklogLabel/>}/>
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // ─── Settings Panel ─────────────────────────────────────────
    // ─── Chart 6: Drafting Productivity & Avg Turnaround ──────
    function Chart6({deals,gran}){
      const data=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?25:gran==="WoW"?10:8;

        <ResponsiveContainer width="100%" height={340}>

            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis yAxisId="left" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} label={{value:"Avg Days",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Drafted",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>

            <ReferenceLine yAxisId="left" y={28} stroke={C.amber} strokeDasharray="8 4" strokeWidth={2.5} label={{value:"28d Customer SLA",position:"insideBottomRight",fill:C.amber,fontSize:12,fontWeight:700}}/>

    // ─── Chart 7: Query Rate per Drafter (heatmap + drill-down) ─
    function Chart7({deals,gran}){
      const[expanded,setExpanded]=useState(null); // "name|bucket" or null
      const{periods,drafters,grid,dealMap}=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?14:gran==="WoW"?10:8;
        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){
          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const periods=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        // Methodology cutover: 22/04/2026 — date_drafting_query workflow went live.
        // Pre-cutover buckets: numerator = deals that exited proofreading in the bucket AND have drafting_query_reason populated.
        // Post-cutover buckets: numerator = deals whose date_drafting_query falls in the bucket.
        // Denominator (both): deals that exited Required — Proof Reading in the bucket, per drafter.
        const CUTOVER_DATE=new Date(Date.UTC(2026,3,22));
        const isNewLogic=b=>bucketStartDate(b,gran)>=CUTOVER_DATE;
        const byPD={};const dTotals={};const dealMap={};
        deals.forEach(d=>{
          if(!d.drafterName||d.drafterName==="Unknown"||/^\d+$/.test(d.drafterName))return;
          // Denominator + pre-cutover numerator (both anchored on exitedProofreading)
          if(d.exitedProofreading){
            const b=dateToBucket(d.exitedProofreading,gran);
            const key=`${b}|${d.drafterName}`;
            if(!byPD[key])byPD[key]={total:0,queried:0};
            byPD[key].total++;
            dTotals[d.drafterName]=(dTotals[d.drafterName]||0)+1;
            if(!dealMap[key])dealMap[key]=[];
            dealMap[key].push(d);
            if(!isNewLogic(b)&&d.queryReasons.length&&!d.queryExcluded){
              byPD[key].queried++;
            }
          }
          // Post-cutover numerator (anchored on date_drafting_query)
          if(d.firstQueryDate&&d.queryReasons.length>0&&!d.queryExcluded){
            const b=dateToBucket(d.firstQueryDate,gran);
            if(isNewLogic(b)){
              const key=`${b}|${d.drafterName}`;
              if(!byPD[key])byPD[key]={total:0,queried:0};
              byPD[key].queried++;
            }
          }
        });

        const drafters=Object.entries(dTotals).filter(([,c])=>c>=10).map(([n])=>n).sort();

        const grid={};
        drafters.forEach(name=>{
          grid[name]={};
          periods.forEach(bucket=>{
            const pd=byPD[`${bucket}|${name}`];
            if(pd&&pd.total>=1){
              const rate=parseFloat(Math.min((pd.queried/pd.total)*100,100).toFixed(0));
              grid[name][bucket]={rate,total:pd.total,queried:pd.queried};
            }else{grid[name][bucket]=null;}
          });
        });
        return{periods,drafters,grid,dealMap};
      },[deals,gran]);

      // Reset expanded when granularity changes
      useEffect(()=>{setExpanded(null);},[gran]);

      if(!drafters.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No query rate data available</div>;

      function cellBg(rate){
        if(rate==null)return"transparent";
        if(rate<=5)return"rgba(39,174,96,0.25)";
        if(rate<=10)return"rgba(243,156,18,0.25)";
        if(rate<=20)return"rgba(243,156,18,0.4)";
        return"rgba(231,76,60,0.35)";
      }
      function cellColor(rate){
        if(rate==null)return C.text;
        if(rate<=5)return C.green;
        if(rate<=10)return C.amber;
        return C.red;
      }

      const toggleCell=(name,bucket)=>{
        const key=`${bucket}|${name}`;
        setExpanded(prev=>prev===key?null:key);
      };

      const hdrStyle={padding:"6px 8px",fontSize:10,fontWeight:600,color:C.white,borderBottom:`1px solid ${C.border}`,textAlign:"center",position:"sticky",top:0,background:C.surface,whiteSpace:"nowrap"};
      const nameStyle={padding:"6px 10px",fontSize:12,fontWeight:500,color:C.white,borderBottom:`1px solid ${C.border}`,position:"sticky",left:0,background:C.surface,whiteSpace:"nowrap",zIndex:2};
      const cellStyleFn=(rate,isExpanded)=>({padding:"6px 8px",fontSize:11,fontWeight:600,textAlign:"center",borderBottom:`1px solid ${C.border}`,background:cellBg(rate),color:cellColor(rate),minWidth:52,cursor:rate!=null?"pointer":"default",outline:isExpanded?`2px solid ${C.white}`:"none",borderRadius:isExpanded?4:0});

      const expandedDeals=expanded?dealMap[expanded]||[]:[];
      const expandedParts=expanded?expanded.split("|"):[];
      const expandedBucket=expandedParts[0]||"";
      const expandedName=expandedParts[1]||"";

      return(
        <div>
          <div style={{overflowX:"auto",overflowY:"auto",maxHeight:Math.max(300,drafters.length*36+50),borderRadius:8,border:`1px solid ${C.border}`}}>
            <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
              <thead>
                <tr>
                  <th style={{...hdrStyle,textAlign:"left",position:"sticky",left:0,zIndex:3,background:C.surface,minWidth:120}}>Drafter</th>
                  {periods.map(p=><th key={p} style={hdrStyle}>{bucketLabel(p,gran)}</th>)}
                </tr>
              </thead>
              <tbody>
                {drafters.map(name=>(
                  <tr key={name}>
                    <td style={nameStyle}>{name}</td>
                    {periods.map(p=>{
                      const cell=grid[name][p];
                      const rate=cell?cell.rate:null;
                      const key=`${p}|${name}`;
                      const isExp=expanded===key;
                      return(
                        <td key={p} style={cellStyleFn(rate,isExp)} title={cell?`${cell.queried}/${cell.total} queried — click to expand`:""} onClick={()=>cell&&cell.total>0&&toggleCell(name,p)}>
                          {rate!=null?`${rate}%`:"—"}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {expanded&&expandedDeals.length>0&&(()=>{
            // "Queried" matches the numerator definition: must have a drafting_query_reason populated.
            // Entering the Drafting Query stage without a reason no longer counts.
            const isQueried=d=>d.queryReasons&&d.queryReasons.length>0&&!d.queryExcluded;
            const queriedCount=expandedDeals.filter(isQueried).length;
            const excludedCount=expandedDeals.filter(d=>d.queryReasons&&d.queryReasons.length>0&&d.queryExcluded).length;
            const sortedDeals=[...expandedDeals].sort((a,b)=>{const aQ=isQueried(a);const bQ=isQueried(b);return aQ&&!bQ?-1:!aQ&&bQ?1:0;});
            return(
            <div style={{marginTop:12,padding:16,background:"rgba(0,0,0,0.25)",borderRadius:8,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:12,color:C.white,fontWeight:600,marginBottom:10}}>
                {expandedName} — {bucketLabel(expandedBucket,gran)} — {queriedCount} queried / {expandedDeals.length} total{excludedCount>0?` (${excludedCount} excluded — original drafter deactivated)`:""}
                <button style={{...S.btn,padding:"2px 8px",fontSize:10,marginLeft:12,verticalAlign:"middle"}} onClick={()=>setExpanded(null)}>{"\u2715"} Close</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:200,overflowY:"auto"}}>
                {sortedDeals.map(d=>{
                  const hasReason=d.queryReasons&&d.queryReasons.length>0;
                  return(
                  <div key={d.id} style={{fontSize:12,display:"flex",alignItems:"center",gap:12}}>
                    <a href={HS_BASE+d.id} target="_blank" rel="noopener" style={{color:d.queryExcluded?"#888":hasReason?C.red:C.accent,textDecoration:d.queryExcluded?"line-through":"none",fontWeight:500}}>{d.dealname||d.id}</a>
                    {d.queryExcluded?<span style={{fontSize:11,color:"#888",fontStyle:"italic"}}>Excluded ({d.queryExcludedOriginalDrafter||"reassigned"})</span>:hasReason?<span style={{fontSize:11,color:C.text,opacity:0.6}}>{d.queryReasons.join(", ")}</span>:<span style={{fontSize:11,color:C.text,opacity:0.4}}>No query</span>}
                  </div>
                  );
                })}
              </div>
            </div>);
          })()}
        </div>
      );
    }

    // ─── Chart 8: Urgent Productivity & Avg Turnaround (stacked by reason) ──
    const URGENT_COLORS=["rgba(244,166,160,0.30)","rgba(137,196,225,0.30)","rgba(197,163,217,0.30)","rgba(142,207,176,0.30)","rgba(246,200,138,0.30)","rgba(160,191,224,0.30)","rgba(232,180,200,0.30)","rgba(126,202,193,0.30)"];
    const URGENT_STROKES=["#f4a6a0","#89c4e1","#c5a3d9","#8ecfb0","#f6c88a","#a0bfe0","#e8b4c8","#7ecac1"];
    function Chart8({deals,gran}){
      const{data,reasons}=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?25:gran==="WoW"?10:8;
        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){
          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        // Collect all urgent reasons and bucket data
        const reasonSet=new Set();
        const completed={};
        deals.forEach(d=>{
          if(!d.exitedDrafting)return;
          const b=dateToBucket(d.exitedDrafting,gran);
          if(!completed[b])completed[b]={total:0,bizDays:[],byReason:{}};
          completed[b].total++;
          if(d.urgentTurnaroundBizDays!=null)completed[b].bizDays.push(d.urgentTurnaroundBizDays);
          const rs=d.urgentReason&&d.urgentReason.length?d.urgentReason:["Not specified"];
          rs.forEach(r=>{reasonSet.add(r);completed[b].byReason[r]=(completed[b].byReason[r]||0)+1;});
        });

        // Sort reasons by total count descending
        const totals={};
        [...reasonSet].forEach(r=>{totals[r]=0;Object.values(completed).forEach(w=>{totals[r]+=(w.byReason[r]||0);});});
        const reasons=[...reasonSet].sort((a,b)=>totals[b]-totals[a]);
        const data=uniq.map(bucket=>{
          const c=completed[bucket]||{total:0,bizDays:[],byReason:{}};
          const avgBizDays=c.bizDays.length?parseFloat((c.bizDays.reduce((s,v)=>s+v,0)/c.bizDays.length).toFixed(1)):null;
          const row={bucket,label:bucketLabel(bucket,gran),avgBizDays};
          reasons.forEach(r=>{row[r]=c.byReason[r]||0;});
          return row;
        });
        return{data,reasons};
      },[deals,gran]);

      return(
        <ResponsiveContainer width="100%" height={340}>
          <ComposedChart data={data} margin={{top:20,right:40,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis yAxisId="left" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} label={{value:"Avg Biz Days",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Urgents",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>
            <Tooltip content={<StackedTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:11,color:C.text}}/>
            <ReferenceArea yAxisId="left" y1={0} y2={1} fill={C.green} fillOpacity={0.08}/>
            <ReferenceLine yAxisId="left" y={1} stroke={C.red} strokeDasharray="8 4" strokeWidth={2.5} label={{value:"1 Biz Day SLA",position:"insideBottomRight",fill:C.red,fontSize:12,fontWeight:700}}/>
            {reasons.map((r,i)=>(
              <Bar key={r} yAxisId="right" dataKey={r} name={r} stackId="reasons" fill={URGENT_COLORS[i%URGENT_COLORS.length]} stroke={URGENT_STROKES[i%URGENT_STROKES.length]} strokeWidth={0.5} barSize={28} radius={i===reasons.length-1?[4,4,0,0]:[0,0,0,0]}/>
            ))}
            <Line yAxisId="left" type="linear" dataKey="avgBizDays" name="Avg Turnaround" stroke="transparent" strokeWidth={0} dot={makeSLALine([{max:1,color:C.green},{max:Infinity,color:C.red}])} activeDot={false} connectNulls isAnimationActive={false}>
              <LabelList dataKey="avgBizDays" position="top" fill={C.white} fontSize={10} fontWeight={600} formatter={v=>v!=null?`${v}d`:""} offset={12}/>
            </Line>
          </ComposedChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 9: Urgent Avg Turnaround per Drafter (horizontal bar) ──
    function Chart9({deals,gran,bucket}){
      const data=useMemo(()=>{
        const groups={};
        deals.forEach(d=>{
          if(!d.exitedDrafting||d.urgentTurnaroundBizDays==null)return;
          if(dateToBucket(d.exitedDrafting,gran)!==bucket)return;
          if(!d.drafterName||d.drafterName==="Unknown"||/^\d+$/.test(d.drafterName))return;
          (groups[d.drafterName]=groups[d.drafterName]||[]).push(d);
        });
        return Object.entries(groups).map(([name,arr])=>{
          const avg=parseFloat((arr.reduce((s,d)=>s+d.urgentTurnaroundBizDays,0)/arr.length).toFixed(1));
          return{name,avg,count:arr.length};
        }).sort((a,b)=>b.avg-a.avg);
      },[deals,gran,bucket]);

      if(!data.length)return<div style={{padding:40,textAlign:"center",color:C.muted,fontSize:14}}>No urgent drafts completed in this period</div>;

      return(
        <ResponsiveContainer width="100%" height={Math.max(data.length*44+60,180)}>
          <BarChart data={data} layout="vertical" margin={{top:10,right:60,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" horizontal={false}/>
            <XAxis type="number" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}}>
              <Label value="Business Days" position="insideBottom" offset={-5} fill={C.text} fontSize={11}/>
            </XAxis>
            <YAxis dataKey="name" type="category" tick={{fill:C.text,fontSize:11}} width={130}/>
            <Tooltip content={<DarkTooltip/>}/>
            <ReferenceArea x1={0} x2={1} fill={C.green} fillOpacity={0.08}/>
            <ReferenceLine x={1} stroke={C.red} strokeDasharray="8 4" strokeWidth={2.5} label={{value:"1d SLA",position:"top",fill:C.red,fontSize:14,fontWeight:700,offset:10}}/>
            <Bar dataKey="avg" name="Avg Biz Days" barSize={20} radius={[0,4,4,0]}>
              {data.map((entry,i)=><Cell key={i} fill={entry.avg<=1?C.green:C.red}/>)}
              <LabelList dataKey="avg" position="right" fill={C.white} fontSize={12} fontWeight={600} formatter={v=>`${v}d`}/>

      const data=useMemo(()=>{
