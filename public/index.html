          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        // Hybrid: original dates for entered (stable), native dates for exited & backlog
        const entered={};const exited={};
        deals.forEach(d=>{
          // Entered: use original (workflow-stamped) date, fall back to native
          const ent=d.origEnteredDrafting||d.enteredDrafting;
          if(ent){
            const b=dateToBucket(ent,gran);
            entered[b]=(entered[b]||0)+1;
          }
          // Exited: use native (latest exit reflects current reality)
          if(d.nativeExitedDrafting){
            const b=dateToBucket(d.nativeExitedDrafting,gran);
            exited[b]=(exited[b]||0)+1;
          }
        });

        // Midnight snapshot: backlog = deals in DI at 00:00 LOCAL of the
        // last day in each bucket. For in-progress buckets (containing
        // today), cap at today's 00:00 since we can't sample the future.
        // No special-case for "current period" — same computation for every
        // bar, identical to what a nightly cron snapshot would record.
        const todayMidnight=new Date();todayMidnight.setHours(0,0,0,0);
        return uniq.map(bucket=>{
          let snap=bucketLastMidnight(bucket,gran);
          if(snap>todayMidnight)snap=todayMidnight;
          let backlog=0;
          deals.forEach(d=>{
            if(!d.enteredDrafting||d.enteredDrafting>snap)return;
            if(d.nativeExitedDrafting&&d.nativeExitedDrafting<=snap&&d.nativeExitedDrafting>=d.enteredDrafting)return;
            backlog++;
          });
          return{
            bucket,label:bucketLabel(bucket,gran),
            entered:entered[bucket]||0,
            exited:exited[bucket]||0,
            backlog
          };
        });

            </div>
            <div style={{borderTop:`1px solid ${C.grid}`,marginTop:4,paddingTop:4,display:"flex",justifyContent:"space-between",gap:16,marginBottom:3}}>
              <span style={{fontWeight:700}}>Net</span><span style={{fontWeight:700,color:d.net>0?"#e74c3c":d.net<0?C.green:C.text}}>{d.net>0?"+":""}{d.net}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",gap:16}}>
              <span style={{color:C.amber,fontWeight:600}}>Backlog</span><span style={{fontWeight:700,color:C.amber}}>{d.backlog}</span>
            </div>

        );

      const NetLabel=({x,y,width,value})=>{

      };

      return(

          <ComposedChart data={chartData} margin={{top:30,right:50,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis yAxisId="left" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Net Flow",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} domain={[0,Math.ceil(maxBacklog*1.15)]} label={{value:"Backlog",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>
            <Tooltip content={<PipelineTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:11,color:C.text}}/>
            <ReferenceLine yAxisId="left" y={0} stroke={C.text} strokeWidth={1} strokeOpacity={0.3}/>
            <Bar yAxisId="left" dataKey="net" name="Net Flow (Entered \u2212 Exited)" barSize={30} radius={[4,4,4,4]}>

              {chartData.map((entry,i)=>(<Cell key={i} fill={entry.net>0?"rgba(231,76,60,0.45)":entry.net<0?"rgba(46,204,113,0.45)":"rgba(150,150,150,0.3)"} stroke={entry.net>0?"#e74c3c":entry.net<0?"#2ecc71":"#999"} strokeWidth={1}/>))}

    // ─── Chart 17: Appointment Outcome — Avg Turnaround ──────
    // Measures how long deals sit in "Appointment Outcome" (stage
    // 1223751329) before being processed out. SLA = 1 business day
    // (red reference line; green band below).
    //
    // Cohort:
    //   - Any deal with hs_v2_date_entered_1223751329 populated.
    //   - "Exit" date = real exit timestamp if the deal has left the
    //     stage; otherwise treated as "exited today" (running clock).
    //     This deliberately inflates the current bucket when deals are
    //     stuck in Appointment Outcome — the spike is the SLA breach
    //     signal Ops wanted to see.
    // Bucketed by exit date (real or running-clock today).
    // Y-axis: average business days per bucket. Mon-Fri minus UK bank
    // holidays via calcBusinessDaysUK — same convention as the urgent
    // and audit charts so the unit means the same thing everywhere.
    function Chart17({deals,gran}){
      const data=useMemo(()=>{
        const now=new Date();
        const today=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0,0);
        const periodsBack=gran==="DoD"?25:gran==="WoW"?10:8;
        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){
          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        const completed={};
        deals.forEach(d=>{
          if(!d.enteredAppointmentOutcome)return;
          const exit=d.exitedAppointmentOutcome||today;
          const b=dateToBucket(exit,gran);
          if(!b)return;
          const entryDay=new Date(d.enteredAppointmentOutcome);entryDay.setHours(0,0,0,0);
          const exitDay=new Date(exit);exitDay.setHours(0,0,0,0);
          // calcBusinessDaysUK returns null when end <= start. Two distinct
          // cases for us: same-day entry+exit (SLA MET — count as 0 biz
          // days, the deal moved through in well under a day) vs reversed
          // dates (exit before entry — bad data, skip).
          let bizDays=calcBusinessDaysUK(entryDay,exitDay);
          if(bizDays===null){
            if(entryDay.getTime()===exitDay.getTime())bizDays=0;
            else return; // reversed timestamps — bad data
          }
          if(bizDays<0)return;
          (completed[b]=completed[b]||{total:0,bizDays:[],breached:0});
          completed[b].total++;
          completed[b].bizDays.push(bizDays);
          // SLA = 1 biz day. Breach = strictly more than 1 (consistent with
          // makeSLALine which colours dots green ≤1, red >1).
          if(bizDays>1)completed[b].breached++;
        });

        return uniq.map(bucket=>{
          const c=completed[bucket]||{total:0,bizDays:[],breached:0};
          const avgBizDays=c.bizDays.length?parseFloat((c.bizDays.reduce((s,v)=>s+v,0)/c.bizDays.length).toFixed(1)):null;
          const breachedPct=c.total>0?parseFloat(((c.breached/c.total)*100).toFixed(1)):null;
          return{bucket,label:bucketLabel(bucket,gran),total:c.total,breached:c.breached,avgBizDays,breachedPct};
        });
      },[deals,gran]);

      const maxAvg=Math.max(...data.map(d=>d.avgBizDays||0),2);

      // Inline-label content: per-dot label shows "Xd · Y%" — the avg
      // turnaround and the breach rate side by side, so both signals are
      // visible without a second axis or a separate line.
      const renderAvgBreachLabel=(props)=>{
        const{x,y,value,index}=props;
        if(value==null)return null;
        const point=data[index];
        const pct=point&&point.breachedPct!=null?point.breachedPct:null;
        const label=pct!=null?`${value}d · ${pct}%`:`${value}d`;
        return(
          <text x={x} y={y-12} fill={C.white} fontSize="10" fontWeight="600" textAnchor="middle">{label}</text>
        );
      };

      // Tooltip with the full breakdown — Total / Met / Breached / Avg —
      // since only the avg is plotted as a visible dot, the user needs the
      // tooltip to see why the breach % at the dot is what it is.
      const Chart17Tooltip=({active,payload})=>{
        if(!active||!payload||!payload.length)return null;
        const p=payload[0].payload;
        if(!p)return null;
        const total=p.total||0;
        const breached=p.breached||0;
        const met=total-breached;
        const metPct=total>0?Math.round((met/total)*100):0;
        const breachPct=p.breachedPct!=null?p.breachedPct:0;
        return(
          <div style={{background:"#222",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.text,minWidth:160}}>
            <div style={{fontWeight:600,color:C.white,marginBottom:6}}>{p.label}</div>
            <div>Total deals: <span style={{color:C.white,fontWeight:600}}>{total}</span></div>
            <div style={{color:C.green}}>Met SLA: {met} ({metPct}%)</div>
            <div style={{color:C.red}}>Breached: {breached} ({breachPct}%)</div>
            <div style={{marginTop:4,paddingTop:4,borderTop:`1px solid ${C.border}`}}>
              Avg turnaround: <span style={{color:C.white,fontWeight:600}}>{p.avgBizDays!=null?`${p.avgBizDays}d`:"—"}</span>
            </div>
          </div>
        );
      };

      return(
        <ResponsiveContainer width="100%" height={340}>
          <LineChart data={data} margin={{top:20,right:40,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} domain={[0,Math.ceil(maxAvg*1.2)]} label={{value:"Avg Biz Days",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <Tooltip content={<Chart17Tooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:11,color:C.text}}/>
            <ReferenceArea y1={0} y2={1} fill={C.green} fillOpacity={0.08}/>
            <ReferenceLine y={1} stroke={C.red} strokeDasharray="8 4" strokeWidth={2.5} label={{value:"1 Biz Day SLA",position:"insideBottomRight",fill:C.red,fontSize:12,fontWeight:700}}/>
            <Line type="linear" dataKey="avgBizDays" name="Avg Turnaround" stroke="transparent" strokeWidth={0} dot={makeSLALine([{max:1,color:C.green},{max:Infinity,color:C.red}])} activeDot={false} connectNulls isAnimationActive={false}>
              <LabelList dataKey="avgBizDays" content={renderAvgBreachLabel}/>
            </Line>
          </LineChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 15: Consultant Query Rate — Trend ──────────────
    // Cohort: deals that exited "Appointment Outcome" in the period.

    function Chart15({deals,gran}){
      const{data,allReasons}=useMemo(()=>{
        const now=new Date();

        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){

          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        const periodData={};
        const reasonSet=new Set();
        const reasonData={};
        deals.forEach(d=>{
          if(!d.exitedAppointmentOutcome)return;
          const b=dateToBucket(d.exitedAppointmentOutcome,gran);
          if(!periodData[b])periodData[b]={total:0,queried:0};
          periodData[b].total++;
          if(d.consultantQueryReasons&&d.consultantQueryReasons.length){
            periodData[b].queried++;
            if(!reasonData[b])reasonData[b]={};
            d.consultantQueryReasons.forEach(r=>{reasonSet.add(r);reasonData[b][r]=(reasonData[b][r]||0)+1;});
          }
        });

        const totals={};
        [...reasonSet].forEach(r=>{totals[r]=0;Object.values(reasonData).forEach(w=>{totals[r]+=(w[r]||0);});});
        const allReasons=[...reasonSet].sort((a,b)=>totals[b]-totals[a]);

        const data=uniq.map(bucket=>{
          const wd=periodData[bucket]||{total:0,queried:0};
          const rate=wd.total>0?parseFloat(Math.min((wd.queried/wd.total)*100,100).toFixed(0)):null;
          const row={bucket,label:bucketLabel(bucket,gran),rate,total:wd.total,queried:wd.queried};
          allReasons.forEach(r=>{row[r]=reasonData[bucket]?.[r]||0;});
          return row;
        });
        return{data,allReasons};
      },[deals,gran]);

      return(
        <ResponsiveContainer width="100%" height={380}>
          <ComposedChart data={data} margin={{top:20,right:40,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis yAxisId="left" domain={[0,100]} ticks={[0,5,10,20,50,100]} allowDataOverflow={false} tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} tickFormatter={v=>`${v}%`} label={{value:"Query Rate %",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Reason Count",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>
            <Tooltip content={<StackedTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:10,color:C.text,paddingBottom:4}}/>
            <ReferenceArea yAxisId="left" y1={0} y2={5} fill={C.green} fillOpacity={0.08}/>
            <ReferenceLine yAxisId="left" y={5} stroke={C.green} strokeDasharray="8 4" strokeWidth={2} label={{value:"5%",position:"insideBottomRight",fill:C.green,fontSize:12,fontWeight:700}}/>
            <ReferenceLine yAxisId="left" y={10} stroke={C.amber} strokeDasharray="8 4" strokeWidth={2} label={{value:"10%",position:"insideBottomRight",fill:C.amber,fontSize:12,fontWeight:700}}/>
            {allReasons.map((reason,i)=>(
              <Bar key={reason} yAxisId="right" dataKey={reason} stackId="reasons" fill={REASON_COLORS_C4[i%REASON_COLORS_C4.length]} stroke={REASON_STROKES_C4[i%REASON_STROKES_C4.length]} strokeWidth={0.5} barSize={28} radius={i===0?[4,4,0,0]:[0,0,0,0]}/>
            ))}
            <Line yAxisId="left" type="linear" dataKey="rate" name="Query Rate %" stroke="transparent" strokeWidth={0} dot={makeSLALine([{max:5,color:C.green},{max:10,color:C.amber},{max:Infinity,color:C.red}])} activeDot={false} connectNulls isAnimationActive={false}>
              <LabelList dataKey="rate" position="top" fill={C.white} fontSize={10} fontWeight={600} formatter={v=>v!=null?`${v}%`:""} offset={14}/>
            </Line>
          </ComposedChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 18: Consultant Query Rate per EPC — Top 10 ──
    // Horizontal bar chart, top 10 EPCs by query rate in the selected
    // bucket. Mirrors Chart 15's cohort and rate definition (deals that
    // exited Appointment Outcome → those with consultant_query_reason
    // populated), but grouped by `will_consultant` (the Estate Planning
    // Consultant on the deal). Min 5 deals per EPC to qualify — avoids
    // "1 query of 1 deal = 100%" outliers polluting the leaderboard.
    //
    // Each bar is stacked by query reason — same colour palette as Chart
    // 15. Per-reason segment width is proportional to that reason's share
    // of the EPC's queries, scaled so all segments together sum to the
    // EPC's total rate. Reference lines at 5% (green) and 10% (amber) sit
    // on the x-axis so the threshold cues survive the reason colouring.
    function Chart18({deals,gran,bucket}){
      const{data,allReasons}=useMemo(()=>{
        const groups={}; // EPC name → { total, queried, byReason }
        deals.forEach(d=>{
          if(!d.exitedAppointmentOutcome)return;
          if(dateToBucket(d.exitedAppointmentOutcome,gran)!==bucket)return;
          const epc=(d.willConsultant||"").trim();
          if(!epc||epc==="Unknown"||/^\d+$/.test(epc))return;
          if(!groups[epc])groups[epc]={total:0,queried:0,byReason:{}};
          groups[epc].total++;
          if(d.consultantQueryReasons&&d.consultantQueryReasons.length){
            groups[epc].queried++;
            d.consultantQueryReasons.forEach(r=>{
              groups[epc].byReason[r]=(groups[epc].byReason[r]||0)+1;
            });
          }
        });

        // All unique reasons across the cohort, sorted by total count
        // descending — keeps the stack order consistent across bars and
        // matches Chart 15's reason ordering.
        const reasonTotals={};
        Object.values(groups).forEach(g=>{
          Object.entries(g.byReason).forEach(([r,c])=>{
            reasonTotals[r]=(reasonTotals[r]||0)+c;
          });
        });
        const allReasons=Object.keys(reasonTotals).sort((a,b)=>reasonTotals[b]-reasonTotals[a]);

        const data=Object.entries(groups)
          .filter(([,g])=>g.total>=5)
          .map(([name,g])=>{
            const rate=parseFloat(((g.queried/g.total)*100).toFixed(1));
            const sumReasons=Object.values(g.byReason).reduce((s,v)=>s+v,0);
            const row={name,total:g.total,queried:g.queried,rate};
            // Per-reason segment: proportional to reason's share of this
            // EPC's queries, scaled to fit within the rate. Segments sum
            // to the rate exactly (rounding aside), so the bar's total
            // visual length still reads as the % breach.
            allReasons.forEach(r=>{
              const c=g.byReason[r]||0;
              row[r]=sumReasons>0?parseFloat(((c/sumReasons)*rate).toFixed(2)):0;
            });
            // Stash raw reason counts on a hidden key for the tooltip —
            // the rendered segment values are in %, but the tooltip should
            // surface the underlying counts which are more actionable.
            row.__reasonCounts=g.byReason;
            return row;
          })
          .sort((a,b)=>b.rate-a.rate)
          .slice(0,10);
        return{data,allReasons};
      },[deals,gran,bucket]);

      if(!data.length){
        return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No EPCs with ≥5 deals exited Appointment Outcome in this period</div>;
      }

      const maxRate=Math.max(...data.map(d=>d.rate),12);

      // Custom tooltip — shows the EPC, totals, rate, and the per-reason
      // count breakdown (raw counts, not the proportional %s used for
      // segment widths). Renders only non-zero reasons.
      const Chart18Tooltip=({active,payload,label})=>{
        if(!active||!payload||!payload.length)return null;
        const point=payload[0].payload;
        if(!point)return null;
        const counts=point.__reasonCounts||{};
        const reasonsList=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
        return(
          <div style={{background:"#222",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.text,minWidth:200}}>
            <div style={{fontWeight:600,color:C.white,marginBottom:4}}>{label||point.name}</div>
            <div>Total deals: <span style={{color:C.white,fontWeight:600}}>{point.total}</span></div>
            <div>Queried: <span style={{color:C.white,fontWeight:600}}>{point.queried}</span> ({point.rate}%)</div>
            {reasonsList.length>0&&(
              <div style={{marginTop:4,paddingTop:4,borderTop:`1px solid ${C.border}`}}>
                <div style={{fontWeight:600,color:C.white,marginBottom:2}}>Reasons</div>
                {reasonsList.map(([r,c],i)=>(
                  <div key={r} style={{color:REASON_STROKES_C4[allReasons.indexOf(r)%REASON_STROKES_C4.length]}}>{r}: {c}</div>
                ))}
              </div>
            )}
          </div>
        );
      };

      // Renders the total-rate label ("X% (queried/total)") at the right
      // end of each EPC's stacked bar. Done via Customized so the label x
      // position uses the actual rate value via the axis scale — robust
      // even when an EPC's last-listed reason segment is 0.
      const RateEndLabels=(props)=>{
        const{yAxisMap,xAxisMap}=props||{};
        if(!yAxisMap||!xAxisMap)return null;
        const yAxis=yAxisMap[Object.keys(yAxisMap)[0]];
        const xAxis=xAxisMap[Object.keys(xAxisMap)[0]];
        if(!yAxis||!xAxis||!yAxis.scale||!xAxis.scale)return null;
        const yScale=yAxis.scale;
        const xScale=xAxis.scale;
        const bw=yScale.bandwidth?yScale.bandwidth():22;
        return(
          <g>
            {data.map(row=>{
              const bandY=yScale(row.name);
              if(bandY==null)return null;
              const xPos=xScale(row.rate);
              return(
                <text key={row.name} x={xPos+8} y={bandY+bw/2+4} fill={C.white} fontSize={11} fontWeight={600}>
                  {row.rate}% ({row.queried}/{row.total})
                </text>
              );
            })}
          </g>
        );
      };

      return(
        <ResponsiveContainer width="100%" height={Math.max(280,data.length*42+60)}>
          <BarChart data={data} layout="vertical" margin={{top:20,right:120,left:10,bottom:10}}>
            <CartesianGrid horizontal={false} stroke={C.grid} strokeDasharray="3 3"/>
            <XAxis type="number" domain={[0,Math.ceil(maxRate*1.15)]} unit="%" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}}/>
            <YAxis type="category" dataKey="name" width={140} tick={{fill:C.text,fontSize:12}} axisLine={false} tickLine={false}/>
            <Tooltip content={<Chart18Tooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:10,color:C.text,paddingBottom:4}}/>
            <ReferenceLine x={5} stroke={C.green} strokeDasharray="6 4" strokeWidth={2} label={{value:"5%",position:"top",fill:C.green,fontSize:11,fontWeight:700}}/>
            <ReferenceLine x={10} stroke={C.amber} strokeDasharray="6 4" strokeWidth={2} label={{value:"10%",position:"top",fill:C.amber,fontSize:11,fontWeight:700}}/>
            {allReasons.map((reason,i)=>(
              <Bar
                key={reason}
                dataKey={reason}
                name={reason}
                stackId="reasons"
                fill={REASON_COLORS_C4[i%REASON_COLORS_C4.length]}
                stroke={REASON_STROKES_C4[i%REASON_STROKES_C4.length]}
                strokeWidth={0.5}
                barSize={22}
                radius={i===allReasons.length-1?[0,6,6,0]:[0,0,0,0]}
                isAnimationActive={false}
              />
            ))}
            <Customized component={RateEndLabels}/>
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 14: Drafter Activity Heatmap ────────────────────
    function ActivityHeatmap({drafterNames:drafterNamesProp,onTableData,deals:allDeals}){
      const[activityData,setActivityData]=useState(null);
      const[activityLoading,setActivityLoading]=useState(false);
      const[selectedDate,setSelectedDate]=useState(()=>{const d=new Date();return d.toISOString().slice(0,10);});

      const loadActivity=useCallback(async()=>{
        setActivityLoading(true);
        try{
          const res=await fetch("/api/activity");
          if(!res.ok)throw new Error("Failed to fetch activity");
          const data=await res.json();
          setActivityData(data);
        }catch(e){console.error(e);}
        setActivityLoading(false);
      },[]);

      useEffect(()=>{loadActivity();},[loadActivity]);

      const heatmapData=useMemo(()=>{
        if(!activityData)return{drafters:[],hours:[],grid:{}};

        // ownerMap maps HubSpot owner IDs → names (from /api/activity)
        // drafterNamesProp is an array of drafter names from processed deals
        const ownerMap=activityData.ownerMap||{};
        const knownDrafters=new Set((drafterNamesProp||[]).map(n=>n.trim().toLowerCase()));

        // Build reverse lookup: for each HubSpot owner, check if their name matches a known drafter
        const drafterOwnerIds=new Set();
        Object.entries(ownerMap).forEach(([ownerId,name])=>{
          if(knownDrafters.has(name.trim().toLowerCase()))drafterOwnerIds.add(ownerId);
        });

        const hours=[];
        for(let h=7;h<=19;h++)hours.push(h);

        const selDate=selectedDate; // "YYYY-MM-DD"

        // Build grid: {ownerId: {hour: count}} and collect individual activities per drafter.
        // proofGrid is a parallel grid tracking only the proofreader-attributed
        // events so the heatmap can colour proofreading distinctly from drafting.
        const grid={};
        const proofGrid={};
        const activitiesByOwner={};
        (activityData.activities||[]).forEach(a=>{
          if(!drafterOwnerIds.has(a.ownerId))return;
          const dt=new Date(a.timestamp);
          // Use local date (not UTC) so hours and date align with user's timezone
          const dateStr=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
          if(dateStr!==selDate)return;
          const hour=dt.getHours();
          if(!grid[a.ownerId])grid[a.ownerId]={};
          grid[a.ownerId][hour]=(grid[a.ownerId][hour]||0)+1;
          if(!activitiesByOwner[a.ownerId])activitiesByOwner[a.ownerId]=[];
          activitiesByOwner[a.ownerId].push(a);
        });

        // Inject deal stage movements as activities
        // Build name→ownerId map for matching deals to owners
        const nameToOwnerId={};
        Object.entries(ownerMap).forEach(([id,name])=>{
          if(drafterOwnerIds.has(id))nameToOwnerId[name.trim().toLowerCase()]=id;
        });

        const stageEvents=[
          {key:"origDraftsWithCustomer",label:"\u2192 Drafts With Customer"},
          // Ready For Printing intentionally excluded \u2014 usually stamped by an
          // automated workflow rather than a drafter action, so counting it
          // inflates drafter activity for moves they didn't actually make.
          {key:"enteredProofreading",label:"\u2192 Required - Proof Reading"},
          {key:"enteredConsultantQuery",label:"\u2192 Consultant Query"},
          {key:"exitedApproved",label:"\u2192 Exited Approved"},
        ];

        // Helper — push a stage event into grid + activities for a given
        // owner. `isProofer` flag also bumps proofGrid so the cell can be
        // coloured by proofreading-vs-drafting share.
        const pushStageEvent=(oid,ts,deal,label,isProofer)=>{
          const dt=new Date(ts);
          const dateStr=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
          if(dateStr!==selDate)return;
          const hour=dt.getHours();
          if(!grid[oid])grid[oid]={};
          grid[oid][hour]=(grid[oid][hour]||0)+1;
          if(isProofer){
            if(!proofGrid[oid])proofGrid[oid]={};
            proofGrid[oid][hour]=(proofGrid[oid][hour]||0)+1;
          }
          if(!activitiesByOwner[oid])activitiesByOwner[oid]=[];
          activitiesByOwner[oid].push({
            id:deal.id,
            ownerId:oid,
            timestamp:dt.getTime(),
            type:"Stage Move",
            dealIds:[deal.id],
            _stageLabel:label,
            _dealName:deal.dealname,
            _isProofer:!!isProofer
          });
        };

        (allDeals||[]).forEach(deal=>{
          const drafterLower=(deal.drafterName||"").trim().toLowerCase();
          const oid=nameToOwnerId[drafterLower];

          // Drafter-attributed stage moves (existing behaviour).
          if(oid){
            stageEvents.forEach(ev=>{
              const ts=deal[ev.key];
              if(!ts)return;
              pushStageEvent(oid,ts,deal,ev.label,false);
            });
          }

          // Proofreader-attributed stage moves: when the deal's
          // proof_reading__owner is ALSO a known drafter (e.g. Neelam who
          // does both roles), credit them for the proofreader's decisions.
          //   - Entered "Approved - Proof Reading" → proofer signed off
          //   - Entered "Drafting Query" when that entry is AFTER entering RP
          //     → proofer queried the drafter (vs. drafter querying customer)
          // Only fire when the proofer's owner ID is in drafterOwnerIds, so
          // pure proofreaders aren't injected as heatmap rows.
          const prooferLower=(deal.prooferName||"").trim().toLowerCase();
          const proofOid=nameToOwnerId[prooferLower];
          if(proofOid){
            if(deal.enteredApproved){
              pushStageEvent(proofOid,deal.enteredApproved,deal,"→ Approved Proof Reading",true);
            }
            if(deal.enteredDraftingQuery&&deal.enteredProofreading&&deal.enteredDraftingQuery>=deal.enteredProofreading){
              pushStageEvent(proofOid,deal.enteredDraftingQuery,deal,"→ Drafting Query (Proofer)",true);
            }
          }
        });

        // Build drafter list — only known drafters
        const drafters=[...drafterOwnerIds].map(id=>({
          id,
          name:ownerMap[id]||id
        })).filter(d=>d.name&&d.name!=="Unknown"&&!/^\d+$/.test(d.name)).sort((a,b)=>a.name.localeCompare(b.name));

        return{drafters,hours,grid,proofGrid,activitiesByOwner};
      },[activityData,drafterNamesProp,selectedDate,allDeals]);

      const{drafters,hours,grid,proofGrid,activitiesByOwner}=heatmapData;

      // Expose table data to parent ChartCard
      useEffect(()=>{
        if(!onTableData)return;
        const HS_ENGAGE_BASE="https://app.hubspot.com/contacts/4385478/record/0-";
        const typeMap={notes:"4",calls:"48",tasks:"27",email:"49",incoming_email:"49",meeting:"10"};
        const cols=[{key:"name",label:"Drafter"},{key:"total",label:"Total Activities"},{key:"activeHours",label:"Active Hours"}];
        const detailCols=[{key:"type",label:"Type"},{key:"time",label:"Time"},{key:"dealLinks",label:"Linked Deals"}];
        const rows=[];
        const detailMap={};
        drafters.forEach(d=>{
          const row=grid[d.id]||{};
          const totalAct=hours.reduce((s,h)=>s+(row[h]||0),0);
          const activeH=hours.filter(h=>row[h]>0).length;
          rows.push({_key:d.id,name:d.name,total:totalAct,activeHours:activeH});
          // Build detail rows from individual activities
          const acts=activitiesByOwner[d.id]||[];
          detailMap[d.id]=acts.map(a=>{
            const dt=new Date(a.timestamp);
            const timeStr=String(dt.getHours()).padStart(2,"0")+":"+String(dt.getMinutes()).padStart(2,"0");
            const isStageMove=a.type==="Stage Move";
            const typeCode=typeMap[(a.type||"").toLowerCase()]||"";
            const dealUrl="https://app.hubspot.com/contacts/4385478/deal/"+a.id;
            const engUrl=isStageMove?dealUrl:(a.url||(a.id&&typeCode?HS_ENGAGE_BASE+typeCode+"/"+a.id:null));
            const dealLinks=(a.dealIds||[]).map(did=>"https://app.hubspot.com/contacts/4385478/deal/"+did);
            const displayName=isStageMove
              ?(a._dealName||a.id)+" "+a._stageLabel
              :a.type+" @ "+timeStr;
            return{
              id:a.id||String(a.timestamp),
              dealname:displayName,
              type:isStageMove?"Stage Move":a.type,
              time:timeStr,
              dealLinks:isStageMove?(a._dealName||"Deal"):dealLinks.length?dealLinks.length+" deal(s)":"\u2014",
              _engUrl:engUrl,
              _dealUrls:isStageMove?[dealUrl]:dealLinks
            };
          }).sort((a,b)=>a.time.localeCompare(b.time));
        });
        onTableData({columns:cols,rows,detailMap,detailCols,csvName:`drafter_activity_${selectedDate}.csv`});
      },[drafters,hours,grid,activitiesByOwner,selectedDate,onTableData]);

      // Date navigation
      const changeDate=(delta)=>{
        const d=new Date(selectedDate+"T12:00:00");
        d.setDate(d.getDate()+delta);
        setSelectedDate(d.toISOString().slice(0,10));
      };
      const dayLabel=new Date(selectedDate+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});

      if(activityLoading&&!activityData)return<div style={{color:C.text,textAlign:"center",padding:40}}>Loading activity data...</div>;

      return(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            <button onClick={()=>changeDate(-1)} style={{background:C.surface,border:`1px solid ${C.grid}`,color:C.text,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:14}}>&larr;</button>
            <span style={{color:C.white,fontWeight:700,fontSize:15,minWidth:140,textAlign:"center"}}>{dayLabel}</span>
            <button onClick={()=>changeDate(1)} style={{background:C.surface,border:`1px solid ${C.grid}`,color:C.text,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:14}}>&rarr;</button>
            <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={{background:C.surface,border:`1px solid ${C.grid}`,color:C.text,borderRadius:6,padding:"6px 10px",fontSize:12}}/>
            <div style={{flex:1}}/>
            <div style={{display:"flex",alignItems:"center",gap:14,fontSize:11,color:C.muted}}>
              <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                <span style={{display:"inline-block",width:14,height:10,background:"rgba(46,204,113,0.5)",borderRadius:2}}/>
                Drafting
              </span>
              <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                <span style={{display:"inline-block",width:14,height:10,background:"rgba(155,89,182,0.5)",borderRadius:2}}/>
                Proofreading
              </span>
            </div>
          </div>
          {!drafters.length?(
            <div style={{color:C.muted,textAlign:"center",padding:40}}>No drafter activity data for this date</div>
          ):(
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
                <thead>
                  <tr>
                    <th style={{textAlign:"left",padding:"6px 10px",color:C.text,fontWeight:600,borderBottom:`1px solid ${C.grid}`,position:"sticky",left:0,background:C.surface,zIndex:1,minWidth:130}}>Drafter</th>
                    {hours.map(h=>(
                      <th key={h} style={{padding:"6px 4px",color:C.text,fontWeight:600,borderBottom:`1px solid ${C.grid}`,textAlign:"center",minWidth:42,fontSize:11}}>{String(h).padStart(2,"0")}:00</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {drafters.map(d=>{
                    const row=grid[d.id]||{};
                    const proofRow=proofGrid[d.id]||{};
                    const totalHours=hours.filter(h=>row[h]>0).length;
                    return(
                      <tr key={d.id}>
                        <td style={{padding:"6px 10px",color:C.text,borderBottom:`1px solid rgba(255,255,255,0.05)`,position:"sticky",left:0,background:C.surface,zIndex:1,fontWeight:500}}>
                          {d.name} <span style={{color:C.muted,fontSize:10,fontWeight:400}}>({totalHours}h)</span>
                        </td>
                        {hours.map(h=>{
                          const count=row[h]||0;
                          const proof=proofRow[h]||0;
                          const draft=count-proof;
                          // Intensity scales with total count (same thresholds as before).
                          const alpha=count===0?0:count<=2?0.25:count<=5?0.5:0.8;
                          // Drafting = green (rgba(46,204,113,a))
                          // Proofreading = purple (rgba(155,89,182,a)) — matches
                          // the "in proofreading" purple used elsewhere in the
                          // dashboard (Coral product chip, etc.).
                          let bg;
                          if(count===0)bg="rgba(255,255,255,0.03)";
                          else if(proof===0)bg=`rgba(46,204,113,${alpha})`;
                          else if(draft===0)bg=`rgba(155,89,182,${alpha})`;
                          else{
                            // Mixed cell: horizontal split, drafting on the left,
                            // proofreading on the right, proportional to counts.
                            const draftPct=Math.round((draft/count)*100);
                            bg=`linear-gradient(to right, rgba(46,204,113,${alpha}) 0%, rgba(46,204,113,${alpha}) ${draftPct}%, rgba(155,89,182,${alpha}) ${draftPct}%, rgba(155,89,182,${alpha}) 100%)`;
                          }
                          const titleParts=[`${d.name} @ ${h}:00 — ${count} activit${count===1?"y":"ies"}`];
                          if(proof>0)titleParts.push(`${draft} drafting · ${proof} proofreading`);
                          return(
                            <td key={h} style={{padding:"6px 4px",borderBottom:`1px solid rgba(255,255,255,0.05)`,textAlign:"center",background:bg,borderRadius:3,transition:"background 0.2s"}} title={titleParts.join(" — ")}>
                              {count>0?<span style={{color:C.white,fontWeight:600,fontSize:11}}>{count}</span>:<span style={{color:"rgba(255,255,255,0.1)"}}>&mdash;</span>}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ─── Shared SLA backlog chart (used by both SLA tables) ────

    // its anchor date and tally counts split by SLA status.
    function SLABacklogChart({rows,getBucketDate,getStatus,dateLabel,gran,setGran,selectedBucket,setSelectedBucket}){
      const data=useMemo(()=>{
        const counts={};
        rows.forEach(r=>{
          const dt=getBucketDate(r);
          if(!dt)return;
          const b=dateToBucket(dt,gran);
          if(!counts[b])counts[b]={bucket:b,label:bucketLabel(b,gran),breached:0,close:0,warning:0,comfortable:0};
          counts[b][getStatus(r)]++;
        });
        return Object.values(counts).sort((a,b)=>a.bucket.localeCompare(b.bucket));
      },[rows,gran,getBucketDate,getStatus]);

      const handleChartClick=useCallback(e=>{
        const b=e&&e.activePayload&&e.activePayload[0]&&e.activePayload[0].payload&&e.activePayload[0].payload.bucket;
        if(!b)return;
        setSelectedBucket(prev=>prev===b?null:b);
      },[setSelectedBucket]);

      // Faded fill helpers — non-selected bars get reduced opacity when a bucket is picked
      const fade=(active,colorActive,colorFaded)=>active?colorActive:colorFaded;
      const cellsFor=(activeColor,fadedColor)=>data.map((d,i)=>(

                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                {["DoD","WoW"].map(g=>(
                  <button key={g} style={S.toggle(gran===g)} onClick={()=>setGran(g)}>{g}</button>

              </div>
            </div>
            {data.length===0?(

                  <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
                  <YAxis tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Deals",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
                  <Tooltip content={<StackedTooltip/>} cursor={{fill:"rgba(255,255,255,0.04)"}}/>
                  <Legend verticalAlign="top" height={24} wrapperStyle={{color:C.text,fontSize:11}}
                    payload={[
                      {value:"Breached",type:"square",color:C.red},
                      {value:"Close",type:"square",color:C.amber},
                      {value:"Warning",type:"square",color:"#F1C40F"},
                      {value:"Comfortable",type:"square",color:C.green}
                    ]}/>
                  <Bar dataKey="breached" name="Breached" stackId="status" barSize={28}>{cellsFor(C.red,"rgba(231,76,60,0.25)")}</Bar>
                  <Bar dataKey="close" name="Close" stackId="status" barSize={28}>{cellsFor(C.amber,"rgba(243,156,18,0.25)")}</Bar>
                  <Bar dataKey="warning" name="Warning" stackId="status" barSize={28}>{cellsFor("#F1C40F","rgba(241,196,15,0.25)")}</Bar>
                  <Bar dataKey="comfortable" name="Comfortable" stackId="status" barSize={28} radius={[4,4,0,0]}>{cellsFor(C.green,"rgba(39,174,96,0.25)")}</Bar>

    // Average business-day turnover (entered → exited RDWC) per Legacy Advisor for selected period.
    function ChartLA3({deals,gran,bucket}){
      const data=useMemo(()=>{
        if(!bucket)return[];
        const groups={};
        deals.forEach(d=>{
          if(!d.exitedRDWC||d.rdwcTurnaroundBizDays==null)return;
          if(dateToBucket(d.exitedRDWC,gran)!==bucket)return;
          const advisor=d.legacyAdvisor||"Unassigned";
          if(/^\d+$/.test(advisor))return;
          (groups[advisor]=groups[advisor]||[]).push(d.rdwcTurnaroundBizDays);

        return Object.entries(groups).map(([name,arr])=>{
          const avg=arr.reduce((s,v)=>s+v,0)/arr.length;
          return{name,avg:parseFloat(avg.toFixed(1)),count:arr.length};
        }).sort((a,b)=>b.avg-a.avg);
      },[deals,gran,bucket]);

      if(!data.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No turnaround data in this period.</div>;

    // ─── Partnerships SLA Table (Macmillan + Coral) ─────────────
    // One table, two cohorts, each evaluated against its own SLA:
    //   Macmillan: 20 working days from Date of Appointment, +14 calendar
    //              days extension when 14-day waiver is unsigned.
    //   Coral:     42 calendar days from Date of Appointment, +14 calendar
    //              days extension when 14-day waiver is unsigned.
    // Days remaining is computed in each partnership's native unit and
    // displayed with a unit suffix. Status thresholds scale per-unit so the
    // red/amber/yellow/green colouring stays comparable:
    //   wd:  breached <0 | close <=2 | warning <=5
    //   cal: breached <0 | close <=3 | warning <=7
    function MacmillanSLATable({deals,stageLabels}){
      const MAC_SLA_WD=20;
      const CORAL_SLA_CAL=42;
      // Normalise stage labels (collapse dash/whitespace/case) so "Required — Proof Reading"
      // matches "Required - Proof Reading" etc.
      const normStage=s=>(s||"").toLowerCase().replace(/[\u2013\u2014-]+/g," ").replace(/\s+/g," ").trim();
      const ALLOWED_STAGES=new Set([
        "drafting instructions",
        "drafting query",
        "required proof reading",
        "approved proof reading"
      ]);
      const[drafterFilter,setDrafterFilter]=useState("__all__");
      const[stageFilter,setStageFilter]=useState(()=>new Set());
      const[partnershipFilter,setPartnershipFilter]=useState(()=>new Set()); // empty = both
      const togglePartnership=name=>{setPartnershipFilter(prev=>{const n=new Set(prev);if(n.has(name))n.delete(name);else n.add(name);return n;});};
      const toggleStage=name=>{setStageFilter(prev=>{const n=new Set(prev);if(n.has(name))n.delete(name);else n.add(name);return n;});};
      const allRows=useMemo(()=>{
        const today=new Date();today.setHours(0,0,0,0);
        const out=[];
        deals.forEach(d=>{
          // Partnership tagging: a deal lands in this table if it matches
          // Macmillan (via ep_lead_source) OR Coral (via lead_source_tier_3).
          // Macmillan wins in the unlikely both-match case.
          const isMacmillan=(d.leadSources||[]).includes("Macmillan");
          const isCoral=((d.leadSourceTier3||"").toLowerCase().includes("coral"));
          if(!isMacmillan&&!isCoral)return;
          if(!d.dateOfAppointment)return;
          const stageLabel=stageLabels[d.dealstage]||d.dealstage||"";
          if(!ALLOWED_STAGES.has(normStage(stageLabel)))return;
          const partnership=isMacmillan?"Macmillan":"Coral";
          const waiverExtension=d.waiverSigned14d===false?14:0;
          let deadline,daysRemaining,daysUnit,slaTargetLabel;
          if(isMacmillan){
            const baseDeadline=addBusinessDays(d.dateOfAppointment,MAC_SLA_WD);
            deadline=new Date(baseDeadline);
            if(waiverExtension)deadline.setDate(deadline.getDate()+waiverExtension);
            daysRemaining=signedBusinessDays(today,deadline);
            daysUnit="wd";
            slaTargetLabel=`${MAC_SLA_WD}wd${waiverExtension?` +${waiverExtension}cal`:""}`;
          }else{
            const appt=new Date(d.dateOfAppointment);appt.setHours(0,0,0,0);
            const totalCalDays=CORAL_SLA_CAL+waiverExtension;
            deadline=new Date(appt);deadline.setDate(deadline.getDate()+totalCalDays);
            daysRemaining=Math.round((deadline-today)/86400000);
            daysUnit="cal";
            slaTargetLabel=`${CORAL_SLA_CAL}cal${waiverExtension?` +${waiverExtension}cal`:""}`;
          }
          out.push({
            id:d.id,
            dealname:d.dealname,
            partnership,
            drafter:d.drafterName&&d.drafterName!=="Unknown"?d.drafterName:"Unassigned",
            appointment:d.dateOfAppointment,
            deadline,
            daysRemaining,
            daysUnit,
            slaTargetLabel,
            // Legacy alias so the existing backlog-chart + row-colour helpers
            // (which read .bizRemaining) keep working unchanged.
            bizRemaining:daysRemaining,
            waiverExtension,
            stage:stageLabels[d.dealstage]||d.dealstage||"—",
            slaBreachReason:d.slaBreachReason||""
          });
        });
        out.sort((a,b)=>(a.daysRemaining??1e9)-(b.daysRemaining??1e9));
        return out;
      },[deals,stageLabels]);

      const drafterOptions=useMemo(()=>{
        const set=new Set();
        allRows.forEach(r=>set.add(r.drafter));
        return Array.from(set).sort((a,b)=>{
          if(a==="Unassigned")return 1;
          if(b==="Unassigned")return -1;
          return a.localeCompare(b);
        });
      },[allRows]);

      const stageOptions=useMemo(()=>{
        const set=new Set();
        allRows.forEach(r=>set.add(r.stage));
        return Array.from(set).sort();
      },[allRows]);

      const chartRows=useMemo(()=>{
        let arr=allRows;
        if(partnershipFilter.size>0)arr=arr.filter(r=>partnershipFilter.has(r.partnership));
        if(drafterFilter!=="__all__")arr=arr.filter(r=>r.drafter===drafterFilter);
        if(stageFilter.size>0)arr=arr.filter(r=>stageFilter.has(r.stage));
        return arr;
      },[allRows,drafterFilter,stageFilter,partnershipFilter]);

      const[gran,setGran]=useState("WoW");
      const[selectedBucket,setSelectedBucket]=useState(null);
      // Reset selected bucket when granularity changes (bucket keys differ).
      useEffect(()=>{setSelectedBucket(null);},[gran]);

      const getBucketDate=useCallback(r=>r.appointment,[]);
      // Per-unit thresholds: working-day rows (Macmillan) keep the original
      // 0 / 2 / 5 thresholds. Calendar-day rows (Coral) use 0 / 3 / 7 so
      // "warning" means a similar amount of clock-time pressure across cohorts.
      const getStatus=useCallback(r=>{
        const n=r.daysRemaining;
        if(n==null)return"comfortable";
        if(n<0)return"breached";
        if(r.daysUnit==="cal"){
          if(n<=3)return"close";
          if(n<=7)return"warning";
          return"comfortable";
        }
        if(n<=2)return"close";
        if(n<=5)return"warning";
        return"comfortable";
      },[]);

      const rows=useMemo(()=>(
        selectedBucket?chartRows.filter(r=>r.appointment&&dateToBucket(r.appointment,gran)===selectedBucket):chartRows
      ),[chartRows,selectedBucket,gran]);

      const rowColor=r=>{
        if(!r||r.daysRemaining==null)return C.text;
        const s=getStatus(r);
        return s==="breached"?C.red:s==="close"?C.amber:s==="warning"?"#F1C40F":C.green;
      };

      const exportCSV=useCallback(()=>{
        const hdr=["Deal ID","Deal Name","Partnership","Drafter","Date of Appointment","SLA Deadline","Days Remaining","Days Unit","SLA Target","Waiver Extension Days","Current Stage","SLA Breach Reason","HubSpot Link"];
        const lines=[hdr,...rows.map(r=>[r.id,r.dealname,r.partnership,r.drafter,fmtDate(r.appointment),fmtDate(r.deadline),r.daysRemaining==null?"":r.daysRemaining,r.daysUnit,r.slaTargetLabel,r.waiverExtension||0,r.stage,r.slaBreachReason||"",HS_BASE+r.id])];
        const drSuffix=drafterFilter==="__all__"?"":`_${drafterFilter.replace(/\s+/g,"_")}`;
        const stSuffix=stageFilter.size===0?"":(stageFilter.size===1?`_${[...stageFilter][0].replace(/[^A-Za-z0-9]+/g,"_")}`:`_${stageFilter.size}stages`);
        const pnSuffix=partnershipFilter.size===0?"":(partnershipFilter.size===1?`_${[...partnershipFilter][0]}`:"");
        const bSuffix=selectedBucket?`_${selectedBucket}`:"";
        downloadCSV(`partnerships_sla${pnSuffix}${drSuffix}${stSuffix}${bSuffix}_${new Date().toISOString().slice(0,10)}.csv`,toCSV(lines));
      },[rows,drafterFilter,stageFilter,selectedBucket,partnershipFilter]);

      return(
        <React.Fragment>
        <SLABacklogChart rows={chartRows} getBucketDate={getBucketDate} getStatus={getStatus} dateLabel="Appointment Date" gran={gran} setGran={setGran} selectedBucket={selectedBucket} setSelectedBucket={setSelectedBucket}/>
        <div style={{padding:"16px 24px"}}>
          <div style={{background:C.surface,borderRadius:12,padding:"20px 20px 16px",border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:16}}>
              <div>
                <div style={{color:C.white,fontSize:16,fontWeight:700}}>Partnerships — Deals Nearing SLA</div>
                <div style={{fontSize:12,color:C.text,opacity:0.7,marginTop:4}}>
                  Macmillan: 20 working days from Date of Appointment. Coral: 42 calendar days from Date of Appointment. Both extend by 14 calendar days when the customer has not signed the 14-day waiver. Only deals currently in Drafting Instructions, Drafting Query, Required — Proof Reading, or Approved — Proof Reading.
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                {selectedBucket&&(
                  <span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,padding:"4px 10px",borderRadius:6,background:"rgba(52,152,219,0.15)",border:`1px solid ${C.accent}`,color:C.accent,fontWeight:600}}>
                    {bucketLabel(selectedBucket,gran)}
                    <button onClick={()=>setSelectedBucket(null)} style={{background:"transparent",border:"none",color:C.accent,cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>{"\u00D7"}</button>
                  </span>
                )}
                <label style={{fontSize:12,color:C.text,opacity:0.7}}>Partnership</label>
                <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  {["Macmillan","Coral"].map(name=>{
                    const active=partnershipFilter.has(name);
                    const count=allRows.filter(r=>r.partnership===name).length;
                    return(
                      <button key={name} onClick={()=>togglePartnership(name)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${active?C.accent:C.border}`,background:active?"rgba(52,152,219,0.18)":C.bg,color:active?C.accent:C.text,cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{name} ({count})</button>
                    );
                  })}
                  {partnershipFilter.size>0&&<button onClick={()=>setPartnershipFilter(new Set())} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.text,cursor:"pointer",fontSize:11,fontWeight:500}}>Clear</button>}
                </div>
                <label style={{fontSize:12,color:C.text,opacity:0.7}}>Drafter</label>
                <select style={S.select} value={drafterFilter} onChange={e=>setDrafterFilter(e.target.value)}>
                  <option value="__all__">All ({allRows.length})</option>
                  {drafterOptions.map(name=>(
                    <option key={name} value={name}>{name} ({allRows.filter(r=>r.drafter===name).length})</option>
                  ))}
                </select>
                <label style={{fontSize:12,color:C.text,opacity:0.7}}>Stage</label>
                <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  {stageOptions.map(name=>{
                    const active=stageFilter.has(name);
                    const count=allRows.filter(r=>r.stage===name).length;
                    return(
                      <button key={name} onClick={()=>toggleStage(name)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${active?C.accent:C.border}`,background:active?"rgba(52,152,219,0.18)":C.bg,color:active?C.accent:C.text,cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{name} ({count})</button>
                    );
                  })}
                  {stageFilter.size>0&&<button onClick={()=>setStageFilter(new Set())} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.text,cursor:"pointer",fontSize:11,fontWeight:500}}>Clear</button>}
                </div>
                <span style={{fontSize:12,color:C.text,opacity:0.7}}>{rows.length} deal{rows.length===1?"":"s"}</span>
                <button style={S.btn} onClick={exportCSV} disabled={!rows.length}>{"\u2B07"} CSV</button>
              </div>
            </div>
            {rows.length===0?(
              <div style={{padding:"32px 16px",textAlign:"center",color:C.text,opacity:0.6,fontSize:13}}>{allRows.length===0?"No open Macmillan or Coral deals with an appointment date.":selectedBucket?"No deals in the selected bucket for the active filters.":"No deals match the active filters."}</div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{borderBottom:`2px solid ${C.border}`,color:C.white,textAlign:"left"}}>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Deal Name</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Record ID</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Partnership</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Drafter</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Appointment</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>SLA Deadline</th>
                      <th style={{padding:"10px 12px",fontWeight:600,textAlign:"right"}}>Days Remaining</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Current Stage</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>SLA Breach Reason</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map(r=>(
                      <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`}}>
                        <td style={{padding:"10px 12px"}}>
                          <a href={HS_BASE+r.id} target="_blank" rel="noopener noreferrer" style={{color:C.accent,textDecoration:"none"}}>{r.dealname}</a>
                          {r.waiverExtension>0&&<span style={{fontSize:10,marginLeft:8,padding:"2px 8px",borderRadius:4,background:"rgba(243,156,18,0.18)",color:C.amber,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>+{r.waiverExtension}d waiver</span>}
                        </td>
                        <td style={{padding:"10px 12px",fontFamily:"ui-monospace,SFMono-Regular,Menlo,monospace",fontSize:12,color:C.text,opacity:0.7}}>{r.id}</td>
                        <td style={{padding:"10px 12px"}}>
                          <span style={{display:"inline-block",fontSize:10,padding:"2px 8px",borderRadius:4,background:r.partnership==="Coral"?"rgba(155,89,182,0.18)":"rgba(52,152,219,0.18)",color:r.partnership==="Coral"?"#9b59b6":C.accent,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>{r.partnership}</span>
                        </td>
                        <td style={{padding:"10px 12px"}}>{r.drafter}</td>
                        <td style={{padding:"10px 12px"}}>{fmtDate(r.appointment)}</td>
                        <td style={{padding:"10px 12px"}}>{fmtDate(r.deadline)}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:rowColor(r)}}>
                          {r.daysRemaining==null?"—":r.daysRemaining<0?`${r.daysRemaining}d ${r.daysUnit} (breached)`:`${r.daysRemaining}d ${r.daysUnit}`}
                        </td>
                        <td style={{padding:"10px 12px"}}>{r.stage}</td>
                        <td style={{padding:"10px 12px",fontSize:12,color:C.text,opacity:r.slaBreachReason?0.85:0.4}}>{r.slaBreachReason||"—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
        </React.Fragment>
      );
    }

    // ─── Standard SLA Table (mixed drafting + amendment cohorts) ──
    // Drafting deals: 28 calendar days from latest of (original_date_entered_drafting_instructions,
    //   dateOfAppointment); excluded if both anchors missing; +14 cal day extension when the
    //   14-day waiver is not signed.
    // Amendment deals (stage 1338772492): business-day SLA from enteredAmendment -- 10 biz days
    //   when amendment_source = "Client amendment", otherwise 1 biz day. No waiver extension.
    function StandardSLATable({deals,stageLabels}){
      const SLA_DAYS=28;
      const AMEND_STAGE="1338772492";
      const normStage=s=>(s||"").toLowerCase().replace(/[\u2013\u2014-]+/g," ").replace(/\s+/g," ").trim();
      const ALLOWED_STAGES=new Set([
        "drafting instructions",
        "drafting query",
        "required proof reading",
        "approved proof reading",
        "amendment requested"
      ]);
      const[drafterFilter,setDrafterFilter]=useState("__all__");
      const[stageFilter,setStageFilter]=useState(()=>new Set());
      const toggleStage=name=>{setStageFilter(prev=>{const n=new Set(prev);if(n.has(name))n.delete(name);else n.add(name);return n;});};
      const allRows=useMemo(()=>{
        const today=new Date();today.setHours(0,0,0,0);
        const out=[];
        deals.forEach(d=>{
          const stageLabel=stageLabels[d.dealstage]||d.dealstage||"";
          if(!ALLOWED_STAGES.has(normStage(stageLabel)))return;

          const isAmendment=d.dealstage===AMEND_STAGE;
          let anchor,deadline,daysRemaining,unit,state,slaTargetDays,waiverExtension=0;
          let amendmentSource="";

          if(isAmendment){
            // Anchor priority:
            //   1. enteredAmendment (hs_v2_date_entered_1338772492) — the
            //      workflow stamp recording when the deal entered Amendment
            //      Requested. Preferred when present.
            //   2. date_of_appointment — fallback for bulk-imported or
            //      manually-moved deals where the workflow never fired and
            //      the stamp is missing. Less precise than the actual
            //      amendment-entry moment, but keeps the deal visible
            //      (typically as breached, which is the right signal: it's
            //      been sitting unactioned for a while).
            // Only drop when BOTH are missing — no usable anchor at all.
            const amendAnchor=d.enteredAmendment||d.dateOfAppointment;
            if(!amendAnchor)return;
            anchor=new Date(amendAnchor);anchor.setHours(0,0,0,0);
            amendmentSource=d.amendmentSource||"";
            const isClientAmend=amendmentSource.trim().toLowerCase()==="client amendment";
            slaTargetDays=isClientAmend?10:1;
            deadline=addBusinessDays(anchor,slaTargetDays);
            daysRemaining=signedBusinessDays(today,deadline);
            unit="biz";
            if(daysRemaining==null)state="comfortable";
            else if(daysRemaining<0)state="breached";
            else if(isClientAmend){
              state=daysRemaining<=1?"close":daysRemaining<=3?"warning":"comfortable";
            }else{
              state=daysRemaining===0?"close":"comfortable";
            }
          }else{
            const candidates=[];
            if(d.origEnteredDrafting)candidates.push(new Date(d.origEnteredDrafting).getTime());
            if(d.dateOfAppointment)candidates.push(new Date(d.dateOfAppointment).getTime());
            if(!candidates.length)return; // no anchor available
            const baseAnchor=new Date(Math.max(...candidates));baseAnchor.setHours(0,0,0,0);
            // 14-day waiver — when the customer hasn't signed, the SLA
            // CLOCK STARTS at the waiver expiry, not at DI. Up to that
            // point the customer can still back out, so we shouldn't be
            // measuring drafting time yet. Anchor shifts to whichever is
            // later: the base anchor (max of DI/DoA) or the waiver-derived
            // anchor.
            //
            //   waiverAnchor = waiver_expiry_date (when populated)
            //                OR origEnteredDrafting + 14 calendar days
            //                   (fallback when expiry date is missing)
            //
            // The deadline is always anchor + 28 calendar days from the
            // effective anchor. No flat extension on top.
            anchor=baseAnchor;
            if(d.waiverSigned14d===false){
              let waiverAnchor=null;
              if(d.waiverExpiryDate){
                waiverAnchor=new Date(d.waiverExpiryDate);
                waiverAnchor.setHours(0,0,0,0);
              }else if(d.origEnteredDrafting){
                waiverAnchor=new Date(new Date(d.origEnteredDrafting).getTime()+14*86400000);
                waiverAnchor.setHours(0,0,0,0);
              }
              // Clamp: the SLA can't start before the deal is ready. Use
              // the later of (baseAnchor, waiverAnchor).
              if(waiverAnchor&&waiverAnchor>baseAnchor)anchor=waiverAnchor;
            }
            // Days the anchor was shifted forward (0 if no waiver shift).
            // Drives the table badge — see waiverShiftDays in the row.
            waiverExtension=Math.round((anchor-baseAnchor)/86400000);
            slaTargetDays=SLA_DAYS;
            deadline=new Date(anchor);deadline.setDate(deadline.getDate()+SLA_DAYS);
            daysRemaining=Math.round((deadline-today)/86400000);
            unit="cal";
            state=daysRemaining<0?"breached":daysRemaining<=3?"close":daysRemaining<=7?"warning":"comfortable";
          }

          out.push({
            id:d.id,
            dealname:d.dealname,
            drafter:d.drafterName&&d.drafterName!=="Unknown"?d.drafterName:"Unassigned",
            anchor,
            deadline,
            daysRemaining,
            unit,
            state,
            isAmendment,
            amendmentSource,
            slaTargetDays,
            waiverExtension,
            // True when the customer hasn't signed the 14-day waiver \u2014 used
            // to surface a state badge even on deals where the waiver
            // doesn't extend the SLA (e.g. waiver_expiry_date is missing,
            // so the fallback DI+14d < standard 28d \u2192 no extension granted
            // but the unsigned-state is still useful info).
            waiverUnsigned:d.waiverSigned14d===false,
            stage:stageLabel||"\u2014"
          });
        });
        // Sort by raw daysRemaining ascending (most-breached first). Cross-unit comparison is
        // a rough heuristic but fine for "what needs attention now".
        out.sort((a,b)=>(a.daysRemaining??1e9)-(b.daysRemaining??1e9));
        return out;
      },[deals,stageLabels]);

      const drafterOptions=useMemo(()=>{
        const set=new Set();
        allRows.forEach(r=>set.add(r.drafter));
        return Array.from(set).sort((a,b)=>{
          if(a==="Unassigned")return 1;
          if(b==="Unassigned")return -1;
          return a.localeCompare(b);
        });
      },[allRows]);

      const stageOptions=useMemo(()=>{
        const set=new Set();
        allRows.forEach(r=>set.add(r.stage));
        return Array.from(set).sort();
      },[allRows]);

      const chartRows=useMemo(()=>{
        let arr=allRows;
        if(drafterFilter!=="__all__")arr=arr.filter(r=>r.drafter===drafterFilter);
        if(stageFilter.size>0)arr=arr.filter(r=>stageFilter.has(r.stage));
        return arr;
      },[allRows,drafterFilter,stageFilter]);

      const[gran,setGran]=useState("WoW");
      const[selectedBucket,setSelectedBucket]=useState(null);
      useEffect(()=>{setSelectedBucket(null);},[gran]);

      const getBucketDate=useCallback(r=>r.anchor,[]);
      // State already computed per row (drafting vs amendment thresholds differ).
      const getStatus=useCallback(r=>r.state||"comfortable",[]);

      const rows=useMemo(()=>(
        selectedBucket?chartRows.filter(r=>r.anchor&&dateToBucket(r.anchor,gran)===selectedBucket):chartRows
      ),[chartRows,selectedBucket,gran]);

      const stateColor=s=>s==="breached"?C.red:s==="close"?C.amber:s==="warning"?"#F1C40F":C.green;

      const exportCSV=useCallback(()=>{
        const hdr=["Deal ID","Deal Name","Drafter","Anchor Date","SLA Deadline","Days Remaining","Days Unit","Waiver Extension Days","SLA Type","Amendment Source","Current Stage","HubSpot Link"];
        const lines=[hdr,...rows.map(r=>[r.id,r.dealname,r.drafter,fmtDate(r.anchor),fmtDate(r.deadline),r.daysRemaining==null?"":r.daysRemaining,r.unit,r.waiverExtension||0,r.isAmendment?"Amendment":"Drafting",r.amendmentSource||"",r.stage,HS_BASE+r.id])];
        const drSuffix=drafterFilter==="__all__"?"":`_${drafterFilter.replace(/\s+/g,"_")}`;
        const stSuffix=stageFilter.size===0?"":(stageFilter.size===1?`_${[...stageFilter][0].replace(/[^A-Za-z0-9]+/g,"_")}`:`_${stageFilter.size}stages`);
        const bSuffix=selectedBucket?`_${selectedBucket}`:"";
        downloadCSV(`standard_sla${drSuffix}${stSuffix}${bSuffix}_${new Date().toISOString().slice(0,10)}.csv`,toCSV(lines));
      },[rows,drafterFilter,stageFilter,selectedBucket]);

      return(
        <React.Fragment>
        <SLABacklogChart rows={chartRows} getBucketDate={getBucketDate} getStatus={getStatus} dateLabel="Appointment Date" gran={gran} setGran={setGran} selectedBucket={selectedBucket} setSelectedBucket={setSelectedBucket}/>
        <div style={{padding:"16px 24px"}}>
          <div style={{background:C.surface,borderRadius:12,padding:"20px 20px 16px",border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:16}}>
              <div>
                <div style={{color:C.white,fontSize:16,fontWeight:700}}>Standard SLA — Deals Nearing SLA</div>
                <div style={{fontSize:12,color:C.text,opacity:0.7,marginTop:4}}>
                  Two streams in one table. Drafting deals: 28 calendar days from the SLA anchor. Anchor = latest of original drafting-instructions date and Date of Appointment, UNLESS the customer hasn't signed the 14-day waiver \u2014 in which case the anchor shifts forward to the waiver expiry date (or original drafting-instructions + 14 calendar days when waiver_expiry_date is missing). Anchor only shifts forward; never earlier than DI/DoA. Amendment Requested deals: 10 business days from entered-amendment when amendment_source = "Client amendment", otherwise 1 business day. Drafting deals are excluded if both anchor candidates are missing. Stages included: Drafting Instructions, Drafting Query, Required \u2014 Proof Reading, Approved \u2014 Proof Reading, Amendment Requested.
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                {selectedBucket&&(
                  <span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,padding:"4px 10px",borderRadius:6,background:"rgba(52,152,219,0.15)",border:`1px solid ${C.accent}`,color:C.accent,fontWeight:600}}>
                    {bucketLabel(selectedBucket,gran)}
                    <button onClick={()=>setSelectedBucket(null)} style={{background:"transparent",border:"none",color:C.accent,cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>{"\u00D7"}</button>
                  </span>
                )}
                <label style={{fontSize:12,color:C.text,opacity:0.7}}>Drafter</label>
                <select style={S.select} value={drafterFilter} onChange={e=>setDrafterFilter(e.target.value)}>
                  <option value="__all__">All ({allRows.length})</option>
                  {drafterOptions.map(name=>(
                    <option key={name} value={name}>{name} ({allRows.filter(r=>r.drafter===name).length})</option>
                  ))}
                </select>
                <label style={{fontSize:12,color:C.text,opacity:0.7}}>Stage</label>
                <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  {stageOptions.map(name=>{
                    const active=stageFilter.has(name);
                    const count=allRows.filter(r=>r.stage===name).length;
                    return(
                      <button key={name} onClick={()=>toggleStage(name)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${active?C.accent:C.border}`,background:active?"rgba(52,152,219,0.18)":C.bg,color:active?C.accent:C.text,cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{name} ({count})</button>
                    );
                  })}
                  {stageFilter.size>0&&<button onClick={()=>setStageFilter(new Set())} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.text,cursor:"pointer",fontSize:11,fontWeight:500}}>Clear</button>}
                </div>
                <span style={{fontSize:12,color:C.text,opacity:0.7}}>{rows.length} deal{rows.length===1?"":"s"}</span>
                <button style={S.btn} onClick={exportCSV} disabled={!rows.length}>{"\u2B07"} CSV</button>
              </div>
            </div>
            {rows.length===0?(
              <div style={{padding:"32px 16px",textAlign:"center",color:C.text,opacity:0.6,fontSize:13}}>{allRows.length===0?"No open deals with a usable SLA anchor date.":selectedBucket?"No deals in the selected bucket for the active filters.":"No deals match the active filters."}</div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{borderBottom:`2px solid ${C.border}`,color:C.white,textAlign:"left"}}>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Deal Name</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Record ID</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Drafter</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Anchor Date</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>SLA Deadline</th>
                      <th style={{padding:"10px 12px",fontWeight:600,textAlign:"right"}}>Days Remaining</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Current Stage</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map(r=>(
                      <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`}}>
                        <td style={{padding:"10px 12px"}}>
                          <a href={HS_BASE+r.id} target="_blank" rel="noopener noreferrer" style={{color:C.accent,textDecoration:"none"}}>{r.dealname}</a>
                          {r.isAmendment&&<span style={{fontSize:10,marginLeft:8,padding:"2px 8px",borderRadius:4,background:"rgba(127,140,141,0.22)",color:"#95A5A6",fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>Amend</span>}
                          {r.waiverExtension>0&&<span title={`SLA anchor shifted to the waiver expiry date — ${r.waiverExtension} day${r.waiverExtension===1?"":"s"} later than DI/DoA. The 28-day SLA clock starts there.`} style={{fontSize:10,marginLeft:8,padding:"2px 8px",borderRadius:4,background:"rgba(243,156,18,0.18)",color:C.amber,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>Waiver Anchor (+{r.waiverExtension}d)</span>}
                          {r.waiverExtension===0&&r.waiverUnsigned&&<span title="Customer hasn't signed the 14-day waiver, but the waiver expiry isn't later than DI/DoA — so the anchor hasn't shifted. Either waiver_expiry_date is in the past, or it's missing AND DI + 14d ≤ baseAnchor." style={{fontSize:10,marginLeft:8,padding:"2px 8px",borderRadius:4,background:"rgba(243,156,18,0.10)",color:C.amber,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",whiteSpace:"nowrap",border:`1px dashed ${C.amber}`}}>Waiver Unsigned</span>}
                        </td>
                        <td style={{padding:"10px 12px",fontFamily:"ui-monospace,SFMono-Regular,Menlo,monospace",fontSize:12,color:C.text,opacity:0.7}}>{r.id}</td>
                        <td style={{padding:"10px 12px"}}>{r.drafter}</td>
                        <td style={{padding:"10px 12px"}}>{fmtDate(r.anchor)}</td>
                        <td style={{padding:"10px 12px"}}>{fmtDate(r.deadline)}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:stateColor(r.state)}}>
                          {r.daysRemaining==null?"—":r.daysRemaining<0?`${r.daysRemaining}d ${r.unit} (breached)`:`${r.daysRemaining}d ${r.unit}`}
                        </td>
                        <td style={{padding:"10px 12px"}}>{r.stage}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
        </React.Fragment>
      );
    }

    // ─── Legacy Advisor SLA Table ──────────────────────────────
    // Tracks deals currently in "Replied — Drafts With Customer" (stage 1223620776).
    // No SLA target — just measures business days the deal has been in the stage.
    function LegacyAdvisorSLATable({deals,stageLabels}){
      const RDWC_STAGE="1223620776";
      const[advisorFilter,setAdvisorFilter]=useState("__all__");
      const allRows=useMemo(()=>{
        const today=new Date();today.setHours(0,0,0,0);
        const out=[];
        deals.forEach(d=>{
          if(d.dealstage!==RDWC_STAGE)return;
          if(!d.enteredRDWC)return;
          const entered=new Date(d.enteredRDWC);entered.setHours(0,0,0,0);
          const bizDaysInStage=calcBusinessDays(entered,today)||0;
          out.push({
            id:d.id,
            dealname:d.dealname,
            advisor:d.legacyAdvisor||"Unassigned",
            entered,
            bizDaysInStage,
            isUrgent:!!d.isUrgent,
            stage:stageLabels[d.dealstage]||d.dealstage||"—"
          });
        });
        // Urgent (Priority = High) deals first, each group sorted by Biz Days In Stage desc.
        out.sort((a,b)=>{
          if(a.isUrgent!==b.isUrgent)return a.isUrgent?-1:1;
          return b.bizDaysInStage-a.bizDaysInStage;
        });
        return out;
      },[deals,stageLabels]);

      const advisorOptions=useMemo(()=>{
        const set=new Set();
        allRows.forEach(r=>set.add(r.advisor));
        return Array.from(set).sort((a,b)=>{
          if(a==="Unassigned")return 1;
          if(b==="Unassigned")return -1;
          return a.localeCompare(b);
        });
      },[allRows]);

      const chartRows=useMemo(()=>(
        advisorFilter==="__all__"?allRows:allRows.filter(r=>r.advisor===advisorFilter)
      ),[allRows,advisorFilter]);

      const[gran,setGran]=useState("WoW");
      const[selectedBucket,setSelectedBucket]=useState(null);
      useEffect(()=>{setSelectedBucket(null);},[gran]);

      const rows=useMemo(()=>(
        selectedBucket?chartRows.filter(r=>r.entered&&dateToBucket(r.entered,gran)===selectedBucket):chartRows
      ),[chartRows,selectedBucket,gran]);

      const exportCSV=useCallback(()=>{
        const hdr=["Deal ID","Deal Name","Legacy Advisor","Entered RDWC","Business Days In Stage","Current Stage","HubSpot Link"];
        const lines=[hdr,...rows.map(r=>[r.id,r.dealname,r.advisor,fmtDate(r.entered),r.bizDaysInStage,r.stage,HS_BASE+r.id])];
        const adSuffix=advisorFilter==="__all__"?"":`_${advisorFilter.replace(/\s+/g,"_")}`;
        const bSuffix=selectedBucket?`_${selectedBucket}`:"";
        downloadCSV(`legacy_advisor_rdwc${adSuffix}${bSuffix}_${new Date().toISOString().slice(0,10)}.csv`,toCSV(lines));
      },[rows,advisorFilter,selectedBucket]);

      // Single-series backlog chart (no SLA status colouring)
      const chartData=useMemo(()=>{
        const counts={};
        chartRows.forEach(r=>{
          if(!r.entered)return;

                  <YAxis tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Deals",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
