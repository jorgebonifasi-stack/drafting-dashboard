  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;
    const {
      BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
      ComposedChart, Line, ReferenceLine, ReferenceArea, Legend, Cell,
      CartesianGrid, LabelList, Label
    } = Recharts;

    // ─── colour tokens ──────────────────────────────────────────
    const C = {
      bg:"#1a1a1a", bgDarker:"#111", surface:"#242424",
      text:"#CCCCCC", white:"#FFFFFF", grid:"#444444",
      green:"#27AE60", red:"#E74C3C", amber:"#F39C12",
      blue:"#5DADE2", blueFaded:"rgba(93,173,226,0.22)",
      accent:"#3498DB", border:"#333",

    // ─── ISO-week helpers ───────────────────────────────────────
    function isoWeek(d){
      const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
      date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7));
      const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
      return Math.ceil(((date-yearStart)/86400000+1)/7);
    }
    function isoWeekYear(d){
      const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
      date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7));
      return date.getUTCFullYear();
    }
    function mondayOfISOWeek(year,week){
      const jan4=new Date(Date.UTC(year,0,4));
      const dow=jan4.getUTCDay()||7;
      const mon=new Date(jan4);
      mon.setUTCDate(jan4.getUTCDate()-dow+1+(week-1)*7);
      return mon;
    }

    // ─── date bucket helpers ────────────────────────────────────
    function dateToBucket(d,gran){
      if(!d)return null;
      if(gran==="DoD") return d.toISOString().slice(0,10);
      if(gran==="WoW"){const w=isoWeek(d),y=isoWeekYear(d);return`${y}-W${String(w).padStart(2,"0")}`;}
      return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }
    function bucketLabel(bucket,gran){
      if(gran==="DoD"){
        const d=new Date(bucket+"T00:00:00");
        const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        return`${days[d.getDay()]} ${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
      }
      if(gran==="WoW"){
        const[y,wStr]=bucket.split("-W");
        const mon=mondayOfISOWeek(parseInt(y),parseInt(wStr));
        return`W${wStr} (${String(mon.getUTCMonth()+1).padStart(2,"0")}/${String(mon.getUTCDate()).padStart(2,"0")})`;
      }
      const[y,m]=bucket.split("-");
      const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return`${months[parseInt(m)-1]} ${y}`;
    }
    function bucketEndDate(bucket,gran){
      if(gran==="DoD")return new Date(bucket+"T23:59:59.999");
      if(gran==="WoW"){
        const[y,wStr]=bucket.split("-W");
        const mon=mondayOfISOWeek(parseInt(y),parseInt(wStr));
        const sun=new Date(mon);sun.setUTCDate(sun.getUTCDate()+6);sun.setUTCHours(23,59,59,999);return sun;
      }
      const[y,m]=bucket.split("-");
      return new Date(parseInt(y),parseInt(m),0,23,59,59,999);
    }

    // ─── parse HubSpot timestamp ────────────────────────────────
    function parseHSDate(v){
      if(!v)return null;
      // Try ISO string first
      const asDate=new Date(v);
      if(!isNaN(asDate.getTime()))return asDate;
      // Try epoch
      const n=parseInt(v,10);
      if(isNaN(n))return null;
      if(n>1e12)return new Date(n);
      if(n>1e9)return new Date(n*1000);
      return null;
    }

    // ─── defaults ───────────────────────────────────────────────
    const DEFAULT_STANDARD_TARGET=80;
    const DEFAULT_OVERRIDES={"Komal Singh":60,"Liam Tuapola":60,"Gurleen Sagoo":30,"Erin James":48};
    const DEFAULT_PROOF_TARGET=425;
    const DEFAULT_PROOF_OVERRIDES={"Neelam Ranchhod":425};

    // ─── business days calculator (Mon-Fri, excludes weekends) ───
    function calcBusinessDays(start,end){
      if(!start||!end||end<=start)return null;
      let count=0;
      const cur=new Date(start);
      cur.setHours(0,0,0,0);
      const endDay=new Date(end);
      endDay.setHours(0,0,0,0);
      while(cur<endDay){
        cur.setDate(cur.getDate()+1);
        const dow=cur.getDay();
        if(dow!==0&&dow!==6)count++;
      }
      return count;
    }
    // Signed business days between start → end (negative if end < start)
    function signedBusinessDays(start,end){
      if(!start||!end)return null;
      const a=new Date(start);a.setHours(0,0,0,0);
      const b=new Date(end);b.setHours(0,0,0,0);
      if(a.getTime()===b.getTime())return 0;
      const sign=b>a?1:-1;
      const days=calcBusinessDays(sign>0?a:b,sign>0?b:a)||0;
      return sign*days;
    }
    // Add N business days to a date
    function addBusinessDays(start,days){
      const result=new Date(start);
      result.setHours(0,0,0,0);
      let added=0;
      while(added<days){
        result.setDate(result.getDate()+1);
        const dow=result.getDay();
        if(dow!==0&&dow!==6)added++;
      }
      return result;
    }

    // ─── process raw deals from server ──────────────────────────
    function processDeals(rawDeals,ownerMap,draftingOwnerOptions,proofOwnerOptions,queryReasonOptions,urgentReasonOptions,amendmentSourceOptions,leadSourceOptions,dealHistoryMap,komalExclusionIds){
      return rawDeals.map(d=>{
        const hist=(dealHistoryMap||{})[d.id]||{};
        const firstQueryDate=hist.firstQueryDate?new Date(hist.firstQueryDate):null;
        const firstProofreadingDate=hist.firstProofreadingDate?new Date(hist.firstProofreadingDate):null;
        const queryCount=hist.queryCount||0;
        const p=d.properties||{};
        const enteredDrafting=parseHSDate(p.hs_v2_date_entered_1223620771);
        const nativeExitedDrafting=parseHSDate(p.hs_v2_date_exited_1223620771);
        const origDraftsWithCustomer=parseHSDate(p.original_date_entered_drafts_with_customer);
        const origReadyForPrinting=parseHSDate(p.original_date_entered_ready_for_printing);
        const CUTOVER=new Date("2026-04-12T00:00:00");
        // Anchor: when did the deal first enter Drafting Instructions?
        const anchorEntered=parseHSDate(p.original_date_entered_drafting_instructions)||enteredDrafting;
        // Legacy deals (entered DI before cutover): always use exited Drafting Instructions
        // Post-cutover deals (entered DI from cutover): only original_* DWC/RFP completion dates
        // No anchor = migration deal (never entered DI): skip
        let exitedDrafting;
        if(!anchorEntered){exitedDrafting=null;}
        else if(anchorEntered<CUTOVER){
          // Legacy deal: entered DI before cutover
          const legacyExit=nativeExitedDrafting||null;
          if(legacyExit&&legacyExit<CUTOVER){
            // Completed before cutover — use exit DI date
            exitedDrafting=legacyExit;
          }else{
            // Still in-flight after cutover — workflows are active, use DWC/RFP
            const validDates=[origDraftsWithCustomer,origReadyForPrinting].filter(dt=>dt&&dt>=anchorEntered);
            exitedDrafting=validDates.length?new Date(Math.min(...validDates)):null;
          }
        }
        else{const validDates=[origDraftsWithCustomer,origReadyForPrinting].filter(dt=>dt&&dt>=anchorEntered);const newLogic=validDates.length?new Date(Math.min(...validDates)):null;exitedDrafting=newLogic&&newLogic>=CUTOVER?newLogic:null;}
        // Old metric: purely based on Date exited "Drafting Instructions" (for comparison chart)
        const exitedDraftingOld=anchorEntered?nativeExitedDrafting:null;
        const enteredAppointmentOutcome=parseHSDate(p.hs_v2_date_entered_1223751329);
        const enteredProofreading=parseHSDate(p.hs_v2_date_entered_1223620773);
        const exitedProofreading=parseHSDate(p.hs_v2_date_exited_1223620773);
        const enteredDraftingQuery=parseHSDate(p.hs_v2_date_entered_1223620772);
        const origEnteredDrafting=parseHSDate(p.original_date_entered_drafting_instructions);
        const origExitedDrafting=parseHSDate(p.first_date_exited_drafting_instructions);
        const draftingStart=origEnteredDrafting||enteredDrafting;
        const rawDraftOwner=p.drafting_owner||"";
        const rawProofOwner=p.proof_reading__owner||"";
        const drafterName=draftingOwnerOptions[rawDraftOwner]||ownerMap[rawDraftOwner]||rawDraftOwner||"Unknown";
        const prooferName=proofOwnerOptions[rawProofOwner]||ownerMap[rawProofOwner]||rawProofOwner||"Unknown";
        // Parse multi-select query reasons (semicolon-separated in HubSpot)
        const rawReasons=p.drafting_query_reason||"";
        const queryReasons=rawReasons?rawReasons.split(";").map(r=>queryReasonOptions[r.trim()]||r.trim()).filter(Boolean):[];
        // Priority and urgent reason
        const priority=(p.hs_priority||"").toLowerCase();
        const rawUrgentReason=p.urgent_request_reason||"";
        const urgentReason=rawUrgentReason?rawUrgentReason.split(";").map(r=>(urgentReasonOptions||{})[r.trim()]||r.trim()).filter(Boolean):[];
        const isUrgent=priority==="high";
        // Urgent SLA: date_marked_urgent (post-18 Apr) or draftingStart (pre-18 Apr fallback)
        const URGENT_CUTOVER=new Date("2026-04-18T00:00:00");
        const dateMarkedUrgent=parseHSDate(p.date_marked_urgent);
        const urgentStart=dateMarkedUrgent&&dateMarkedUrgent>=URGENT_CUTOVER?dateMarkedUrgent:draftingStart;
        // Consultant Query (stage 1223751330)
        const enteredConsultantQuery=parseHSDate(p.hs_v2_date_entered_1223751330);
        // Exited Approved - Proof Reading (stage 1223620774)
        const exitedApproved=parseHSDate(p.hs_v2_date_exited_1223620774);
        // Amendment fields
        const enteredAmendment=parseHSDate(p.hs_v2_date_entered_1338772492);
        const exitedAmendment=parseHSDate(p.hs_v2_date_exited_1338772492);
        const rawAmendSource=p.amendment_source||"";
        const amendmentSource=rawAmendSource?(amendmentSourceOptions||{})[rawAmendSource.trim()]||rawAmendSource.trim():"";
        // Lead source (multi-select checkbox, ;-separated) + appointment date
        const rawLeadSource=p.ep_lead_source||"";
        const leadSources=rawLeadSource?rawLeadSource.split(";").map(v=>(leadSourceOptions||{})[v.trim()]||v.trim()).filter(Boolean):[];
        const dateOfAppointment=parseHSDate(p.date_of_appointment);
        return{
          id:d.id,dealname:p.dealname||d.id,drafterName,prooferName,dealstage:p.dealstage||"",
          leadSources,dateOfAppointment,
          firstQueryDate,firstProofreadingDate,queryCount,
          enteredDrafting,exitedDrafting,exitedDraftingOld,nativeExitedDrafting,origEnteredDrafting,origExitedDrafting,draftingStart,
          enteredProofreading,exitedProofreading,enteredDraftingQuery,queryReasons,
          komalQueryExcluded:!!(komalExclusionIds&&komalExclusionIds.has&&komalExclusionIds.has(String(d.id))&&drafterName.toLowerCase()!=="komal singh"),
          priority,isUrgent,urgentReason,urgentStart,dateMarkedUrgent,
          enteredAppointmentOutcome,
          origDraftsWithCustomer,origReadyForPrinting,enteredConsultantQuery,exitedApproved,
          enteredAmendment,exitedAmendment,amendmentSource,
          amendmentTurnaroundDays:enteredAmendment&&exitedAmendment?(exitedAmendment-enteredAmendment)/86400000:null,
          draftingTurnaroundDays:draftingStart&&exitedDrafting?(exitedDrafting-draftingStart)/86400000:null,
          draftingTurnaroundBizDays:calcBusinessDays(draftingStart,exitedDrafting),
          urgentTurnaroundBizDays:isUrgent?calcBusinessDays(urgentStart,exitedDrafting):null,
          proofreadingTurnaroundDays:enteredProofreading&&exitedProofreading?(exitedProofreading-enteredProofreading)/86400000:null,
        };
      });
    }

    // ─── API helpers ─────────────────────────────────────────────
    async function fetchDealsFromAPI(force) {
      const url = force ? "/api/deals/refresh" : "/api/deals";
      const options = force ? { method: "POST" } : {};
      const res = await fetch(url, options);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || "Server error");
      }
      return res.json();
    }

    // ─── SLA-colored smooth line renderer ──────────────────────────
    // Draws smooth color-coded curve segments (no dots) between data points.
    // Uses quadratic Bézier curves for smooth transitions.
    function makeSLALine(thresholds){
      function getColor(val){
        if(val==null)return C.grid;
        for(const t of thresholds){if(val<=t.max)return t.color;}
        return thresholds[thresholds.length-1].color;
      }
      let allPts=[];
      let drawn=false;
      return function SLALineDot(props){
        const{cx,cy,payload,dataKey,index}=props;
        const val=payload?.[dataKey];
        // Reset on first point
        if(index===0){allPts=[];drawn=false;}
        if(val!=null&&cx!=null&&cy!=null)allPts.push({cx,cy,val,index});
        // Draw segment from previous valid point to this one
        if(allPts.length<2)return<g key={`sla-e-${index}`}/>;
        const prev=allPts[allPts.length-2],curr=allPts[allPts.length-1];
        if(curr.index!==index)return<g key={`sla-s-${index}`}/>; // this point was null, skip
        const segCol=getColor(Math.max(prev.val,curr.val));
        // Cubic Bézier control points for smooth curve
        const tension=0.3;
        const prevPrev=allPts.length>=3?allPts[allPts.length-3]:prev;
        const dx=curr.cx-prevPrev.cx;
        const dy=curr.cy-prevPrev.cy;
        const cp1x=prev.cx+dx*tension;
        const cp1y=prev.cy+dy*tension;
        const cp2x=curr.cx-(curr.cx-prev.cx)*tension;
        const cp2y=curr.cy-(curr.cy-prev.cy)*tension;
        return<path key={`sla-${index}`} d={`M${prev.cx},${prev.cy} C${cp1x},${cp1y} ${cp2x},${cp2y} ${curr.cx},${curr.cy}`} stroke={segCol} strokeWidth={3} fill="none" strokeLinecap="round"/>;
      };
    }

    // ─── styles ─────────────────────────────────────────────────
    const S={
      page:{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"'Inter','Segoe UI',system-ui,sans-serif",padding:0,margin:0},
      topBar:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,padding:"16px 24px",background:C.bgDarker,borderBottom:`1px solid ${C.border}`},
      title:{color:C.white,fontSize:18,fontWeight:700,letterSpacing:0.3,margin:0,whiteSpace:"nowrap"},
      controls:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"},
      toggle:a=>({padding:"6px 14px",borderRadius:6,border:`1px solid ${a?C.accent:C.border}`,background:a?C.accent:"transparent",color:a?C.white:C.text,cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .15s"}),
      select:{background:C.surface,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px",fontSize:13},
      btn:{background:C.surface,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:6},
      btnPrimary:{background:C.accent,color:C.white,border:"none",borderRadius:6,padding:"8px 20px",cursor:"pointer",fontSize:14,fontWeight:600},
      badge:{fontSize:11,color:C.text,opacity:0.6},
      chartBox:{background:C.surface,borderRadius:12,padding:"20px 16px",border:`1px solid ${C.border}`,minHeight:340},
      row:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,padding:"16px 24px"},
      modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000},
      modalBox:{background:C.surface,borderRadius:16,padding:32,width:420,maxWidth:"90vw",border:`1px solid ${C.border}`},
      input:{width:"100%",padding:"10px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,color:C.white,fontSize:14,boxSizing:"border-box"},
      sidePanel:{position:"fixed",top:0,right:0,width:380,maxWidth:"90vw",height:"100vh",background:C.surface,borderLeft:`1px solid ${C.border}`,zIndex:999,overflowY:"auto",padding:24,boxSizing:"border-box"},
      footer:{textAlign:"center",padding:"12px 24px",fontSize:11,color:C.text,opacity:0.5},
    };

    // ─── DarkTooltip ────────────────────────────────────────────
    function DarkTooltip({active,payload,label}){
      if(!active||!payload?.length)return null;
      return(
        <div style={{background:"#222",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.text}}>
          <div style={{fontWeight:600,color:C.white,marginBottom:4}}>{label}</div>
          {payload.map((p,i)=>(
            <div key={i} style={{color:p.color||C.text}}>{p.name}: {typeof p.value==="number"?(Number.isInteger(p.value)?p.value:p.value.toFixed(0)):p.value}</div>
          ))}
        </div>
      );
    }
    // Tooltip for stacked charts — shows only the hovered segment + line values
    function StackedTooltip({active,payload,label}){
      if(!active||!payload?.length)return null;
      // Show only non-zero bar segments + line values
      const items=payload.filter(p=>p.value!=null&&(p.value>0||p.type==="none"||p.dataKey==="rate"||p.dataKey==="avgBizDays"||p.dataKey==="avgDays"));
      return(
        <div style={{background:"#222",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.text}}>
          <div style={{fontWeight:600,color:C.white,marginBottom:4}}>{label}</div>
          {items.map((p,i)=>(
            <div key={i} style={{color:p.color||p.stroke||C.text}}>{p.name}: {typeof p.value==="number"?(Number.isInteger(p.value)?p.value:p.value.toFixed(1)):p.value}</div>
          ))}
        </div>
      );
    }

    // ─── Info Icon with hover tooltip ─────────────────────────────
    function InfoIcon({text}){
      const[show,setShow]=useState(false);
      return(
        <span style={{position:"relative",display:"inline-flex",alignItems:"center",marginLeft:8,cursor:"help"}}
          onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{opacity:0.5}}>
            <circle cx="8" cy="8" r="7" stroke={C.text} strokeWidth="1.5"/>
            <text x="8" y="12" textAnchor="middle" fill={C.text} fontSize="11" fontWeight="700" fontFamily="sans-serif">i</text>
          </svg>
          {show&&(
            <div style={{position:"absolute",left:"50%",top:"calc(100% + 8px)",transform:"translateX(-50%)",
              background:"#222",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",
              fontSize:12,color:C.text,lineHeight:"1.5",width:280,zIndex:100,
              boxShadow:"0 4px 16px rgba(0,0,0,0.5)",whiteSpace:"normal",pointerEvents:"none"}}>
              {text}
            </div>
          )}
        </span>
      );
    }

    // ─── metric descriptions ────────────────────────────────────
    const INFO={
      chart1:'NEW METRIC — Drafts completed in the selected period. Deals that completed before 12 Apr 2026: date exited "Drafting Instructions (Estate Planning)". Deals that complete from 12 Apr 2026 onwards: earliest of "Original Date Entered Drafts With Customer" or "Original Date Entered Ready For Printing". Grouped by Drafting Owner.',
      chart1b:'OLD METRIC — Drafts completed based on Date exited "Drafting Instructions (Estate Planning)" for all deals. This counts a deal as complete when it leaves Drafting Instructions, regardless of whether it has reached Drafts With Customer or Ready For Printing. Grouped by Drafting Owner.',
      chart2:'Average calendar days from first entering "Drafting Instructions (Estate Planning)" to completion. Deals that completed before 12 Apr 2026: date exited "Drafting Instructions (Estate Planning)". Deals that complete from 12 Apr 2026 onwards: earliest of "Original Date Entered Drafts With Customer" or "Original Date Entered Ready For Printing". Includes Drafting Query time. Grouped by Drafting Owner.',
      chart3:'Line: average calendar days from entering to exiting "Required \u2014 Proof Reading" for deals completed that period. Bars: deals that entered "Required \u2014 Proof Reading" (Date entered "Required - Proof Reading (Estate Planning)") in that period. SLA: 2 days.',
      chart5b:'Deprecated — merged into Chart 5.',
      chart4:'Query rate per period. Denominator: deals bucketed by their FIRST entry into "Required \u2014 Proof Reading". Numerator: deals bucketed by their FIRST entry into "Drafting Query" (deduped per deal; a deal with 3 queries counts once, in the period of its first query). Uses full dealstage history, so bucketing is unaffected by later stage re-entries. SLA: green \u22645%, amber \u226410%, red >10%.',
      chart5:'Drafts proofread (completed) and backlog per proofreader for the selected period. Completed: deals that exited "Required \u2014 Proof Reading" in the period. Backlog: deals that entered but have not yet exited by end of the period. Grouped by Proof Reading Owner.',
      chart6:'Bars: total standard drafts completed per period. Line: average turnaround in calendar days (first entry into "Drafting Instructions (Estate Planning)" \u2192 completion). Deals that completed before 12 Apr 2026: date exited "Drafting Instructions (Estate Planning)". Deals that complete from 12 Apr 2026 onwards: earliest of "Original Date Entered Drafts With Customer" or "Original Date Entered Ready For Printing". SLA: 10d internal, 28d customer.',
      chart7:'Query rate per drafter per period. Denominator: deals bucketed by their FIRST entry into "Required \u2014 Proof Reading" (per drafter). Numerator: deals bucketed by their FIRST entry into "Drafting Query" (deduped per deal). Uses full dealstage history so bucketing is unaffected by later stage re-entries. Green \u22645%, amber \u226410%, red >10%.',
      chart14:'Daily activity heatmap for drafters. Shows HubSpot engagements (notes, calls, emails, tasks) per hour. Green intensity indicates activity level. Data covers the last 7 days. Use arrow buttons or date picker to navigate.',

    // ─── ChartCard: wraps each chart with data table + CSV ──────

          if(titleEl)titleEl.style.display="block";
          const canvas=await html2canvas(el,{backgroundColor:"#1e1e1e",scale:2,useCORS:true,logging:false});
          if(titleEl)titleEl.style.display="none";
          const link=document.createElement("a");

    // ─── Chart 1: Total Drafts Completed ────────────────────────
    function Chart1({deals,gran,bucket,standardTarget,overrides}){
      const data=useMemo(()=>{
        const mult=gran==="DoD"?1/5:gran==="MoM"?4.33:1;
        const counts={};
        deals.forEach(d=>{
          if(!d.exitedDrafting)return;
          if(dateToBucket(d.exitedDrafting,gran)!==bucket)return;
          counts[d.drafterName]=(counts[d.drafterName]||0)+1;
        });
        return Object.entries(counts)
          .filter(([n,c])=>c>=1&&!/^\d+$/.test(n)&&n!=="Unknown")
          .map(([name,count])=>{
            const wt=overrides[name]??standardTarget;
            const target=Math.round(wt*mult);
            return{name,count,target,met:count>=target,isCustom:name in overrides};
          }).sort((a,b)=>b.count-a.count);
      },[deals,gran,bucket,standardTarget,overrides]);

      const globalTarget=Math.round(standardTarget*(gran==="DoD"?1/5:gran==="MoM"?4.33:1));
      const maxVal=Math.max(...data.map(d=>Math.max(d.count,d.target)),globalTarget,10);
      if(!data.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No completed drafts in this period</div>;

      return(
        <ResponsiveContainer width="100%" height={Math.max(280,data.length*42+60)}>
          <BarChart data={data} layout="vertical" margin={{top:30,right:60,left:10,bottom:10}}>

    // ─── Chart 2: Avg Turnaround Days ───────────────────────────
    function Chart2({deals,gran,bucket}){
      const data=useMemo(()=>{
        const groups={};
        deals.forEach(d=>{
          if(!d.exitedDrafting||d.draftingTurnaroundDays==null)return;
          if(dateToBucket(d.exitedDrafting,gran)!==bucket)return;
          if(!d.drafterName||d.drafterName==="Unknown"||/^\d+$/.test(d.drafterName))return;
          if(!groups[d.drafterName])groups[d.drafterName]=[];
          groups[d.drafterName].push(d.draftingTurnaroundDays);
        });
        return Object.entries(groups).map(([name,days])=>{
          const avg=days.reduce((s,v)=>s+v,0)/days.length;
          return{name,avg:parseFloat(avg.toFixed(0)),count:days.length};
        }).filter(d=>d.count>=1).sort((a,b)=>b.avg-a.avg);
      },[deals,gran,bucket]);

      const maxVal=Math.max(...data.map(d=>d.avg),30);

    // ─── Chart 3: Proofreading Turnaround & Backlog ─────────────
    const BACKLOG_COLORS=["rgba(137,196,225,0.30)","rgba(244,166,160,0.30)","rgba(197,163,217,0.30)","rgba(142,207,176,0.30)","rgba(246,200,138,0.30)","rgba(160,191,224,0.30)","rgba(232,180,200,0.30)","rgba(126,202,193,0.30)","rgba(212,184,150,0.30)","rgba(176,196,239,0.30)"];
    const BACKLOG_STROKES=["#89c4e1","#f4a6a0","#c5a3d9","#8ecfb0","#f6c88a","#a0bfe0","#e8b4c8","#7ecac1","#d4b896","#b0c4ef"];

    function Chart3({deals,gran}){
      const data=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?25:gran==="WoW"?10:8;
        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){
          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        // Avg turnaround for completed proofs
        const completed={};
        deals.forEach(d=>{
          if(!d.enteredProofreading||!d.exitedProofreading||d.proofreadingTurnaroundDays==null)return;
          const b=dateToBucket(d.exitedProofreading,gran);
          if(!completed[b])completed[b]=[];
          completed[b].push(d.proofreadingTurnaroundDays);
        });

        // Productivity: deals entering Required - Proof Reading per period
        const entered={};
        deals.forEach(d=>{
          if(!d.enteredProofreading)return;
          const b=dateToBucket(d.enteredProofreading,gran);
          entered[b]=(entered[b]||0)+1;
        });

        return uniq.map(bucket=>{
          const days=completed[bucket]||[];
          const avgTurnaround=days.length?parseFloat((days.reduce((s,v)=>s+v,0)/days.length).toFixed(0)):null;
          return{bucket,label:bucketLabel(bucket,gran),avgTurnaround,entered:entered[bucket]||0,completed:days.length};
        });
      },[deals,gran]);

      return(

            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Deals",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>

            <Bar yAxisId="right" dataKey="entered" name="Entered Proofreading" fill="rgba(137,196,225,0.35)" stroke="#89c4e1" strokeWidth={0.5} barSize={28} radius={[4,4,0,0]}>
              <LabelList dataKey="entered" position="top" fill={C.text} fontSize={10} fontWeight={500}/>
            </Bar>
            <Line yAxisId="left" type="linear" dataKey="avgTurnaround" name="Avg Turnaround" stroke="transparent" strokeWidth={0} dot={makeSLALine([{max:2,color:C.green},{max:Infinity,color:C.red}])} activeDot={false} connectNulls isAnimationActive={false}>

            </Line>
          </ComposedChart>
        </ResponsiveContainer>
      );

          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        // Denominator: deals bucketed by their FIRST entry into Required — Proof Reading
        // Numerator:   deals bucketed by their FIRST entry into Drafting Query (dedupe per deal)
        // These can fall in different periods — rate = first-queries placed in P ÷ deals first-entering proofreading in P.
        const periodData={};
        const reasonSet=new Set();
        const reasonData={};
        deals.forEach(d=>{
          if(d.firstProofreadingDate){
            const b=dateToBucket(d.firstProofreadingDate,gran);
            if(!periodData[b])periodData[b]={total:0,queried:0};
            periodData[b].total++;
          }
          if(d.firstQueryDate&&!d.komalQueryExcluded){
            const b=dateToBucket(d.firstQueryDate,gran);
            if(!periodData[b])periodData[b]={total:0,queried:0};
            periodData[b].queried++;
            if(d.queryReasons.length){
              if(!reasonData[b])reasonData[b]={};
              d.queryReasons.forEach(r=>{reasonSet.add(r);reasonData[b][r]=(reasonData[b][r]||0)+1;});
            }
          }
        });

        // Sort reasons by total count descending
        const totals={};
        [...reasonSet].forEach(r=>{totals[r]=0;Object.values(reasonData).forEach(w=>{totals[r]+=(w[r]||0);});});
        const allReasons=[...reasonSet].sort((a,b)=>totals[b]-totals[a]);

        const data=uniq.map(bucket=>{
          const wd=periodData[bucket]||{total:0,queried:0};
          const rate=wd.total>0?parseFloat(Math.min((wd.queried/wd.total)*100,100).toFixed(0)):null;
          const row={bucket,label:bucketLabel(bucket,gran),rate,total:wd.total,queried:wd.queried};
          allReasons.forEach(r=>{row[r]=reasonData[bucket]?.[r]||0;});
          return row;
        });
        return{data,allReasons};
      },[deals,gran]);

      return(
        <ResponsiveContainer width="100%" height={380}>
          <ComposedChart data={data} margin={{top:20,right:40,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis yAxisId="left" domain={[0,max=>Math.min(Math.max(max*1.2,15),100)]} tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} tickFormatter={v=>`${v}%`} label={{value:"Query Rate %",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Reason Count",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>
            <Tooltip content={<StackedTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:10,color:C.text,paddingBottom:4}}/>
            <ReferenceArea yAxisId="left" y1={0} y2={5} fill={C.green} fillOpacity={0.08}/>
            <ReferenceLine yAxisId="left" y={5} stroke={C.green} strokeDasharray="8 4" strokeWidth={2} label={{value:"5%",position:"insideBottomRight",fill:C.green,fontSize:12,fontWeight:700}}/>
            <ReferenceLine yAxisId="left" y={10} stroke={C.amber} strokeDasharray="8 4" strokeWidth={2} label={{value:"10%",position:"insideBottomRight",fill:C.amber,fontSize:12,fontWeight:700}}/>
            {allReasons.map((reason,i)=>(
              <Bar key={reason} yAxisId="right" dataKey={reason} stackId="reasons" fill={REASON_COLORS_C4[i%REASON_COLORS_C4.length]} stroke={REASON_STROKES_C4[i%REASON_STROKES_C4.length]} strokeWidth={0.5} barSize={28} radius={i===0?[4,4,0,0]:[0,0,0,0]}/>
            ))}
            <Line yAxisId="left" type="linear" dataKey="rate" name="Query Rate %" stroke="transparent" strokeWidth={0} dot={makeSLALine([{max:5,color:C.green},{max:10,color:C.amber},{max:Infinity,color:C.red}])} activeDot={false} connectNulls isAnimationActive={false}>
              <LabelList dataKey="rate" position="top" fill={C.white} fontSize={10} fontWeight={600} formatter={v=>v!=null?`${v}%`:""} offset={14}/>
            </Line>
          </ComposedChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 5: Proofread Completed & Backlog per Proofreader ──────
    function Chart5({deals,gran,bucket,proofTarget,proofOverrides}){
      const data=useMemo(()=>{
        if(!bucket)return[];
        const mult=gran==="DoD"?1/5:gran==="MoM"?4.33:1;
        const endOfPeriod=bucketEndDate(bucket,gran);

        // Completed counts
        const completed={};
        deals.forEach(d=>{
          if(!d.exitedProofreading)return;
          if(dateToBucket(d.exitedProofreading,gran)!==bucket)return;
          if(!d.prooferName||d.prooferName==="Unknown"||/^\d+$/.test(d.prooferName))return;
          completed[d.prooferName]=(completed[d.prooferName]||0)+1;
        });

        // Backlog counts
        const backlog={};
        deals.forEach(d=>{
          if(!d.enteredProofreading)return;
          if(d.enteredProofreading>endOfPeriod)return;
          if(d.exitedProofreading&&d.exitedProofreading<=endOfPeriod)return;
          const name=d.prooferName&&d.prooferName!=="Unknown"&&!/^\d+$/.test(d.prooferName)?d.prooferName:"Unassigned";
          backlog[name]=(backlog[name]||0)+1;
        });

        // Merge all proofreader names
        const allNames=new Set([...Object.keys(completed),...Object.keys(backlog)]);
        return Array.from(allNames).map(name=>{
          const comp=completed[name]||0;
          const back=backlog[name]||0;
          const wt=proofOverrides[name]??proofTarget;
          const target=Math.round(wt*mult);
          return{name,completed:comp,backlog:back,target,met:comp>=target};
        }).filter(d=>d.completed>=1||d.backlog>=1).sort((a,b)=>(b.completed+b.backlog)-(a.completed+a.backlog));
      },[deals,gran,bucket,proofTarget,proofOverrides]);

      const globalTarget=Math.round(proofTarget*(gran==="DoD"?1/5:gran==="MoM"?4.33:1));
      const maxVal=Math.max(...data.map(d=>Math.max(d.completed+d.backlog,d.target)),globalTarget,5);
      if(!data.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No proofreading data in this period</div>;

      const CompletedLabel=({x,y,width,value})=>{
        if(!value)return null;
        return<text x={x+width+4} y={y+11} fill={C.white} fontSize={11} fontWeight={600}>{value}</text>;
      };
      const BacklogLabel=({x,y,width,value})=>{
        if(!value)return null;
        return<text x={x+width+4} y={y+11} fill="rgba(243,156,18,0.9)" fontSize={11} fontWeight={600}>{value}</text>;
      };

      return(
        <ResponsiveContainer width="100%" height={Math.max(280,data.length*52+60)}>
          <BarChart data={data} layout="vertical" margin={{top:30,right:60,left:10,bottom:10}} barCategoryGap="25%">
            <CartesianGrid horizontal={false} stroke={C.grid} strokeDasharray="3 3"/>
            <XAxis type="number" domain={[0,Math.ceil(maxVal*1.15)]} tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false}/>
            <YAxis type="category" dataKey="name" width={130} tick={{fill:C.text,fontSize:12}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Legend verticalAlign="top" height={28} wrapperStyle={{color:C.text,fontSize:12}}/>
            <ReferenceLine x={globalTarget} stroke={C.white} strokeDasharray="8 4" strokeWidth={2.5} label={{value:`Target: ${globalTarget}`,position:"top",fill:C.white,fontSize:14,fontWeight:700,offset:10}}/>
            <Bar dataKey="completed" name="Completed" radius={[0,6,6,0]} barSize={18}>
              <LabelList content={<CompletedLabel/>}/>
              {data.map((entry,i)=>(<Cell key={i} fill={entry.met?C.green:C.red}/>))}
            </Bar>
            <Bar dataKey="backlog" name="Backlog" radius={[0,6,6,0]} barSize={18} fill="rgba(243,156,18,0.5)">
              <LabelList content={<BacklogLabel/>}/>
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // ─── Settings Panel ─────────────────────────────────────────
    // ─── Chart 6: Drafting Productivity & Avg Turnaround ──────
    function Chart6({deals,gran}){
      const data=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?25:gran==="WoW"?10:8;
        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){
          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        const completed={};
        deals.forEach(d=>{
          if(!d.exitedDrafting)return;
          const b=dateToBucket(d.exitedDrafting,gran);
          if(!completed[b])completed[b]={count:0,days:[]};
          completed[b].count++;
          if(d.draftingTurnaroundDays!=null)completed[b].days.push(d.draftingTurnaroundDays);
        });

        return uniq.map(bucket=>{
          const c=completed[bucket]||{count:0,days:[]};
          const avgTurnaround=c.days.length?parseFloat((c.days.reduce((s,v)=>s+v,0)/c.days.length).toFixed(0)):null;
          return{bucket,label:bucketLabel(bucket,gran),drafted:c.count,avgTurnaround};
        });
      },[deals,gran]);

      return(
        <ResponsiveContainer width="100%" height={340}>
          <ComposedChart data={data} margin={{top:20,right:40,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis yAxisId="left" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} label={{value:"Avg Days",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Drafted",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:11,color:C.text}}/>
            <ReferenceArea yAxisId="left" y1={0} y2={10} fill={C.green} fillOpacity={0.08}/>
            <ReferenceLine yAxisId="left" y={10} stroke={C.green} strokeDasharray="8 4" strokeWidth={2.5} label={{value:"10d Internal SLA",position:"insideBottomRight",fill:C.green,fontSize:12,fontWeight:700}}/>
            <ReferenceLine yAxisId="left" y={28} stroke={C.amber} strokeDasharray="8 4" strokeWidth={2.5} label={{value:"28d Customer SLA",position:"insideBottomRight",fill:C.amber,fontSize:12,fontWeight:700}}/>
            <Bar yAxisId="right" dataKey="drafted" name="Total Drafted" fill={C.blueFaded} stroke={C.blue} strokeWidth={0.5} barSize={28} radius={[4,4,0,0]}>
              <LabelList dataKey="drafted" position="top" fill={C.blue} fontSize={10} fontWeight={600}/>
            </Bar>
            <Line yAxisId="left" type="linear" dataKey="avgTurnaround" name="Avg Turnaround" stroke="transparent" strokeWidth={0} dot={makeSLALine([{max:10,color:C.green},{max:28,color:C.amber},{max:Infinity,color:C.red}])} activeDot={false} connectNulls isAnimationActive={false}>
              <LabelList dataKey="avgTurnaround" position="top" fill={C.white} fontSize={10} fontWeight={600} formatter={v=>v!=null?`${v}d`:""} offset={12}/>
            </Line>
          </ComposedChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 7: Query Rate per Drafter (heatmap + drill-down) ─
    function Chart7({deals,gran}){
      const[expanded,setExpanded]=useState(null); // "name|bucket" or null
      const{periods,drafters,grid,dealMap}=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?14:gran==="WoW"?10:8;
        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){
          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const periods=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        const byPD={};const dTotals={};const dealMap={};
        // Denominator: deals bucketed by their FIRST entry into Required — Proof Reading, attributed to drafter
        // Numerator:   deals bucketed by their FIRST entry into Drafting Query (deduped per deal), attributed to drafter
        deals.forEach(d=>{
          if(!d.drafterName||d.drafterName==="Unknown"||/^\d+$/.test(d.drafterName))return;
          if(d.firstProofreadingDate){
            const b=dateToBucket(d.firstProofreadingDate,gran);
            const key=`${b}|${d.drafterName}`;
            if(!byPD[key])byPD[key]={total:0,queried:0};
            byPD[key].total++;
            dTotals[d.drafterName]=(dTotals[d.drafterName]||0)+1;
            if(!dealMap[key])dealMap[key]=[];
            dealMap[key].push(d);
          }
          if(d.firstQueryDate&&!d.komalQueryExcluded){
            const b=dateToBucket(d.firstQueryDate,gran);
            const key=`${b}|${d.drafterName}`;
            if(!byPD[key])byPD[key]={total:0,queried:0};
            byPD[key].queried++;
          }
        });

        const drafters=Object.entries(dTotals).filter(([,c])=>c>=10).map(([n])=>n).sort();

        const grid={};
        drafters.forEach(name=>{
          grid[name]={};
          periods.forEach(bucket=>{
            const pd=byPD[`${bucket}|${name}`];
            if(pd&&pd.total>=1){
              const rate=parseFloat(Math.min((pd.queried/pd.total)*100,100).toFixed(0));
              grid[name][bucket]={rate,total:pd.total,queried:pd.queried};
            }else{grid[name][bucket]=null;}
          });
        });
        return{periods,drafters,grid,dealMap};
      },[deals,gran]);

      // Reset expanded when granularity changes
      useEffect(()=>{setExpanded(null);},[gran]);

      if(!drafters.length)return<div style={{color:C.text,textAlign:"center",paddingTop:60}}>No query rate data available</div>;

      function cellBg(rate){
        if(rate==null)return"transparent";
        if(rate<=5)return"rgba(39,174,96,0.25)";
        if(rate<=10)return"rgba(243,156,18,0.25)";
        if(rate<=20)return"rgba(243,156,18,0.4)";
        return"rgba(231,76,60,0.35)";
      }
      function cellColor(rate){
        if(rate==null)return C.text;
        if(rate<=5)return C.green;
        if(rate<=10)return C.amber;
        return C.red;
      }

      const toggleCell=(name,bucket)=>{
        const key=`${bucket}|${name}`;
        setExpanded(prev=>prev===key?null:key);
      };

      const hdrStyle={padding:"6px 8px",fontSize:10,fontWeight:600,color:C.white,borderBottom:`1px solid ${C.border}`,textAlign:"center",position:"sticky",top:0,background:C.surface,whiteSpace:"nowrap"};
      const nameStyle={padding:"6px 10px",fontSize:12,fontWeight:500,color:C.white,borderBottom:`1px solid ${C.border}`,position:"sticky",left:0,background:C.surface,whiteSpace:"nowrap",zIndex:2};
      const cellStyleFn=(rate,isExpanded)=>({padding:"6px 8px",fontSize:11,fontWeight:600,textAlign:"center",borderBottom:`1px solid ${C.border}`,background:cellBg(rate),color:cellColor(rate),minWidth:52,cursor:rate!=null?"pointer":"default",outline:isExpanded?`2px solid ${C.white}`:"none",borderRadius:isExpanded?4:0});

      const expandedDeals=expanded?dealMap[expanded]||[]:[];
      const expandedParts=expanded?expanded.split("|"):[];
      const expandedBucket=expandedParts[0]||"";
      const expandedName=expandedParts[1]||"";

      return(
        <div>
          <div style={{overflowX:"auto",overflowY:"auto",maxHeight:Math.max(300,drafters.length*36+50),borderRadius:8,border:`1px solid ${C.border}`}}>
            <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
              <thead>
                <tr>
                  <th style={{...hdrStyle,textAlign:"left",position:"sticky",left:0,zIndex:3,background:C.surface,minWidth:120}}>Drafter</th>
                  {periods.map(p=><th key={p} style={hdrStyle}>{bucketLabel(p,gran)}</th>)}
                </tr>
              </thead>
              <tbody>
                {drafters.map(name=>(
                  <tr key={name}>
                    <td style={nameStyle}>{name}</td>
                    {periods.map(p=>{
                      const cell=grid[name][p];
                      const rate=cell?cell.rate:null;
                      const key=`${p}|${name}`;
                      const isExp=expanded===key;
                      return(
                        <td key={p} style={cellStyleFn(rate,isExp)} title={cell?`${cell.queried}/${cell.total} queried — click to expand`:""} onClick={()=>cell&&cell.total>0&&toggleCell(name,p)}>
                          {rate!=null?`${rate}%`:"—"}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {expanded&&expandedDeals.length>0&&(()=>{
            const queriedCount=expandedDeals.filter(d=>d.enteredDraftingQuery&&!d.komalQueryExcluded).length;
            const excludedCount=expandedDeals.filter(d=>d.komalQueryExcluded).length;
            const sortedDeals=[...expandedDeals].sort((a,b)=>{const aQ=a.enteredDraftingQuery&&!a.komalQueryExcluded;const bQ=b.enteredDraftingQuery&&!b.komalQueryExcluded;return aQ&&!bQ?-1:!aQ&&bQ?1:0;});
            return(
            <div style={{marginTop:12,padding:16,background:"rgba(0,0,0,0.25)",borderRadius:8,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:12,color:C.white,fontWeight:600,marginBottom:10}}>
                {expandedName} — {bucketLabel(expandedBucket,gran)} — {queriedCount} queried / {expandedDeals.length} total{excludedCount>0?` (${excludedCount} excluded — Komal reassignment)`:""}
                <button style={{...S.btn,padding:"2px 8px",fontSize:10,marginLeft:12,verticalAlign:"middle"}} onClick={()=>setExpanded(null)}>{"\u2715"} Close</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:200,overflowY:"auto"}}>
                {sortedDeals.map(d=>(
                  <div key={d.id} style={{fontSize:12,display:"flex",alignItems:"center",gap:12}}>
                    <a href={HS_BASE+d.id} target="_blank" rel="noopener" style={{color:d.komalQueryExcluded?"#888":d.enteredDraftingQuery?C.red:C.accent,textDecoration:d.komalQueryExcluded?"line-through":"none",fontWeight:500}}>{d.dealname||d.id}</a>
                    {d.komalQueryExcluded?<span style={{fontSize:11,color:"#888",fontStyle:"italic"}}>Excluded (Komal)</span>:d.enteredDraftingQuery?<span style={{fontSize:11,color:C.text,opacity:0.6}}>{d.queryReasons.join(", ")}</span>:<span style={{fontSize:11,color:C.text,opacity:0.4}}>No query</span>}
                  </div>
                ))}
              </div>
            </div>);
          })()}
        </div>
      );
    }

    function SettingsPanel({open,onClose,standardTarget,setStandardTarget,overrides,setOverrides,drafterNames,proofTarget,setProofTarget,proofOverrides,setProofOverrides,prooferNames,saveStatus,saveError}){

      const allNames=[...new Set([...drafterNames,...Object.keys(overrides)])].filter(n=>!/^\d+$/.test(n)).sort();
      const allProofNames=[...new Set([...prooferNames,...Object.keys(proofOverrides)])].filter(n=>!/^\d+$/.test(n)).sort();
      const statusPill=(()=>{
        if(saveStatus==="saving")return{text:"Saving\u2026",color:C.amber,bg:"rgba(243,156,18,0.12)"};
        if(saveStatus==="saved")return{text:"Saved \u2713",color:C.green,bg:"rgba(39,174,96,0.12)"};

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <h2 style={{color:C.white,fontSize:16,margin:0}}>Target Settings</h2>

            {statusPill&&(

            {/* ── Drafting Section ── */}
            <h3 style={{color:C.accent,fontSize:13,textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:`1px solid ${C.border}`,paddingBottom:6}}>Drafting</h3>

                    {isOvr&&<button onClick={()=>setOverrides(prev=>{const n={...prev};delete n[name];return n;})} style={{...S.btn,padding:"3px 8px",fontSize:11}}>Reset</button>}

    // ─── Chart 12: Drafting Pipeline Flow (entered, exited, backlog) ──
    function Chart12({deals,gran}){
      const data=useMemo(()=>{
        const now=new Date();
        const periodsBack=gran==="DoD"?25:gran==="WoW"?10:8;
        const buckets=[];
        for(let i=periodsBack-1;i>=0;i--){
          const d=new Date(now);
          if(gran==="DoD")d.setDate(d.getDate()-i);
          else if(gran==="WoW")d.setDate(d.getDate()-i*7);
          else d.setMonth(d.getMonth()-i);
          buckets.push(dateToBucket(d,gran));
        }
        const seen=new Set();
        const uniq=buckets.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

        // Hybrid: original dates for entered (stable), native dates for exited & backlog
        const entered={};const exited={};
        deals.forEach(d=>{
          // Entered: use original (workflow-stamped) date, fall back to native
          const ent=d.origEnteredDrafting||d.enteredDrafting;
          if(ent){
            const b=dateToBucket(ent,gran);
            entered[b]=(entered[b]||0)+1;
          }
          // Exited: use native (latest exit reflects current reality)
          if(d.nativeExitedDrafting){
            const b=dateToBucket(d.nativeExitedDrafting,gran);
            exited[b]=(exited[b]||0)+1;
          }
        });

        const lastBucket=uniq[uniq.length-1];
        return uniq.map(bucket=>{
          const endOfPeriod=bucketEndDate(bucket,gran);
          let backlog=0;
          if(bucket===lastBucket){
            // Current period: use dealstage for accurate count (stage 1223620771 = Drafting Instructions)
            deals.forEach(d=>{
              if(d.dealstage==="1223620771")backlog++;
            });
          }else{
            // Historical backlog: native dates (latest entry/exit reflects current state better)
            deals.forEach(d=>{
              if(!d.enteredDrafting||d.enteredDrafting>endOfPeriod)return;
              if(d.nativeExitedDrafting&&d.nativeExitedDrafting<=endOfPeriod&&d.nativeExitedDrafting>=d.enteredDrafting)return;
              backlog++;
            });
          }
          return{
            bucket,label:bucketLabel(bucket,gran),
            entered:entered[bucket]||0,
            exited:exited[bucket]||0,
            backlog
          };
        });
      },[deals,gran]);

      const maxBacklog=Math.max(...data.map(d=>d.backlog),5);
      const maxNet=Math.max(...data.map(d=>Math.abs(d.entered-d.exited)),5);

      // Add net flow + custom tooltip data
      const chartData=data.map(d=>({...d,net:d.entered-d.exited}));

      const PipelineTooltip=({active,payload,label})=>{
        if(!active||!payload||!payload.length)return null;
        const d=payload[0]?.payload;
        if(!d)return null;
        return(
          <div style={{background:"rgba(30,30,30,0.95)",border:`1px solid ${C.grid}`,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.text,minWidth:160}}>
            <div style={{fontWeight:700,marginBottom:6,fontSize:13}}>{label}</div>
            <div style={{display:"flex",justifyContent:"space-between",gap:16,marginBottom:3}}>
              <span style={{color:"rgba(231,76,60,0.9)"}}>{"\u2191"} Entered</span><span style={{fontWeight:600}}>{d.entered}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",gap:16,marginBottom:3}}>
              <span style={{color:"rgba(46,204,113,0.9)"}}>{"\u2193"} Exited</span><span style={{fontWeight:600}}>{d.exited}</span>
            </div>
            <div style={{borderTop:`1px solid ${C.grid}`,marginTop:4,paddingTop:4,display:"flex",justifyContent:"space-between",gap:16,marginBottom:3}}>
              <span style={{fontWeight:700}}>Net</span><span style={{fontWeight:700,color:d.net>0?"#e74c3c":d.net<0?C.green:C.text}}>{d.net>0?"+":""}{d.net}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",gap:16}}>
              <span style={{color:C.amber,fontWeight:600}}>Backlog</span><span style={{fontWeight:700,color:C.amber}}>{d.backlog}</span>
            </div>
          </div>
        );
      };

      const NetLabel=({x,y,width,value})=>{
        if(value==null)return null;
        const col=value>0?"#e74c3c":value<0?C.green:C.text;
        const yPos=value>=0?y-6:y+16;
        return<text x={x+width/2} y={yPos} fill={col} fontSize={11} fontWeight={700} textAnchor="middle">{value>0?"+":""}{value}</text>;
      };

      return(
        <ResponsiveContainer width="100%" height={380}>
          <ComposedChart data={chartData} margin={{top:30,right:50,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis yAxisId="left" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} label={{value:"Net Flow",angle:-90,position:"insideLeft",fill:C.text,fontSize:11}}/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} domain={[0,Math.ceil(maxBacklog*1.15)]} label={{value:"Backlog",angle:90,position:"insideRight",fill:C.text,fontSize:11}}/>
            <Tooltip content={<PipelineTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:11,color:C.text}}/>
            <ReferenceLine yAxisId="left" y={0} stroke={C.text} strokeWidth={1} strokeOpacity={0.3}/>
            <Bar yAxisId="left" dataKey="net" name="Net Flow (Entered \u2212 Exited)" barSize={30} radius={[4,4,4,4]}>
              <LabelList content={<NetLabel/>}/>
              {chartData.map((entry,i)=>(<Cell key={i} fill={entry.net>0?"rgba(231,76,60,0.45)":entry.net<0?"rgba(46,204,113,0.45)":"rgba(150,150,150,0.3)"} stroke={entry.net>0?"#e74c3c":entry.net<0?"#2ecc71":"#999"} strokeWidth={1}/>))}
            </Bar>

            </Line>
          </ComposedChart>
        </ResponsiveContainer>
      );
    }

        const counts={};
        deals.forEach(d=>{
          if(!d.enteredAppointmentOutcome)return;
          const b=dateToBucket(d.enteredAppointmentOutcome,gran);
          counts[b]=(counts[b]||0)+1;
        });

        // 3-period moving average
        const raw=uniq.map(b=>counts[b]||0);
        return uniq.map((bucket,i)=>{
          const count=raw[i];
          const window=raw.slice(Math.max(0,i-2),i+1);
          const ma=window.length?parseFloat((window.reduce((s,v)=>s+v,0)/window.length).toFixed(0)):null;
          return{bucket,label:bucketLabel(bucket,gran),count,ma};
        });
      },[deals,gran]);

      const maxVal=Math.max(...data.map(d=>d.count),5);

      return(
        <ResponsiveContainer width="100%" height={340}>
          <ComposedChart data={data} margin={{top:20,right:40,left:10,bottom:10}}>
            <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={0} angle={-30} textAnchor="end" height={60}/>
            <YAxis tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false} domain={[0,Math.ceil(maxVal*1.15)]}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Legend verticalAlign="top" align="right" wrapperStyle={{fontSize:11,color:C.text}}/>
            <Bar dataKey="count" name="Deals Entered" fill="rgba(52,152,219,0.45)" stroke="#3498db" strokeWidth={0.5} barSize={30} radius={[4,4,0,0]}>
              <LabelList dataKey="count" position="top" fill={C.text} fontSize={11} fontWeight={600}/>
            </Bar>
            <Line type="monotone" dataKey="ma" name="3-Period Avg" stroke={C.amber} strokeWidth={2.5} dot={{fill:C.amber,r:4}} activeDot={{r:6}} connectNulls/>
          </ComposedChart>
        </ResponsiveContainer>
      );
    }

    // ─── Chart 14: Drafter Activity Heatmap ────────────────────
    function ActivityHeatmap({drafterNames:drafterNamesProp,onTableData,deals:allDeals}){
      const[activityData,setActivityData]=useState(null);
      const[activityLoading,setActivityLoading]=useState(false);
      const[selectedDate,setSelectedDate]=useState(()=>{const d=new Date();return d.toISOString().slice(0,10);});

      const loadActivity=useCallback(async()=>{
        setActivityLoading(true);
        try{
          const res=await fetch("/api/activity");
          if(!res.ok)throw new Error("Failed to fetch activity");
          const data=await res.json();
          setActivityData(data);
        }catch(e){console.error(e);}
        setActivityLoading(false);
      },[]);

      useEffect(()=>{loadActivity();},[loadActivity]);

      const heatmapData=useMemo(()=>{
        if(!activityData)return{drafters:[],hours:[],grid:{}};

        // ownerMap maps HubSpot owner IDs → names (from /api/activity)
        // drafterNamesProp is an array of drafter names from processed deals
        const ownerMap=activityData.ownerMap||{};
        const knownDrafters=new Set((drafterNamesProp||[]).map(n=>n.trim().toLowerCase()));

        // Build reverse lookup: for each HubSpot owner, check if their name matches a known drafter
        const drafterOwnerIds=new Set();
        Object.entries(ownerMap).forEach(([ownerId,name])=>{
          if(knownDrafters.has(name.trim().toLowerCase()))drafterOwnerIds.add(ownerId);
        });

        const hours=[];
        for(let h=7;h<=19;h++)hours.push(h);

        const selDate=selectedDate; // "YYYY-MM-DD"

        // Build grid: {ownerId: {hour: count}} and collect individual activities per drafter
        const grid={};
        const activitiesByOwner={};
        (activityData.activities||[]).forEach(a=>{
          if(!drafterOwnerIds.has(a.ownerId))return;
          const dt=new Date(a.timestamp);
          // Use local date (not UTC) so hours and date align with user's timezone
          const dateStr=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
          if(dateStr!==selDate)return;
          const hour=dt.getHours();
          if(!grid[a.ownerId])grid[a.ownerId]={};
          grid[a.ownerId][hour]=(grid[a.ownerId][hour]||0)+1;
          if(!activitiesByOwner[a.ownerId])activitiesByOwner[a.ownerId]=[];
          activitiesByOwner[a.ownerId].push(a);
        });

        // Inject deal stage movements as activities
        // Build name→ownerId map for matching deals to owners
        const nameToOwnerId={};
        Object.entries(ownerMap).forEach(([id,name])=>{
          if(drafterOwnerIds.has(id))nameToOwnerId[name.trim().toLowerCase()]=id;
        });

        const stageEvents=[
          {key:"origDraftsWithCustomer",label:"\u2192 Drafts With Customer"},
          {key:"origReadyForPrinting",label:"\u2192 Ready For Printing"},
          {key:"enteredProofreading",label:"\u2192 Required - Proof Reading"},
          {key:"enteredConsultantQuery",label:"\u2192 Consultant Query"},
          {key:"exitedApproved",label:"\u2192 Exited Approved"},
        ];

        (allDeals||[]).forEach(deal=>{
          const drafterLower=(deal.drafterName||"").trim().toLowerCase();
          const oid=nameToOwnerId[drafterLower];
          if(!oid)return;

          stageEvents.forEach(ev=>{
            const ts=deal[ev.key];
            if(!ts)return;
            const dt=new Date(ts);
            const dateStr=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
            if(dateStr!==selDate)return;
            const hour=dt.getHours();
            if(!grid[oid])grid[oid]={};
            grid[oid][hour]=(grid[oid][hour]||0)+1;
            if(!activitiesByOwner[oid])activitiesByOwner[oid]=[];
            activitiesByOwner[oid].push({
              id:deal.id,
              ownerId:oid,
              timestamp:dt.getTime(),
              type:"Stage Move",
              dealIds:[deal.id],
              _stageLabel:ev.label,
              _dealName:deal.dealname
            });
          });
        });

        // Build drafter list — only known drafters
        const drafters=[...drafterOwnerIds].map(id=>({
          id,
          name:ownerMap[id]||id
        })).filter(d=>d.name&&d.name!=="Unknown"&&!/^\d+$/.test(d.name)).sort((a,b)=>a.name.localeCompare(b.name));

        return{drafters,hours,grid,activitiesByOwner};
      },[activityData,drafterNamesProp,selectedDate,allDeals]);

      const{drafters,hours,grid,activitiesByOwner}=heatmapData;

      // Expose table data to parent ChartCard
      useEffect(()=>{
        if(!onTableData)return;
        const HS_ENGAGE_BASE="https://app.hubspot.com/contacts/4385478/record/0-";
        const typeMap={notes:"4",calls:"48",tasks:"27",email:"49",incoming_email:"49",meeting:"10"};
        const cols=[{key:"name",label:"Drafter"},{key:"total",label:"Total Activities"},{key:"activeHours",label:"Active Hours"}];
        const detailCols=[{key:"type",label:"Type"},{key:"time",label:"Time"},{key:"dealLinks",label:"Linked Deals"}];
        const rows=[];
        const detailMap={};
        drafters.forEach(d=>{
          const row=grid[d.id]||{};
          const totalAct=hours.reduce((s,h)=>s+(row[h]||0),0);
          const activeH=hours.filter(h=>row[h]>0).length;
          rows.push({_key:d.id,name:d.name,total:totalAct,activeHours:activeH});
          // Build detail rows from individual activities
          const acts=activitiesByOwner[d.id]||[];
          detailMap[d.id]=acts.map(a=>{
            const dt=new Date(a.timestamp);
            const timeStr=String(dt.getHours()).padStart(2,"0")+":"+String(dt.getMinutes()).padStart(2,"0");
            const isStageMove=a.type==="Stage Move";
            const typeCode=typeMap[(a.type||"").toLowerCase()]||"";
            const dealUrl="https://app.hubspot.com/contacts/4385478/deal/"+a.id;
            const engUrl=isStageMove?dealUrl:(a.url||(a.id&&typeCode?HS_ENGAGE_BASE+typeCode+"/"+a.id:null));
            const dealLinks=(a.dealIds||[]).map(did=>"https://app.hubspot.com/contacts/4385478/deal/"+did);
            const displayName=isStageMove
              ?(a._dealName||a.id)+" "+a._stageLabel
              :a.type+" @ "+timeStr;
            return{
              id:a.id||String(a.timestamp),
              dealname:displayName,
              type:isStageMove?"Stage Move":a.type,
              time:timeStr,
              dealLinks:isStageMove?(a._dealName||"Deal"):dealLinks.length?dealLinks.length+" deal(s)":"\u2014",
              _engUrl:engUrl,
              _dealUrls:isStageMove?[dealUrl]:dealLinks
            };
          }).sort((a,b)=>a.time.localeCompare(b.time));
        });
        onTableData({columns:cols,rows,detailMap,detailCols,csvName:`drafter_activity_${selectedDate}.csv`});
      },[drafters,hours,grid,activitiesByOwner,selectedDate,onTableData]);

      // Date navigation
      const changeDate=(delta)=>{
        const d=new Date(selectedDate+"T12:00:00");
        d.setDate(d.getDate()+delta);
        setSelectedDate(d.toISOString().slice(0,10));
      };
      const dayLabel=new Date(selectedDate+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});

      if(activityLoading&&!activityData)return<div style={{color:C.text,textAlign:"center",padding:40}}>Loading activity data...</div>;

      return(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <button onClick={()=>changeDate(-1)} style={{background:C.surface,border:`1px solid ${C.grid}`,color:C.text,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:14}}>&larr;</button>
            <span style={{color:C.white,fontWeight:700,fontSize:15,minWidth:140,textAlign:"center"}}>{dayLabel}</span>
            <button onClick={()=>changeDate(1)} style={{background:C.surface,border:`1px solid ${C.grid}`,color:C.text,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:14}}>&rarr;</button>
            <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={{background:C.surface,border:`1px solid ${C.grid}`,color:C.text,borderRadius:6,padding:"6px 10px",fontSize:12}}/>
          </div>
          {!drafters.length?(
            <div style={{color:C.muted,textAlign:"center",padding:40}}>No drafter activity data for this date</div>
          ):(
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
                <thead>
                  <tr>
                    <th style={{textAlign:"left",padding:"6px 10px",color:C.text,fontWeight:600,borderBottom:`1px solid ${C.grid}`,position:"sticky",left:0,background:C.surface,zIndex:1,minWidth:130}}>Drafter</th>
                    {hours.map(h=>(
                      <th key={h} style={{padding:"6px 4px",color:C.text,fontWeight:600,borderBottom:`1px solid ${C.grid}`,textAlign:"center",minWidth:42,fontSize:11}}>{String(h).padStart(2,"0")}:00</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {drafters.map(d=>{
                    const row=grid[d.id]||{};
                    const totalHours=hours.filter(h=>row[h]>0).length;
                    return(
                      <tr key={d.id}>
                        <td style={{padding:"6px 10px",color:C.text,borderBottom:`1px solid rgba(255,255,255,0.05)`,position:"sticky",left:0,background:C.surface,zIndex:1,fontWeight:500}}>
                          {d.name} <span style={{color:C.muted,fontSize:10,fontWeight:400}}>({totalHours}h)</span>
                        </td>
                        {hours.map(h=>{
                          const count=row[h]||0;
                          const bg=count===0?"rgba(255,255,255,0.03)":count<=2?"rgba(46,204,113,0.25)":count<=5?"rgba(46,204,113,0.5)":"rgba(46,204,113,0.8)";
                          return(
                            <td key={h} style={{padding:"6px 4px",borderBottom:`1px solid rgba(255,255,255,0.05)`,textAlign:"center",background:bg,borderRadius:3,transition:"background 0.2s"}} title={`${d.name} @ ${h}:00 — ${count} activities`}>
                              {count>0?<span style={{color:C.white,fontWeight:600,fontSize:11}}>{count}</span>:<span style={{color:"rgba(255,255,255,0.1)"}}>&mdash;</span>}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    function MacmillanSLATable({deals,stageLabels}){
      const SLA_DAYS=20;
      // Normalise stage labels (collapse dash/whitespace/case) so "Required — Proof Reading"
      // matches "Required - Proof Reading" etc.
      const normStage=s=>(s||"").toLowerCase().replace(/[\u2013\u2014-]+/g," ").replace(/\s+/g," ").trim();
      const ALLOWED_STAGES=new Set([
        "drafting instructions",
        "drafting query",
        "required proof reading",
        "approved proof reading"
      ]);
      const rows=useMemo(()=>{
        const today=new Date();today.setHours(0,0,0,0);
        const out=[];
        deals.forEach(d=>{
          if(!d.leadSources||!d.leadSources.includes("Macmillan"))return;
          if(!d.dateOfAppointment)return;
          // Only include deals currently in a pre-"Drafts with Customer" stage
          const stageLabel=stageLabels[d.dealstage]||d.dealstage||"";
          if(!ALLOWED_STAGES.has(normStage(stageLabel)))return;
          const deadline=addBusinessDays(d.dateOfAppointment,SLA_DAYS);
          const bizRemaining=signedBusinessDays(today,deadline);
          out.push({
            id:d.id,
            dealname:d.dealname,
            drafter:d.drafterName&&d.drafterName!=="Unknown"?d.drafterName:"Unassigned",
            appointment:d.dateOfAppointment,
            deadline,
            bizRemaining,
            stage:stageLabels[d.dealstage]||d.dealstage||"—"
          });
        });
        out.sort((a,b)=>(a.bizRemaining??1e9)-(b.bizRemaining??1e9));
        return out;
      },[deals,stageLabels]);

      const rowColor=n=>n==null?C.text:n<0?C.red:n<=2?C.amber:n<=5?"#F1C40F":C.green;

      const exportCSV=useCallback(()=>{
        const hdr=["Deal ID","Deal Name","Drafter","Date of Appointment","SLA Deadline","Business Days Remaining","Current Stage","HubSpot Link"];
        const lines=[hdr,...rows.map(r=>[r.id,r.dealname,r.drafter,fmtDate(r.appointment),fmtDate(r.deadline),r.bizRemaining==null?"":r.bizRemaining,r.stage,HS_BASE+r.id])];
        downloadCSV(`macmillan_sla_${new Date().toISOString().slice(0,10)}.csv`,toCSV(lines));

      return(
        <div style={{padding:"16px 24px"}}>
          <div style={{background:C.surface,borderRadius:12,padding:"20px 20px 16px",border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:16}}>

                <div style={{color:C.white,fontSize:16,fontWeight:700}}>Macmillan — Deals Nearing SLA</div>
                <div style={{fontSize:12,color:C.text,opacity:0.7,marginTop:4}}>
                  Lead source = Macmillan, SLA = 20 business days from Date of Appointment. Only deals currently in Drafting Instructions, Drafting Query, Required — Proof Reading, or Approved — Proof Reading.
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:12,color:C.text,opacity:0.7}}>{rows.length} deal{rows.length===1?"":"s"}</span>
                <button style={S.btn} onClick={exportCSV} disabled={!rows.length}>{"\u2B07"} CSV</button>
              </div>
            </div>
            {rows.length===0?(
              <div style={{padding:"32px 16px",textAlign:"center",color:C.text,opacity:0.6,fontSize:13}}>No open Macmillan deals with an appointment date.</div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{borderBottom:`2px solid ${C.border}`,color:C.white,textAlign:"left"}}>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Deal Name</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Drafter</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Appointment</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>SLA Deadline</th>
                      <th style={{padding:"10px 12px",fontWeight:600,textAlign:"right"}}>Biz Days Remaining</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Current Stage</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map(r=>(
                      <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`}}>
                        <td style={{padding:"10px 12px"}}>
                          <a href={HS_BASE+r.id} target="_blank" rel="noopener noreferrer" style={{color:C.accent,textDecoration:"none"}}>{r.dealname}</a>
                        </td>
                        <td style={{padding:"10px 12px"}}>{r.drafter}</td>
                        <td style={{padding:"10px 12px"}}>{fmtDate(r.appointment)}</td>
                        <td style={{padding:"10px 12px"}}>{fmtDate(r.deadline)}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:rowColor(r.bizRemaining)}}>

                  </tbody>

              </div>
            )}
          </div>
        </div>

    function Dashboard(){
      const[loading,setLoading]=useState(true);
      const[error,setError]=useState(null);
      const[deals,setDeals]=useState([]);
      const[lastRefresh,setLastRefresh]=useState(null);
      const[totalRaw,setTotalRaw]=useState(0);
      const[komalExclusions,setKomalExclusions]=useState(new Set());
      const[gran,setGran]=useState("WoW");
      const[selectedBucket,setSelectedBucket]=useState(null);
      const[settingsOpen,setSettingsOpen]=useState(false);
      const[standardTarget,setStandardTarget]=useState(DEFAULT_STANDARD_TARGET);
      const[overrides,setOverrides]=useState({...DEFAULT_OVERRIDES});
      const[proofTarget,setProofTarget]=useState(DEFAULT_PROOF_TARGET);
      const[proofOverrides,setProofOverrides]=useState({...DEFAULT_PROOF_OVERRIDES});
      const[generating,setGenerating]=useState(false);
      const[draftingOwnerOpts,setDraftingOwnerOpts]=useState({});
      const[stageLabels,setStageLabels]=useState({});
      const[view,setView]=useState("graphs");
      const[authUser,setAuthUser]=useState(null);
      // Targets persistence (Google Sheets via /api/targets)
      const[targetsLoaded,setTargetsLoaded]=useState(false);
      const[saveStatus,setSaveStatus]=useState("idle"); // idle | saving | saved | error
      const[saveError,setSaveError]=useState(null);
      const saveTimerRef=useRef(null);

      // Check auth status on mount
      useEffect(()=>{
        fetch("/api/user").then(r=>r.json()).then(d=>{
          if(d.authenticated)setAuthUser(d.user);
        }).catch(()=>{});
      },[]);

      // Load persisted targets from Google Sheets on mount
      useEffect(()=>{
        fetch("/api/targets").then(r=>r.json()).then(d=>{
          if(d&&d.drafting){
            if(Number.isFinite(d.drafting.default))setStandardTarget(d.drafting.default);
            if(d.drafting.overrides)setOverrides(d.drafting.overrides);
          }
          if(d&&d.proofreading){
            if(Number.isFinite(d.proofreading.default))setProofTarget(d.proofreading.default);
            if(d.proofreading.overrides)setProofOverrides(d.proofreading.overrides);
          }
        }).catch(e=>console.error("Failed to load targets:",e))
         .finally(()=>setTargetsLoaded(true));
      },[]);

      // Debounced save whenever targets change (after initial load)
      useEffect(()=>{
        if(!targetsLoaded)return;
        if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
        saveTimerRef.current=setTimeout(()=>{
          setSaveStatus("saving");setSaveError(null);
          fetch("/api/targets",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              drafting:{default:standardTarget,overrides},
              proofreading:{default:proofTarget,overrides:proofOverrides}
            })
          }).then(async r=>{
            if(!r.ok){const e=await r.json().catch(()=>({error:r.statusText}));throw new Error(e.error||"Save failed");}
            setSaveStatus("saved");
            setTimeout(()=>setSaveStatus(prev=>prev==="saved"?"idle":prev),2000);
          }).catch(err=>{
            setSaveStatus("error");setSaveError(err.message||String(err));
          });
        },800);
        return()=>{if(saveTimerRef.current)clearTimeout(saveTimerRef.current);};
      },[standardTarget,overrides,proofTarget,proofOverrides,targetsLoaded]);

      // ── load data via server (serves from cache, or fetches fresh) ──
      const loadData=useCallback(async(force)=>{
        setLoading(true);setError(null);
        try{
          const result=await fetchDealsFromAPI(force);
          const rawDeals=result.deals||[];
          const ownerMap=result.ownerMap||{};
          const draftingOpts=result.draftingOwnerOptions||{};
          const proofOpts=result.proofOwnerOptions||{};
          const queryReasonOpts=result.queryReasonOptions||{};
          const urgentReasonOpts=result.urgentReasonOptions||{};
          const amendmentSourceOpts=result.amendmentSourceOptions||{};
          const leadSourceOpts=result.leadSourceOptions||{};
          const stageLbls=result.stageLabels||{};
          const dealHistoryMap=result.dealHistoryMap||{};
          const komalIds=new Set(result.komalExclusionIds||[]);
          setKomalExclusions(komalIds);
          setTotalRaw(rawDeals.length);
