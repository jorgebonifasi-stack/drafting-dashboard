                      </div>
                    </div>
                    <div style={card} title="Row 5 — Urgent Wills phone call within 24 hours. Cohort: deals where hs_priority = High OR urgent_request_reason is populated. Fail when cumulative time in 'Pending - Macmillan' > 2 days (mirrors the source spreadsheet's >2d threshold).">
                      <div style={cardLabel}>Urgent contact (24h) — fail %</div>
                      <div style={{...cardValue,color:macmillanKPIs.k5.pct==null?C.text:macmillanKPIs.k5.pct<=5?C.green:macmillanKPIs.k5.pct<=10?C.amber:C.red}}>{macmillanKPIs.k5.pct==null?"—":`${macmillanKPIs.k5.pct}%`}</div>
                      <div style={{fontSize:11,color:C.text,opacity:0.5,marginTop:4}}>
                        {macmillanKPIs.k5.total===0?"No urgent deals in this range":`${macmillanKPIs.k5.fail} of ${macmillanKPIs.k5.total} failed`}
                      </div>
                    </div>
                    <div style={card} title="Row 6 — Two further call attempts within 5 working days. Pass = BOTH hs_v2_date_exited_112034598 (Pending - Macmillan) AND hs_v2_date_exited_1230854698 (Attempting to contact) are populated, i.e. the deal progressed through both contact stages. Fail % = deals missing one or both exit stamps.">
                      <div style={cardLabel}>Two further calls (5d) — fail %</div>
                      <div style={{...cardValue,color:macmillanKPIs.k6.pct==null?C.text:macmillanKPIs.k6.pct<=5?C.green:macmillanKPIs.k6.pct<=10?C.amber:C.red}}>{macmillanKPIs.k6.pct==null?"—":`${macmillanKPIs.k6.pct}%`}</div>
                      <div style={{fontSize:11,color:C.text,opacity:0.5,marginTop:4}}>
                        {macmillanKPIs.k6.total===0?"No deals created in this range":`${macmillanKPIs.k6.fail} of ${macmillanKPIs.k6.total} missing a stage exit`}
                      </div>
                    </div>
                    <div style={card} title="Row 7 — Follow-up email if customer still unreached. Pass = hs_v2_date_exited_112034598 (Pending - Macmillan exit) is populated AND customer_email__macmillan_ is non-blank. Fail = either missing — no email captured, or deal never left the Pending stage.">
                      <div style={cardLabel}>Follow-up email — fail %</div>
                      <div style={{...cardValue,color:macmillanKPIs.k7.pct==null?C.text:macmillanKPIs.k7.pct<=5?C.green:macmillanKPIs.k7.pct<=10?C.amber:C.red}}>{macmillanKPIs.k7.pct==null?"—":`${macmillanKPIs.k7.pct}%`}</div>
                      <div style={{fontSize:11,color:C.text,opacity:0.5,marginTop:4}}>
                        {macmillanKPIs.k7.total===0?"No deals created in this range":`${macmillanKPIs.k7.fail} of ${macmillanKPIs.k7.total} missing pending exit or email`}
                      </div>
                    </div>
                  </div>
                  <div style={{color:C.white,fontSize:13,fontWeight:600,marginBottom:8}}>Leads by sub-contractor</div>
                  {macmillanKPIs.subBuckets.every(b=>b.count===0)?(
                    <div style={{fontSize:12,color:C.text,opacity:0.5,marginBottom:14}}>No Macmillan deals created in this range.</div>
                  ):(
                    <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                      {(()=>{
                        const maxCount=Math.max(...macmillanKPIs.subBuckets.map(b=>b.count),1);
                        return macmillanKPIs.subBuckets.map(b=>{
                          const pct=Math.round((b.count/maxCount)*100);
                          return(
                            <div key={b.name} style={{display:"flex",alignItems:"center",gap:10,fontSize:12}}>
                              <div style={{width:140,color:C.text}}>{b.name}</div>
                              <div style={{flex:1,height:18,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden"}}>
                                <div style={{width:`${pct}%`,height:"100%",background:b.name==="OL"?"rgba(52,152,219,0.55)":"rgba(155,89,182,0.55)",borderRadius:4}}/>
                              </div>
                              <div style={{width:50,textAlign:"right",color:C.white,fontWeight:600}}>{b.count}</div>
                            </div>
                          );
                        });
                      })()}
                    </div>
                  )}
                  <div style={{fontSize:11,color:C.text,opacity:0.5,marginBottom:18}}>
                    Total: {macmillanKPIs.subBuckets.reduce((s,b)=>s+b.count,0)} deals. Sub-contractor = drafterName matched to one of {MACMILLAN_SUBCONTRACTORS.join(", ")}. Anything else (including blanks / Unknown) → OL.
                  </div>

                  <div style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:6,marginTop:14,borderTop:`1px solid ${C.border}`,paddingTop:14}}>EPA deals — per-row KPI status</div>
                  <div style={{fontSize:12,color:C.text,opacity:0.6,marginBottom:14}}>
                    Every Macmillan deal created in the selected month. Each KPI column shows <strong style={{color:C.green}}>Met</strong>, <strong style={{color:C.red}}>Failed</strong>, or <strong style={{color:C.text}}>N/A</strong> (KPI 5 is N/A for non-urgent deals). KPI 6 passes when both <code style={{background:"rgba(255,255,255,0.05)",padding:"1px 4px",borderRadius:3}}>Pending - Macmillan</code> and <code style={{background:"rgba(255,255,255,0.05)",padding:"1px 4px",borderRadius:3}}>Attempting to contact</code> have exit dates. KPI 7 passes when the Pending exit is set AND <code style={{background:"rgba(255,255,255,0.05)",padding:"1px 4px",borderRadius:3}}>customer_email__macmillan_</code> is non-blank.
                  </div>
                  {epaRows.length===0?(
                    <div style={{padding:"32px 16px",textAlign:"center",color:C.text,opacity:0.6,fontSize:13}}>No Macmillan deals created in this range.</div>
                  ):(
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                        <thead>
                          <tr style={{borderBottom:`2px solid ${C.border}`,color:C.white,textAlign:"left"}}>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Deal Name</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Record ID</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Drafter</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Create Date</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"right"}}>Pending (days)</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>Urgent?</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>1st Connected Call</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>KPI 4 (2d)</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>KPI 5 (24h)</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}} title="Row 6 — Both Pending-Macmillan exit date AND Attempting-to-contact exit date populated.">KPI 6 (5d)</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}} title="Row 7 — Pending-Macmillan exit date populated AND customer_email__macmillan_ non-blank.">KPI 7 (Email)</th>
                          </tr>
                        </thead>
                        <tbody>
                          {epaRows.map(r=>{
                            const statusCell=v=>({
                              padding:"10px 12px",
                              textAlign:"center",
                              fontWeight:700,
                              color:v==="Met"?C.green:v==="Failed"?C.red:C.text,
                              opacity:v==="N/A"?0.5:1
                            });
                            return(
                              <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`}}>
                                <td style={{padding:"10px 12px"}}>
                                  <a href={HS_BASE+r.id} target="_blank" rel="noopener noreferrer" style={{color:C.accent,textDecoration:"none"}}>{r.dealname}</a>
                                </td>
                                <td style={{padding:"10px 12px",fontFamily:"ui-monospace,SFMono-Regular,Menlo,monospace",fontSize:12,color:C.text,opacity:0.7}}>{r.id}</td>
                                <td style={{padding:"10px 12px"}}>{r.drafter}</td>
                                <td style={{padding:"10px 12px"}}>{fmtDate(r.createDate)}</td>
                                <td style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>{r.pendingMacmillanDays==null?"—":r.pendingMacmillanDays.toFixed(1)+"d"}</td>
                                <td style={{padding:"10px 12px",textAlign:"center",color:r.isUrgent?C.red:C.text,fontWeight:r.isUrgent?700:400}}>{r.isUrgent?"Yes":"No"}</td>
                                <td style={{padding:"10px 12px",fontSize:12,color:C.text,opacity:r.firstConnectedCallDate?0.85:0.4}}>{r.firstConnectedCallDate?fmtDate(r.firstConnectedCallDate):"—"}</td>
                                <td style={statusCell(r.k4Status)}>{r.k4Status}</td>
                                <td style={statusCell(r.k5Status)}>{r.k5Status}</td>
                                <td style={statusCell(r.k6Status)} title={`Pending exit: ${r.pendingExitedDate?fmtDate(r.pendingExitedDate):"—"} | Attempting exit: ${r.attemptingExitedDate?fmtDate(r.attemptingExitedDate):"—"}`}>{r.k6Status}</td>
                                <td style={statusCell(r.k7Status)} title={`Pending exit: ${r.pendingExitedDate?fmtDate(r.pendingExitedDate):"—"} | Email: ${r.customerEmailMacmillan||"—"}`}>{r.k7Status}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}
                </React.Fragment>
              )}

              {/* CS tab — phone-call SLA per-deal view. */}
              {auditTab==="cs"&&leadFilter.has("Macmillan")&&(
                <React.Fragment>
                  <div style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:6}}>SLA Logic — CS (Phone-Call)</div>
                  <div style={{fontSize:12,color:C.text,opacity:0.6,marginBottom:14}}>
                    Cohort: Macmillan deals where the 6-month phone-call SLA deadline (DoA + 6 months) falls in the selected End SLA Month range, the deal currently has a draft in customer hands (DWC / RDWC / RFP / Sent To Customer or workflow stamps), region ≠ Scotland, and the deadline has passed. Compliant when ANY Macmillan Call N = "Yes" (signing confirmed), OR the legacy <code style={{background:"rgba(255,255,255,0.05)",padding:"1px 4px",borderRadius:3}}>confirmed_will_has_been_signed__macmillan__v2</code> = "Yes" (for deals resolved before the new Call N schema rolled out), OR all three Call N = "No" (full 3-attempt effort logged). Blanks with no Yes after deadline = breach. Looser than the Macmillan Follow-Up Queue's "all 3 filled" rule on purpose — the queue tracks paper-trail completion, the audit measures SLA outcomes.
                  </div>
                  {csRows.length===0?(
                    <div style={{padding:"32px 16px",textAlign:"center",color:C.text,opacity:0.6,fontSize:13}}>No Macmillan deals with SLA deadlines in this range.</div>
                  ):(
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                        <thead>
                          <tr style={{borderBottom:`2px solid ${C.border}`,color:C.white,textAlign:"left"}}>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Deal Name</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Record ID</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Legacy Advisor</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Date of Appointment</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>SLA Deadline</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>Call 1</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>Call 2</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>Call 3</th>
                            <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}} title="HubSpot property: confirmed_will_has_been_signed__macmillan__v2">Will Signed (legacy)</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Status</th>
                          </tr>
                        </thead>
                        <tbody>
                          {csRows.map(r=>{
                            const callCell=v=>({
                              padding:"10px 12px",
                              textAlign:"center",
                              fontWeight:v?700:400,
                              color:v==="yes"?C.green:v==="no"?C.amber:C.text,
                              opacity:v?1:0.5
                            });
                            const fmtCall=v=>v==="yes"?"Yes":v==="no"?"No":"—";
                            const statusColor=r.status==="Breached"?C.red:C.green;
                            return(
                              <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`}}>
                                <td style={{padding:"10px 12px"}}>
                                  <a href={HS_BASE+r.id} target="_blank" rel="noopener noreferrer" style={{color:C.accent,textDecoration:"none"}}>{r.dealname}</a>
                                </td>
                                <td style={{padding:"10px 12px",fontFamily:"ui-monospace,SFMono-Regular,Menlo,monospace",fontSize:12,color:C.text,opacity:0.7}}>{r.id}</td>
                                <td style={{padding:"10px 12px"}}>{r.legacyAdvisor}</td>
                                <td style={{padding:"10px 12px"}}>{fmtDate(r.appointment)}</td>
                                <td style={{padding:"10px 12px"}}>{fmtDate(r.deadline)}</td>
                                <td style={callCell(r.call1)}>{fmtCall(r.call1)}</td>
                                <td style={callCell(r.call2)}>{fmtCall(r.call2)}</td>
                                <td style={callCell(r.call3)}>{fmtCall(r.call3)}</td>
                                <td style={{padding:"10px 12px",textAlign:"center",fontWeight:r.willSignedLegacy?600:400,color:r.legacyYes?C.green:C.text,opacity:r.willSignedLegacy?0.95:0.4}}>{r.willSignedLegacy||"—"}</td>
                                <td style={{padding:"10px 12px",fontWeight:700,color:statusColor}}>{r.status}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}
                </React.Fragment>
              )}
            </div>
        </div>
      );

      if(embedded)return content;
      return(
        <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Inter','Segoe UI',system-ui,sans-serif"}}>
          {/* Header (standalone /audit only) */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,padding:"20px 24px",background:C.bgDarker,borderBottom:`1px solid ${C.border}`}}>
            <h1 style={{color:C.white,fontSize:20,fontWeight:700,margin:0}}>SLA Audit <span style={{color:C.text,opacity:0.6,fontWeight:400}}>— Drafting Dashboard</span></h1>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {lastRefresh&&<span style={{fontSize:11,color:C.text,opacity:0.6}}>Data from {lastRefresh.toLocaleTimeString()}</span>}
              <a href="/" style={{color:C.accent,textDecoration:"none",fontSize:13,fontWeight:500}}>{"← Back to dashboard"}</a>
            </div>
          </div>
          {content}
        </div>
      );
    }

    const __isTV=typeof window!=="undefined"&&window.location&&window.location.pathname.replace(/\/$/,"")==="/tv";
    const __isAudit=typeof window!=="undefined"&&window.location&&window.location.pathname.replace(/\/$/,"")==="/audit";
    ReactDOM.createRoot(document.getElementById("root")).render(__isTV?<TVDashboard/>:__isAudit?<AuditDashboard/>:<Dashboard/>);
  </script>
</body>
</html>
