        const detailMap={};uniq.forEach(b=>{
          const ent=(enteredByB[b]||[]).map(d=>({id:d.id,dealname:d.dealname,entered:fmtDate(d.origEnteredDrafting||d.enteredDrafting),exited:fmtDate(d.nativeExitedDrafting)}));
          const ext=(exitedByB[b]||[]).filter(d=>!enteredByB[b]||!enteredByB[b].includes(d)).map(d=>({id:d.id,dealname:d.dealname,entered:fmtDate(d.origEnteredDrafting||d.enteredDrafting),exited:fmtDate(d.nativeExitedDrafting)}));
          detailMap[b]=[...ent,...ext];
        });
        return{rows,detailMap};
      },[deals,gran]);

      const c13Table=useMemo(()=>{
        const now=new Date();const pb=gran==="DoD"?25:gran==="WoW"?10:8;const bkts=[];
        for(let i=pb-1;i>=0;i--){const d=new Date(now);if(gran==="DoD")d.setDate(d.getDate()-i);else if(gran==="WoW")d.setDate(d.getDate()-i*7);else d.setMonth(d.getMonth()-i);bkts.push(dateToBucket(d,gran));}
        const seen=new Set();const uniq=bkts.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});
        const byB={};
        deals.forEach(d=>{if(!d.enteredAppointmentOutcome)return;const b=dateToBucket(d.enteredAppointmentOutcome,gran);(byB[b]=byB[b]||[]).push(d);});
        const rows=uniq.map(bucket=>({_key:bucket,label:bucketLabel(bucket,gran),count:(byB[bucket]||[]).length}));
        const detailMap={};uniq.forEach(b=>{detailMap[b]=(byB[b]||[]).map(d=>({id:d.id,dealname:d.dealname,date:fmtDate(d.enteredAppointmentOutcome)}));});
        return{rows,detailMap};
      },[deals,gran]);

      if(loading&&!deals.length)return<SkeletonUI/>;

      return(
        <div style={S.page}>
          {/* Top Bar */}
          <div style={S.topBar}>
            <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
              <h1 style={S.title}>Estate Planning &mdash; Drafting &amp; Proofreading</h1>
              <div style={{display:"flex",gap:4,padding:2,background:C.surface,borderRadius:8,border:`1px solid ${C.border}`}}>
                <button style={{padding:"6px 14px",borderRadius:6,border:"none",background:view==="graphs"?C.accent:"transparent",color:view==="graphs"?C.white:C.text,cursor:"pointer",fontSize:13,fontWeight:600}} onClick={()=>setView("graphs")}>Graphs</button>
                <button style={{padding:"6px 14px",borderRadius:6,border:"none",background:view==="sla"?C.accent:"transparent",color:view==="sla"?C.white:C.text,cursor:"pointer",fontSize:13,fontWeight:600}} onClick={()=>setView("sla")}>Macmillan SLA</button>
              </div>
            </div>
            <div style={S.controls}>
              {view==="graphs"&&["DoD","WoW","MoM"].map(g=>(
                <button key={g} style={S.toggle(gran===g)} onClick={()=>setGran(g)}>{g}</button>
              ))}
              {view==="graphs"&&(
                <select style={S.select} value={selectedBucket||""} onChange={e=>setSelectedBucket(e.target.value)}>
                  {availableBuckets.map(b=>(<option key={b} value={b}>{bucketLabel(b,gran)}</option>))}
                </select>
              )}
              {view==="graphs"&&(
                <button style={{...S.btn,background:"#7C3AED",color:"#fff",border:"1px solid #9333EA"}} disabled={generating||loading} onClick={async()=>{
                  setGenerating(true);
                  try{await generateSlides(gran,selectedBucket);}catch(err){alert("Slide generation failed: "+err.message);}finally{setGenerating(false);}
                }} title="Generate PPTX Slides">
                  {generating?"\u23F3 Generating...":"\uD83D\uDCCA Generate Slides"}
                </button>
              )}
              {view==="graphs"&&<button style={S.btn} onClick={()=>setSettingsOpen(true)} title="Target Settings">&#9881;&#65039;</button>}
              <button style={S.btn} onClick={()=>loadData(true)} disabled={loading} title="Force refresh from HubSpot">
                {loading?"\u23F3":"\uD83D\uDD04"} Refresh
              </button>
              {lastRefresh&&<span style={S.badge}>Data from {lastRefresh.toLocaleTimeString()}</span>}
              {authUser&&(
                <span style={{display:"flex",alignItems:"center",gap:6,marginLeft:8}}>
                  {authUser.photo&&<img src={authUser.photo} alt="" style={{width:22,height:22,borderRadius:"50%"}}/>}
                  <span style={{fontSize:11,color:C.muted}}>{authUser.name||authUser.email}</span>
                  <a href="/auth/logout" style={{fontSize:11,color:C.accent,textDecoration:"none",marginLeft:4}}>Logout</a>
                </span>
              )}
            </div>
          </div>

          {error&&(
            <div style={{margin:"16px 24px",padding:"12px 16px",background:"rgba(231,76,60,0.15)",border:`1px solid ${C.red}`,borderRadius:8,color:C.red,fontSize:13}}>{error}</div>
          )}

          {view==="sla"&&<MacmillanSLATable deals={deals} stageLabels={stageLabels}/>}

          {view==="graphs"&&<>
          {/* Row 1a: Drafts Completed — New vs Old metric */}
          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-1" title="Total Drafts Completed per Drafter (New Metric)" infoText={INFO.chart1} columns={T_COLS.c1} rows={c1Table.rows} detailMap={c1Table.detailMap} detailCols={T_DCOLS.c1} csvName={`drafts_completed_new_${gran}_${selectedBucket}.csv`}>
              <Chart1 deals={standardDeals} gran={gran} bucket={selectedBucket} standardTarget={standardTarget} overrides={overrides}/>
            </ChartCard>
            <ChartCard chartId="chart-1b" title="Total Drafts Completed per Drafter (Old Metric)" infoText={INFO.chart1b} columns={T_COLS.c1} rows={c1bTable.rows} detailMap={c1bTable.detailMap} detailCols={T_DCOLS.c1} csvName={`drafts_completed_old_${gran}_${selectedBucket}.csv`}>
              <Chart1b deals={standardDeals} gran={gran} bucket={selectedBucket} standardTarget={standardTarget} overrides={overrides}/>
            </ChartCard>
          </div>

          {/* Row 1b: Avg Turnaround */}
          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-2" title="Average Turnaround Days per Drafter (Standard)" infoText={INFO.chart2} columns={T_COLS.c2} rows={c2Table.rows} detailMap={c2Table.detailMap} detailCols={T_DCOLS.c2} csvName={`turnaround_days_${gran}_${selectedBucket}.csv`}>
              <Chart2 deals={standardDeals} gran={gran} bucket={selectedBucket}/>
            </ChartCard>
          </div>

          {/* Row 2: Drafting trends (time series) */}
          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-6" title={"Drafting \u2014 Productivity & Avg Turnaround (Standard)"} infoText={INFO.chart6} columns={T_COLS.c6} rows={c6Table.rows} detailMap={c6Table.detailMap} detailCols={T_DCOLS.c6} csvName={`drafting_productivity_${gran}.csv`}>
              <Chart6 deals={standardDeals} gran={gran}/>
            </ChartCard>
            <ChartCard chartId="chart-4" title={"Drafting Query Rate \u2014 Trend"} infoText={INFO.chart4} columns={T_COLS.c4} rows={c4Table.rows} detailMap={c4Table.detailMap} detailCols={T_DCOLS.c4} csvName={`query_rate_${gran}.csv`}>
              <Chart4 deals={deals} gran={gran}/>
            </ChartCard>
          </div>

          {/* Row 2b: Drafting Pipeline Flow */}
          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-12" title={"Drafting \u2014 Pipeline Flow (Entered / Exited / Backlog)"} infoText={INFO.chart12} columns={T_COLS.c12} rows={c12Table.rows} detailMap={c12Table.detailMap} detailCols={T_DCOLS.c12} csvName={`drafting_pipeline_flow_${gran}.csv`}>
              <Chart12 deals={deals} gran={gran}/>
            </ChartCard>
          </div>

          {/* Row 3: Drafting query heatmap (full width) */}
          <div style={{padding:"0 24px 16px"}}>
            <ChartCard chartId="chart-7" title={"Drafting Query Rate per Drafter"} infoText={INFO.chart7} columns={c7Table.cols||T_COLS.c7} rows={c7Table.rows} detailMap={c7Table.detailMap} detailCols={T_DCOLS.c7} csvName={`query_rate_per_drafter_${gran}.csv`} csvBuilder={c7CsvBuilder}>
              <Chart7 deals={standardDeals} gran={gran}/>
            </ChartCard>
          </div>

          {/* ── URGENT DRAFTING ── */}

          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-8" title={"Productivity & Avg Turnaround (Urgent)"} infoText={INFO.chart8} columns={T_COLS.c8} rows={c8Table.rows} detailMap={c8Table.detailMap} detailCols={T_DCOLS.c8} csvName={`urgent_productivity_${gran}.csv`}>
              <Chart8 deals={urgentDeals} gran={gran}/>
            </ChartCard>
            <ChartCard chartId="chart-9" title="Avg Turnaround per Drafter (Urgent)" infoText={INFO.chart9} columns={T_COLS.c9} rows={c9Table.rows} detailMap={c9Table.detailMap} detailCols={T_DCOLS.c9} csvName={`urgent_turnaround_${gran}_${selectedBucket}.csv`}>
              <Chart9 deals={urgentDeals} gran={gran} bucket={selectedBucket}/>
            </ChartCard>
          </div>

          {/* ── AMENDMENTS ── */}
          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-10" title={"Productivity & Avg Turnaround (Amendments)"} infoText={INFO.chart10} columns={T_COLS.c10} rows={c10Table.rows} detailMap={c10Table.detailMap} detailCols={T_DCOLS.c10} csvName={`amendments_productivity_${gran}.csv`}>
              <Chart10 deals={deals} gran={gran}/>
            </ChartCard>
            <ChartCard chartId="chart-11" title="Avg Turnaround Days per Drafter (Amendments)" infoText={INFO.chart11} columns={T_COLS.c11} rows={c11Table.rows} detailMap={c11Table.detailMap} detailCols={T_DCOLS.c11} csvName={`amendment_turnaround_${gran}_${selectedBucket}.csv`}>
              <Chart11 deals={deals} gran={gran} bucket={selectedBucket}/>
            </ChartCard>
          </div>

          {/* ── PROOFREADING ── */}

          {/* Row 5a: Proofreading snapshot */}
          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-5" title="Proofread Completed & Backlog per Proofreader" infoText={INFO.chart5} columns={T_COLS.c5} rows={c5Table.rows} detailMap={c5Table.detailMap} detailCols={T_DCOLS.c5} csvName={`proofread_snapshot_${gran}_${selectedBucket}.csv`}>
              <Chart5 deals={standardDeals} gran={gran} bucket={selectedBucket} proofTarget={proofTarget} proofOverrides={proofOverrides}/>
            </ChartCard>
          </div>

          {/* Row 5b: Proofreading trends */}
          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-3" title={"Proofreading \u2014 Productivity & Avg Turnaround"} infoText={INFO.chart3} columns={T_COLS.c3} rows={c3Table.rows} detailMap={c3Table.detailMap} detailCols={T_DCOLS.c3} csvName={`proof_productivity_${gran}.csv`}>
              <Chart3 deals={standardDeals} gran={gran}/>
            </ChartCard>
          </div>

          {/* ── APPOINTMENT OUTCOME ── */}
          <div className="dash-row" style={S.row}>
            <ChartCard chartId="chart-13" title={"Appointment Outcome \u2014 Deals Entered"} infoText={INFO.chart13} columns={T_COLS.c13} rows={c13Table.rows} detailMap={c13Table.detailMap} detailCols={T_DCOLS.c13} csvName={`appointment_outcome_${gran}.csv`}>
              <Chart13 deals={deals} gran={gran}/>
            </ChartCard>
          </div>

          {/* ── DRAFTER ACTIVITY ── */}
          <HeatmapWithCard drafterNames={drafterNames} deals={deals}/>
          </>}

          <div style={S.footer}>{totalRaw} deals loaded &middot; Data range: {dateRange}</div>

          <SettingsPanel open={settingsOpen} onClose={()=>setSettingsOpen(false)}
            standardTarget={standardTarget} setStandardTarget={setStandardTarget}
            overrides={overrides} setOverrides={setOverrides} drafterNames={drafterNames}
            proofTarget={proofTarget} setProofTarget={setProofTarget}
            proofOverrides={proofOverrides} setProofOverrides={setProofOverrides} prooferNames={prooferNames}
            saveStatus={saveStatus} saveError={saveError}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
  </script>
</body>
</html>
