    // ─── Legacy Advisor — Macmillan Follow-Up Queue ────────────
    // Cohort: deals with Date of Appointment from the start of the calendar
    // month 7 months back from today, onwards — rolling forward by one month
    // every month. The 7-month floor (vs the 6-month SLA window itself)
    // gives a one-month tail so deals just past the SLA deadline still
    // appear long enough for the advisor to record the 3 calls.
    //
    // Additional filters: region IS NOT "Scotland" (only Scotland excluded;
    // blank/null and any other region qualify), the deal currently has a
    // draft in customer hands (either a workflow-stamped DWC/RFP entry
    // timestamp OR currently sitting in DWC / RDWC / RFP / Sent To Customer
    // — the second condition catches bulk-imported / migrated deals whose
    // entry timestamps never got populated), and the follow-up is still
    // unresolved. High-priority deals are included (same SLA applies).
    //
    // The stage-history filter (DWC / RFP) replaces the earlier hard-coded
    // Closed Lost exclusion. If a deal never reached drafting, there's no
    // will to follow up on — chasing it would just be noise. Conversely a
    // Closed Lost deal that DID reach drafting will reappear here until an
    // advisor records the final outcome via Macmillan Call N or the legacy
    // v2 outcome field.
    //
    // "Unresolved" means at least one of the three Macmillan Call N
    // properties is still blank AND the legacy v2 outcome field is empty.
    // (The legacy field is kept during transition so deals already marked
    // there don't re-appear in the queue.) The SLA is "3/3 calls done" —
    // the deal stays in the queue until every Call 1/2/3 field has a
    // recorded value (Yes or No, any combination). An early "Yes" on Call 1
    // does NOT drop the deal — the advisor is expected to record outcomes
    // for all three call slots so the SLA paper trail is complete.
    //
    // SLA: 6 calendar months from DoA. Status thresholds use calendar days
    // remaining to the deadline (DoA + 6 months):
    //   breached < 0  |  close ≤ 7  |  warning ≤ 21  |  comfortable > 21
    function MacmillanFollowUpTable({deals,stageLabels}){
      const[advisorFilter,setAdvisorFilter]=useState("__all__");
      // Cohort start: first day of the calendar month 7 months back from
      // today. Computed at component mount. Open-ended on the recent side —
      // any appointment from this date onwards is in scope.
      //
      // Why 7 not 6: the SLA window is 6 months from DoA, so deals whose
      // DoA was exactly 6 months ago are right at the breach line. A
      // 6-month floor would pop those deals off the queue the day the
      // calendar month rolls (e.g. on 1 Jun a deal with DoA 26 Nov 2025
      // would disappear even though the advisor still needs to record the
      // 3 calls for the audit trail). The 7-month floor gives a one-month
      // tail so just-breached deals remain visible long enough to be closed
      // out properly.
      const cohortWindow=useMemo(()=>{
        const today=new Date();
        const start=new Date(today.getFullYear(),today.getMonth()-7,1,0,0,0,0);
        const monthLabel=start.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
        return{start,monthLabel};
      },[]);

      const allRows=useMemo(()=>{
        const today=new Date();today.setHours(0,0,0,0);
        const out=[];
        // Stage IDs that mean "a draft has been sent to the customer or beyond" —
        // used as a fallback when workflow-stamped entry timestamps are missing
        // (typical of bulk-imported / migrated deals).
        const POST_DWC_STAGES=new Set(["1223620775","1223620776","1223620777","1223620778"]);
        deals.forEach(d=>{
          // Cohort filters
          if(!d.leadSources||!d.leadSources.includes("Macmillan"))return;
          // Exclude Scotland only; blank/null region is fine and stays in.
          if((d.region||"").trim()==="Scotland")return;
          // (Priority filter intentionally removed — High-priority Macmillan
          // deals follow the same 3-call SLA and need to be in this queue.)
          // Legacy field still used during transition — if it's set in the old
          // v2 property, the deal was already resolved before we split into
          // three call fields.
          if((d.macmillanFollowUpOutcome||"").trim()!=="")return;
          // New 3-call schema: drop deal from queue once ALL THREE Call N
          // fields have a recorded value (Yes or No, any combination). The
          // SLA isn't satisfied until "3/3 calls done", so a single Yes on
          // Call 1 doesn't end the obligation — the advisor still needs to
          // record outcomes for Calls 2 and 3 (typically "Yes" follow-ups
          // or "N/A — already signed" via a Yes).
          const c1=d.macmillanCall1||"";
          const c2=d.macmillanCall2||"";
          const c3=d.macmillanCall3||"";
          const filledCount=[c1,c2,c3].filter(v=>v==="yes"||v==="no").length;
          if(filledCount>=3)return;
          // Draft-exists gate. Include the deal if EITHER:
          //   (a) a workflow-stamped DWC / RFP entry timestamp is set, OR
          //   (b) the deal is currently sitting in a post-DWC stage (DWC /
          //       RDWC / RFP / Sent To Customer) — catches bulk-imported
          //       deals whose entry timestamps never got populated by the
          //       HubSpot workflow.
          // The point is "a draft exists" — either signal is sufficient.
          const hasDraft=d.firstDWC||d.firstRFP||POST_DWC_STAGES.has(d.dealstage);
          if(!hasDraft)return;
          if(!d.dateOfAppointment)return;
          const doa=new Date(d.dateOfAppointment);
          // Open-ended on the recent side: any appointment from the cohort
          // start onwards is in scope (more recent = more days remaining,
          // which is fine). Only drop deals with appointments older than the
          // 6-month-back floor.
          if(doa<cohortWindow.start)return;

          // SLA: deadline = DoA + 6 calendar months (local time).
          const deadline=new Date(doa.getFullYear(),doa.getMonth()+6,doa.getDate(),0,0,0,0);
          const deadlineMidnight=new Date(deadline);deadlineMidnight.setHours(0,0,0,0);
          const calDaysRemaining=Math.round((deadlineMidnight-today)/86400000);

          // Attempt accounting. An attempt has been made for any call that
          // has a recorded value (Yes or No). The queue can never display
          // 3/3 — that would have been dropped above — so attemptsMade is
          // always 0, 1, or 2 for visible rows.
          const attemptsMade=filledCount;
          // Next-action label drives advisor workflow.
          //   0 attempts → Call 1 due
          //   1 attempt  → Call 2 due
          //   2 attempts → Call 3 due
          const nextAction=`Call ${attemptsMade+1} due`;

          out.push({
            id:d.id,
            dealname:d.dealname,
            advisor:d.legacyAdvisor||"Unassigned",
            appointment:new Date(doa),
            deadline,
            calDaysRemaining,
            region:d.region||"",
            stage:(stageLabels&&stageLabels[d.dealstage])||d.dealstage||"—",
            call1:c1,
            call2:c2,
            call3:c3,
            attemptsMade,
            nextAction
          });
        });
        // Most urgent first: smallest days remaining = closest to / past
        // deadline. (Previously bubbled "exhausted" rows to the top, but
        // exhausted = 3/3 now drops the deal — so no longer needed.)
        out.sort((a,b)=>(a.calDaysRemaining??1e9)-(b.calDaysRemaining??1e9));
        return out;
      },[deals,cohortWindow,stageLabels]);

      const advisorOptions=useMemo(()=>{
        const set=new Set();
        allRows.forEach(r=>set.add(r.advisor));
        return Array.from(set).sort((a,b)=>{
          if(a==="Unassigned")return 1;
          if(b==="Unassigned")return -1;
          return a.localeCompare(b);
        });
      },[allRows]);

      const rows=useMemo(()=>(
        advisorFilter==="__all__"?allRows:allRows.filter(r=>r.advisor===advisorFilter)
      ),[allRows,advisorFilter]);

      // Per-day thresholds for the SLA countdown colouring.
      const statusFor=n=>{
        if(n==null)return"comfortable";
        if(n<0)return"breached";
        if(n<=7)return"close";
        if(n<=21)return"warning";
        return"comfortable";
      };
      const rowColor=n=>{
        const s=statusFor(n);
        return s==="breached"?C.red:s==="close"?C.amber:s==="warning"?"#F1C40F":C.green;
      };

      // Status counts for the summary tiles.
      const counts=useMemo(()=>{
        const c={breached:0,close:0,warning:0,comfortable:0};
        rows.forEach(r=>{c[statusFor(r.calDaysRemaining)]++;});
        return c;
      },[rows]);

      // Pretty-print a single call field for the table and CSV. Blank fields
      // get an em-dash; Yes/No are upper-cased for legibility.
      const fmtCall=v=>v==="yes"?"Yes":v==="no"?"No":"—";

      const exportCSV=useCallback(()=>{
        const hdr=["Deal ID","Deal Name","Legacy Advisor","Region","Deal Stage","Date of Appointment","SLA Deadline (DoA + 6mo)","Cal Days Remaining","Call 1","Call 2","Call 3","Attempts Made","Next Action","HubSpot Link"];
        const lines=[hdr,...rows.map(r=>[
          r.id,r.dealname,r.advisor,r.region,r.stage,
          fmtDate(r.appointment),fmtDate(r.deadline),
          r.calDaysRemaining==null?"":r.calDaysRemaining,
          fmtCall(r.call1),fmtCall(r.call2),fmtCall(r.call3),
          `${r.attemptsMade}/3`,r.nextAction,
          HS_BASE+r.id
        ])];
        const adSuffix=advisorFilter==="__all__"?"":`_${advisorFilter.replace(/\s+/g,"_")}`;
        downloadCSV(`legacy_advisor_macmillan_followup${adSuffix}_${new Date().toISOString().slice(0,10)}.csv`,toCSV(lines));
      },[rows,advisorFilter]);

      const tile=(label,value,color)=>(
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",minWidth:120,flex:1}}>
          <div style={{fontSize:10,letterSpacing:1,textTransform:"uppercase",color:C.text,opacity:0.6,fontWeight:600}}>{label}</div>
          <div style={{fontSize:26,fontWeight:700,color,marginTop:4,lineHeight:1}}>{value}</div>
        </div>
      );

      return(
        <div style={{padding:"16px 24px"}}>
          <div style={{background:C.surface,borderRadius:12,padding:"20px 20px 16px",border:`1px solid ${C.border}`,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:14}}>
              <div>
                <div style={{color:C.white,fontSize:16,fontWeight:700}}>Macmillan Follow-Up Queue — appointments from {cohortWindow.monthLabel} onwards</div>
                <div style={{fontSize:12,color:C.text,opacity:0.7,marginTop:4}}>
                  Deals with Date of Appointment from {cohortWindow.monthLabel} onwards (rolling: 7 months back to give a one-month tail past the SLA), region is not "Scotland" (blank/null region also qualifies), the deal currently has a draft in customer hands (workflow-stamped DWC/RFP entry OR currently in DWC / RDWC / RFP / Sent To Customer — the latter catches migrated deals missing workflow stamps), and at least one of the three "Macmillan Call N" properties is still blank. The SLA is "3/3 calls done" — the deal stays in the queue until all three call fields have a recorded value (Yes or No), to ensure a full SLA paper trail. High-priority deals are included.
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <label style={{fontSize:12,color:C.text,opacity:0.7}}>Legacy Advisor</label>
                <select style={S.select} value={advisorFilter} onChange={e=>setAdvisorFilter(e.target.value)}>
                  <option value="__all__">All ({allRows.length})</option>
                  {advisorOptions.map(name=>(
                    <option key={name} value={name}>{name} ({allRows.filter(r=>r.advisor===name).length})</option>
                  ))}
                </select>
                <span style={{fontSize:12,color:C.text,opacity:0.7}}>{rows.length} deal{rows.length===1?"":"s"}</span>
                <button style={S.btn} onClick={exportCSV} disabled={!rows.length}>{"⬇"} CSV</button>
              </div>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {tile("Total in queue",rows.length,C.white)}
              {tile("Breached",counts.breached,C.red)}
              {tile("Close (≤7d)",counts.close,C.amber)}
              {tile("Warning (≤21d)",counts.warning,"#F1C40F")}
              {tile("Comfortable",counts.comfortable,C.green)}
            </div>
          </div>

          <div style={{background:C.surface,borderRadius:12,padding:"20px 20px 16px",border:`1px solid ${C.border}`}}>
            {rows.length===0?(
              <div style={{padding:"32px 16px",textAlign:"center",color:C.text,opacity:0.6,fontSize:13}}>{allRows.length===0?"No pending Macmillan follow-ups for appointments from "+cohortWindow.monthLabel+" onwards.":"No deals match the active filters."}</div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{borderBottom:`2px solid ${C.border}`,color:C.white,textAlign:"left"}}>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Deal Name</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Record ID</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Legacy Advisor</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Region</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Deal Stage</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Date of Appointment</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>SLA Deadline</th>
                      <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>Call 1</th>
                      <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>Call 2</th>
                      <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>Call 3</th>
                      <th style={{padding:"10px 12px",fontWeight:600,textAlign:"center"}}>Attempts</th>
                      <th style={{padding:"10px 12px",fontWeight:600}}>Next Action</th>
                      <th style={{padding:"10px 12px",fontWeight:600,textAlign:"right"}}>Days Remaining</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map(r=>{
                      // Each call cell gets a colour cue: green for Yes, amber
                      // for No (attempt logged but unresolved), faded for blank.
                      const callStyle=v=>({
                        padding:"10px 12px",
                        textAlign:"center",
                        fontWeight:v?700:400,
                        color:v==="yes"?C.green:v==="no"?C.amber:C.text,
                        opacity:v?1:0.5
                      });
                      return(
                        <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`}}>
                          <td style={{padding:"10px 12px"}}>
                            <a href={HS_BASE+r.id} target="_blank" rel="noopener noreferrer" style={{color:C.accent,textDecoration:"none"}}>{r.dealname}</a>
                          </td>
                          <td style={{padding:"10px 12px",fontFamily:"ui-monospace,SFMono-Regular,Menlo,monospace",fontSize:12,color:C.text,opacity:0.7}}>{r.id}</td>
                          <td style={{padding:"10px 12px"}}>{r.advisor}</td>
                          <td style={{padding:"10px 12px"}}>{r.region||"—"}</td>
                          <td style={{padding:"10px 12px"}}>{r.stage}</td>
                          <td style={{padding:"10px 12px"}}>{fmtDate(r.appointment)}</td>
                          <td style={{padding:"10px 12px"}}>{fmtDate(r.deadline)}</td>
                          <td style={callStyle(r.call1)}>{fmtCall(r.call1)}</td>
                          <td style={callStyle(r.call2)}>{fmtCall(r.call2)}</td>
                          <td style={callStyle(r.call3)}>{fmtCall(r.call3)}</td>
                          <td style={{padding:"10px 12px",textAlign:"center",fontWeight:600,color:C.text}}>{r.attemptsMade}/3</td>
                          <td style={{padding:"10px 12px",color:C.text}}>{r.nextAction}</td>
                          <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:rowColor(r.calDaysRemaining)}}>
                            {r.calDaysRemaining==null?"—":r.calDaysRemaining<0?`${r.calDaysRemaining}d (breached)`:`${r.calDaysRemaining}d`}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Dashboard(){
      const[loading,setLoading]=useState(true);
      const[error,setError]=useState(null);
      const[deals,setDeals]=useState([]);
      const[lastRefresh,setLastRefresh]=useState(null);
      const[totalRaw,setTotalRaw]=useState(0);
      const[dealExclusions,setDealExclusions]=useState({});
      const[gran,setGran]=useState("WoW");
      const[selectedBucket,setSelectedBucket]=useState(null);
      const[settingsOpen,setSettingsOpen]=useState(false);
      const[standardTarget,setStandardTarget]=useState(DEFAULT_STANDARD_TARGET);
      const[overrides,setOverrides]=useState({...DEFAULT_OVERRIDES});
      const[proofTarget,setProofTarget]=useState(DEFAULT_PROOF_TARGET);
      const[proofOverrides,setProofOverrides]=useState({...DEFAULT_PROOF_OVERRIDES});
      const[generating,setGenerating]=useState(false);
      const[feedbackOpen,setFeedbackOpen]=useState(false);

      const[stageLabels,setStageLabels]=useState({});
      const[view,setView]=useState("graphs");

      const[targetsLoaded,setTargetsLoaded]=useState(false);
      const[saveStatus,setSaveStatus]=useState("idle"); // idle | saving | saved | error
      const[saveError,setSaveError]=useState(null);

      // Check auth status on mount
      useEffect(()=>{
        fetch("/api/user").then(r=>r.json()).then(d=>{
          if(d.authenticated)setAuthUser(d.user);
        }).catch(()=>{});
      },[]);

      // Load persisted targets from Google Sheets on mount
      useEffect(()=>{
        fetch("/api/targets").then(r=>r.json()).then(d=>{
          if(d&&d.drafting){
            if(Number.isFinite(d.drafting.default))setStandardTarget(d.drafting.default);
            if(d.drafting.overrides)setOverrides(d.drafting.overrides);

            if(d.proofreading.overrides)setProofOverrides(d.proofreading.overrides);
          }

         .finally(()=>setTargetsLoaded(true));
      },[]);

      // Explicit-save model: the user has to click "Save" in the Settings
      // panel to push to the Google Sheet. No auto-save means the dashboard
      // won't silently overwrite manual sheet edits. See saveTargets below.
      const saveTargets=useCallback(()=>{
        setSaveStatus("saving");setSaveError(null);
        return fetch("/api/targets",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            drafting:{default:standardTarget,overrides},
            proofreading:{default:proofTarget,overrides:proofOverrides}
          })
        }).then(async r=>{
          if(!r.ok){const e=await r.json().catch(()=>({error:r.statusText}));throw new Error(e.error||"Save failed");}
          setSaveStatus("saved");
          setTimeout(()=>setSaveStatus(prev=>prev==="saved"?"idle":prev),2000);
        }).catch(err=>{
          setSaveStatus("error");setSaveError(err.message||String(err));
        });
      },[standardTarget,overrides,proofTarget,proofOverrides]);

      // Refetch targets from the sheet whenever Settings opens so the panel
      // always reflects the latest values (other admins / manual sheet edits
      // are picked up automatically). Discards any in-progress unsaved edits
      // when reopening — fine for now since saves are explicit.
      useEffect(()=>{
        if(!settingsOpen)return;
        fetch("/api/targets").then(r=>r.json()).then(d=>{
          if(d&&d.drafting){
            if(Number.isFinite(d.drafting.default))setStandardTarget(d.drafting.default);
            if(d.drafting.overrides)setOverrides(d.drafting.overrides);
          }
          if(d&&d.proofreading){
            if(Number.isFinite(d.proofreading.default))setProofTarget(d.proofreading.default);
            if(d.proofreading.overrides)setProofOverrides(d.proofreading.overrides);
          }
          setSaveStatus("idle");setSaveError(null);
        }).catch(e=>console.error("Failed to reload targets on Settings open:",e));
      },[settingsOpen]);

      // ── load data via server (serves from cache, or fetches fresh) ──
      const loadData=useCallback(async(force)=>{
        setLoading(true);setError(null);
        try{
          const result=await fetchDealsFromAPI(force);
          const rawDeals=result.deals||[];
          const ownerMap=result.ownerMap||{};
          const draftingOpts=result.draftingOwnerOptions||{};
          const proofOpts=result.proofOwnerOptions||{};
          const queryReasonOpts=result.queryReasonOptions||{};
          const urgentReasonOpts=result.urgentReasonOptions||{};
          const amendmentSourceOpts=result.amendmentSourceOptions||{};
          const leadSourceOpts=result.leadSourceOptions||{};
          const consultantQueryReasonOpts=result.consultantQueryReasonOptions||{};
          const legacyAdvisorOpts=result.legacyAdvisorOptions||{};
          const waiverOpts=result.waiverOptions||{};
          const stageLbls=result.stageLabels||{};
          const exclusions=result.dealExclusions||{};
          setDealExclusions(exclusions);
          setTotalRaw(rawDeals.length);
          setDraftingOwnerOpts(draftingOpts);
          setStageLabels(stageLbls);
          setDeals(processDeals(rawDeals,ownerMap,draftingOpts,proofOpts,queryReasonOpts,urgentReasonOpts,amendmentSourceOpts,leadSourceOpts,consultantQueryReasonOpts,legacyAdvisorOpts,waiverOpts,exclusions,result.doNotUseStageIds||[],result.leadSourceTier3Options||{},result.productOptions||{},result.slaBreachReasonOptions||{},result.regionOptions||{},result.macmillanFollowUpOptions||{}));
          const cachedAt=result._cachedAt?new Date(Number(result._cachedAt)):new Date();
          setLastRefresh(cachedAt);
        }catch(err){
          setError(err.message||String(err));
        }finally{setLoading(false);}
      },[]);

      // ── auto-load on mount + refresh every hour ────────────────
      useEffect(()=>{
        loadData();
        const interval=setInterval(()=>{loadData();},3600000);
        return()=>clearInterval(interval);
      },[loadData]);

      const availableBuckets=useMemo(()=>{
        const set=new Set();
        deals.forEach(d=>{
          if(d.exitedDrafting)set.add(dateToBucket(d.exitedDrafting,gran));
          if(d.exitedProofreading)set.add(dateToBucket(d.exitedProofreading,gran));
        });
        return[...set].sort().reverse();
      },[deals,gran]);

      useEffect(()=>{
        if(availableBuckets.length&&(!selectedBucket||!availableBuckets.includes(selectedBucket)))
          setSelectedBucket(availableBuckets[0]);
      },[availableBuckets,selectedBucket]);

      // ── split deals by priority ──────────────────────────────────
      const standardDeals=useMemo(()=>deals.filter(d=>!d.isUrgent),[deals]);
      const urgentDeals=useMemo(()=>deals.filter(d=>d.isUrgent),[deals]);

      const drafterNames=useMemo(()=>{
        // Count deals per drafter, then filter out numeric IDs and low-volume names
        const counts={};
        deals.forEach(d=>{
          if(!d.drafterName||d.drafterName==="Unknown")return;
          // Skip purely numeric names (unresolved owner IDs)
          if(/^\d+$/.test(d.drafterName))return;
          counts[d.drafterName]=(counts[d.drafterName]||0)+1;
        });
        // Only include drafters with 5+ deals (filters test/inactive)
        return Object.entries(counts).filter(([,c])=>c>=5).map(([n])=>n).sort();
      },[deals]);

      const prooferNames=useMemo(()=>{
        const counts={};
        deals.forEach(d=>{
          if(!d.prooferName||d.prooferName==="Unknown")return;
          if(/^\d+$/.test(d.prooferName))return;
          counts[d.prooferName]=(counts[d.prooferName]||0)+1;
        });
        return Object.entries(counts).filter(([,c])=>c>=3).map(([n])=>n).sort();
      },[deals]);

      const dateRange=useMemo(()=>{
        let min=Infinity,max=-Infinity;
        deals.forEach(d=>{
          [d.enteredDrafting,d.exitedDrafting,d.enteredProofreading,d.exitedProofreading].forEach(dt=>{
            if(dt){if(dt.getTime()<min)min=dt.getTime();if(dt.getTime()>max)max=dt.getTime();}
          });
        });
        if(min===Infinity)return"No data";
        return`${new Date(min).toLocaleDateString()} \u2014 ${new Date(max).toLocaleDateString()}`;
      },[deals]);

      // ── table data for standard charts (c1–c7) ─────────────────
      // c1: "Total Drafts Completed per Drafter" — includes BOTH standard
      // AND urgent (Priority = High) deals. "Total" in the chart title is
      // intentional: high-priority drafts are still drafts and count toward
      // each drafter's weekly productivity.
      const c1Table=useMemo(()=>{
        const mult=gran==="DoD"?1/5:gran==="MoM"?4.33:1;
        // Two-cohort bucket — see Chart1 for the equivalent breakdown logic.
        const groups={}; // drafter → { full: [...], partial: [...] }
        deals.forEach(d=>{
          if(!d.drafterName||d.drafterName==="Unknown"||/^\d+$/.test(d.drafterName))return;
          if(d.exitedDrafting&&dateToBucket(d.exitedDrafting,gran)===selectedBucket){
            (groups[d.drafterName]=groups[d.drafterName]||{full:[],partial:[]}).full.push(d);
            return;
          }
          if((d.dealstage===RP_STAGE_ID||d.dealstage===AP_STAGE_ID)&&d.nativeExitedDrafting){
            if(dateToBucket(d.nativeExitedDrafting,gran)===selectedBucket){
              (groups[d.drafterName]=groups[d.drafterName]||{full:[],partial:[]}).partial.push(d);
            }
          }
        });
        // Pre-seed partial-target drafters (override < standard) with empty
        // groups so they appear in the table even with zero completions —
        // matches the Chart1 behaviour.
        Object.keys(overrides).forEach(name=>{
          if(overrides[name]<standardTarget&&!(name in groups)){
            groups[name]={full:[],partial:[]};
          }
        });
        const rows=Object.entries(groups)
          .filter(([name,g])=>(g.full.length+g.partial.length)>=1||(overrides[name]!==undefined&&overrides[name]<standardTarget))
          .map(([name,g])=>{
            const total=g.full.length+g.partial.length;
            const t=Math.round((overrides[name]??standardTarget)*mult);
            return{_key:name,name,full:g.full.length,partial:g.partial.length,count:total,target:t,status:perfLabel(perfState(total,t))};
          })
          .sort((a,b)=>b.count-a.count);
        const detailMap={};
        rows.forEach(r=>{
          const g=groups[r._key];
          const fullRows=g.full.map(d=>({id:d.id,dealname:d.dealname,date:fmtDate(d.exitedDrafting),state:"Completed"}));
          const partialRows=g.partial.map(d=>({id:d.id,dealname:d.dealname,date:fmtDate(d.nativeExitedDrafting),state:"In proofreading"}));
          detailMap[r._key]=[...fullRows,...partialRows];
        });
        return{rows,detailMap};
      },[deals,gran,selectedBucket,standardTarget,overrides]);

      // ── c1b: Old metric — Total Drafts Completed per Drafter (Exit DI) ──
      const c1bTable=useMemo(()=>{
        const mult=gran==="DoD"?1/5:gran==="MoM"?4.33:1;const groups={};
        standardDeals.forEach(d=>{if(!d.exitedDraftingOld||dateToBucket(d.exitedDraftingOld,gran)!==selectedBucket)return;if(!d.drafterName||d.drafterName==="Unknown"||/^\d+$/.test(d.drafterName))return;(groups[d.drafterName]=groups[d.drafterName]||[]).push(d);});
        const rows=Object.entries(groups).filter(([,a])=>a.length>=1).map(([name,arr])=>{const t=Math.round((overrides[name]??standardTarget)*mult);return{_key:name,name,count:arr.length,target:t,status:perfLabel(perfState(arr.length,t))};}).sort((a,b)=>b.count-a.count);
        const detailMap={};rows.forEach(r=>{detailMap[r._key]=groups[r._key].map(d=>({id:d.id,dealname:d.dealname,date:fmtDate(d.exitedDraftingOld)}));});
        return{rows,detailMap};
      },[standardDeals,gran,selectedBucket,standardTarget,overrides]);

      const c2Table=useMemo(()=>{
        const groups={};
        standardDeals.forEach(d=>{if(!d.exitedDrafting||d.draftingTurnaroundDays==null||dateToBucket(d.exitedDrafting,gran)!==selectedBucket)return;if(!d.drafterName||d.drafterName==="Unknown"||/^\d+$/.test(d.drafterName))return;(groups[d.drafterName]=groups[d.drafterName]||[]).push(d);});
        const rows=Object.entries(groups).filter(([,a])=>a.length>=1).map(([name,arr])=>{const avg=parseFloat((arr.reduce((s,d)=>s+d.draftingTurnaroundDays,0)/arr.length).toFixed(0));return{_key:name,name,avg:avg+"d",count:arr.length};}).sort((a,b)=>parseFloat(b.avg)-parseFloat(a.avg));
        const detailMap={};rows.forEach(r=>{detailMap[r._key]=groups[r._key].map(d=>({id:d.id,dealname:d.dealname,start:fmtDate(d.draftingStart),exit:fmtDate(d.exitedDrafting),days:d.draftingTurnaroundDays!=null?d.draftingTurnaroundDays.toFixed(0)+"d":"—"}));});
        return{rows,detailMap};
      },[standardDeals,gran,selectedBucket]);

      const c3Table=useMemo(()=>{
        const now=new Date();const pb=gran==="DoD"?25:gran==="WoW"?10:8;const bkts=[];
        for(let i=pb-1;i>=0;i--){const d=new Date(now);if(gran==="DoD")d.setDate(d.getDate()-i);else if(gran==="WoW")d.setDate(d.getDate()-i*7);else d.setMonth(d.getMonth()-i);bkts.push(dateToBucket(d,gran));}
        const seen=new Set();const uniq=bkts.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});
        const comp={};standardDeals.forEach(d=>{if(!d.enteredProofreading||!d.exitedProofreading||d.proofreadingTurnaroundDays==null)return;const b=dateToBucket(d.exitedProofreading,gran);(comp[b]=comp[b]||[]).push(d);});
        const enteredByPeriod={};standardDeals.forEach(d=>{if(!d.enteredProofreading)return;const b=dateToBucket(d.enteredProofreading,gran);(enteredByPeriod[b]=enteredByPeriod[b]||[]).push(d);});
        const rows=uniq.map(bucket=>{const arr=comp[bucket]||[];const avg=arr.length?parseFloat((arr.reduce((s,d)=>s+d.proofreadingTurnaroundDays,0)/arr.length).toFixed(0)):null;
          const enteredArr=enteredByPeriod[bucket]||[];
          return{_key:bucket,label:bucketLabel(bucket,gran),avgTurnaround:avg!=null?avg+"d":"—",entered:enteredArr.length,completed:arr.length};});
        const detailMap={};uniq.forEach(b=>{detailMap[b]=(enteredByPeriod[b]||[]).map(d=>({id:d.id,dealname:d.dealname,entered:fmtDate(d.enteredProofreading),exited:fmtDate(d.exitedProofreading),days:d.proofreadingTurnaroundDays!=null?d.proofreadingTurnaroundDays.toFixed(0)+"d":"—"}));});
        return{rows,detailMap};
      },[standardDeals,gran]);

      const c4Table=useMemo(()=>{
        const now=new Date();const pb=gran==="DoD"?25:gran==="WoW"?10:8;const bkts=[];
        for(let i=pb-1;i>=0;i--){const d=new Date(now);if(gran==="DoD")d.setDate(d.getDate()-i);else if(gran==="WoW")d.setDate(d.getDate()-i*7);else d.setMonth(d.getMonth()-i);bkts.push(dateToBucket(d,gran));}
        const seen=new Set();const uniq=bkts.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});
        // Methodology cutover: 22/04/2026 — see Chart4 for details.
        const CUTOVER_DATE=new Date(Date.UTC(2026,3,22));
        const isNewLogic=b=>bucketStartDate(b,gran)>=CUTOVER_DATE;
        const totals={};const qd={};
        deals.forEach(d=>{
          if(d.exitedProofreading){
            const b=dateToBucket(d.exitedProofreading,gran);
            totals[b]=(totals[b]||0)+1;
            if(!isNewLogic(b)&&d.queryReasons.length&&!d.queryExcluded){(qd[b]=qd[b]||[]).push(d);}
          }
          if(d.firstQueryDate&&d.queryReasons.length>0&&!d.queryExcluded){
            const b=dateToBucket(d.firstQueryDate,gran);
            if(isNewLogic(b)){(qd[b]=qd[b]||[]).push(d);}
          }
        });
        const rows=uniq.map(bucket=>{const total=totals[bucket]||0;const queriedArr=qd[bucket]||[];const queried=queriedArr.length;const rate=total>0?parseFloat(Math.min((queried/total)*100,100).toFixed(0)):null;
          return{_key:bucket,label:bucketLabel(bucket,gran),rate:rate!=null?rate+"%":"—",total,queried};});
        const detailMap={};uniq.forEach(b=>{detailMap[b]=(qd[b]||[]).map(d=>({id:d.id,dealname:d.dealname,queryDate:fmtDate(d.firstQueryDate),reasons:d.queryReasons.join(", ")||"—"}));});
        return{rows,detailMap};
      },[deals,gran]);

      const c5Table=useMemo(()=>{
        const mult=gran==="DoD"?1/5:gran==="MoM"?4.33:1;
        const endOfPeriod=selectedBucket?bucketEndDate(selectedBucket,gran):new Date();
        const groups={};const backlogCounts={};
        standardDeals.forEach(d=>{
          if(d.exitedProofreading&&dateToBucket(d.exitedProofreading,gran)===selectedBucket&&d.prooferName&&d.prooferName!=="Unknown"&&!/^\d+$/.test(d.prooferName)){
            (groups[d.prooferName]=groups[d.prooferName]||[]).push(d);
          }
          if(d.enteredProofreading&&d.enteredProofreading<=endOfPeriod&&(!d.exitedProofreading||d.exitedProofreading>endOfPeriod)){
            const name=d.prooferName&&d.prooferName!=="Unknown"&&!/^\d+$/.test(d.prooferName)?d.prooferName:"Unassigned";
            backlogCounts[name]=(backlogCounts[name]||0)+1;
          }
        });
        const allNames=new Set([...Object.keys(groups),...Object.keys(backlogCounts)]);
        const rows=Array.from(allNames).map(name=>{const arr=groups[name]||[];const t=Math.round((proofOverrides[name]??proofTarget)*mult);return{_key:name,name,count:arr.length,backlog:backlogCounts[name]||0,target:t,status:perfLabel(perfState(arr.length,t))};}).sort((a,b)=>b.count-a.count);
        const detailMap={};rows.forEach(r=>{detailMap[r._key]=(groups[r._key]||[]).map(d=>({id:d.id,dealname:d.dealname,date:fmtDate(d.exitedProofreading)}));});
        return{rows,detailMap};
      },[standardDeals,gran,selectedBucket,proofTarget,proofOverrides]);

      const c6Table=useMemo(()=>{
        const now=new Date();const pb=gran==="DoD"?25:gran==="WoW"?10:8;const bkts=[];
        for(let i=pb-1;i>=0;i--){const d=new Date(now);if(gran==="DoD")d.setDate(d.getDate()-i);else if(gran==="WoW")d.setDate(d.getDate()-i*7);else d.setMonth(d.getMonth()-i);bkts.push(dateToBucket(d,gran));}
        const seen=new Set();const uniq=bkts.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});
        const comp={};standardDeals.forEach(d=>{if(!d.exitedDrafting)return;const b=dateToBucket(d.exitedDrafting,gran);(comp[b]=comp[b]||[]).push(d);});
        const rows=uniq.map(bucket=>{const arr=comp[bucket]||[];const wd=arr.filter(d=>d.draftingTurnaroundDays!=null);const avg=wd.length?parseFloat((wd.reduce((s,d)=>s+d.draftingTurnaroundDays,0)/wd.length).toFixed(0)):null;
          return{_key:bucket,label:bucketLabel(bucket,gran),drafted:arr.length,avgTurnaround:avg!=null?avg+"d":"—"};});
        const detailMap={};uniq.forEach(b=>{detailMap[b]=(comp[b]||[]).map(d=>({id:d.id,dealname:d.dealname,start:fmtDate(d.draftingStart),exit:fmtDate(d.exitedDrafting),days:d.draftingTurnaroundDays!=null?d.draftingTurnaroundDays.toFixed(0)+"d":"—"}));});
        return{rows,detailMap};
      },[standardDeals,gran]);

      const c7Table=useMemo(()=>{
        const now=new Date();const pb=gran==="DoD"?25:gran==="WoW"?10:8;const bkts=[];
        for(let i=pb-1;i>=0;i--){const d=new Date(now);if(gran==="DoD")d.setDate(d.getDate()-i);else if(gran==="WoW")d.setDate(d.getDate()-i*7);else d.setMonth(d.getMonth()-i);bkts.push(dateToBucket(d,gran));}
        const seen=new Set();const uniq=bkts.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});
        // Methodology cutover: 22/04/2026 — see Chart4 for details.
        const CUTOVER_DATE=new Date(Date.UTC(2026,3,22));
        const isNewLogic=b=>bucketStartDate(b,gran)>=CUTOVER_DATE;
        const byPD={};const dTotals={};
        deals.forEach(d=>{
          if(!d.drafterName||d.drafterName==="Unknown"||/^\d+$/.test(d.drafterName))return;
          if(d.exitedProofreading){
            const b=dateToBucket(d.exitedProofreading,gran);const key=`${b}|${d.drafterName}`;
            if(!byPD[key])byPD[key]={total:0,queried:0,queriedDeals:[],allDeals:[]};
            byPD[key].total++;dTotals[d.drafterName]=(dTotals[d.drafterName]||0)+1;
            byPD[key].allDeals.push(d);
            if(!isNewLogic(b)&&d.queryReasons.length&&!d.queryExcluded){byPD[key].queried++;byPD[key].queriedDeals.push(d);}
          }
          if(d.firstQueryDate&&d.queryReasons.length>0&&!d.queryExcluded){
            const b=dateToBucket(d.firstQueryDate,gran);
            if(isNewLogic(b)){
              const key=`${b}|${d.drafterName}`;
              if(!byPD[key])byPD[key]={total:0,queried:0,queriedDeals:[],allDeals:[]};
              byPD[key].queried++;byPD[key].queriedDeals.push(d);
            }
          }
        });
        const activeDrafters=Object.entries(dTotals).filter(([,c])=>c>=10).map(([n])=>n).sort();
        const cols=[{key:"label",label:"Period"}].concat(activeDrafters.map(n=>({key:n,label:n})));
        const rows=uniq.map(bucket=>{
          const row={_key:bucket,label:bucketLabel(bucket,gran)};
          activeDrafters.forEach(name=>{const pd=byPD[`${bucket}|${name}`];row[name]=pd&&pd.total>=1?Math.min((pd.queried/pd.total)*100,100).toFixed(0)+"%":"—";});
          return row;
        });
        const detailMap={};uniq.forEach(b=>{
          const allDealsForPeriod=[];
          activeDrafters.forEach(name=>{const pd=byPD[`${b}|${name}`];if(pd)pd.allDeals.forEach(d=>{
            const bucketIsNew=isNewLogic(b);
            const isQueried=bucketIsNew?!!d.firstQueryDate&&dateToBucket(d.firstQueryDate,gran)===b&&d.queryReasons.length>0&&!d.queryExcluded:d.queryReasons.length>0&&!d.queryExcluded;
            allDealsForPeriod.push({id:d.id,dealname:d.dealname,drafter:name,queried:isQueried?"Yes":"No",queryDate:fmtDate(d.firstQueryDate),reasons:d.queryExcluded?`(Excluded — ${d.queryExcludedOriginalDrafter||"original drafter deactivated"})`:d.queryReasons.join(", ")||"—"});
          });});
          // Sort: queried deals first, then by drafter name
          allDealsForPeriod.sort((a,b)=>a.queried===b.queried?a.drafter.localeCompare(b.drafter):(a.queried==="Yes"?-1:1));
          detailMap[b]=allDealsForPeriod;
        });
        return{rows,detailMap,cols,byPD,activeDrafters,uniq};
      },[deals,gran]);

      const c7CsvBuilder=useCallback(()=>{
        const hdr=["Period","Drafter","Query Rate %","Deals Exited Proofreading","Queried Deals","Deal Name","First Query Date","HubSpot Link","Query Reasons"];
        const lines=[hdr];
        (c7Table.uniq||[]).forEach(bucket=>{
          (c7Table.activeDrafters||[]).forEach(name=>{
            const pd=c7Table.byPD[`${bucket}|${name}`];
            if(!pd||pd.queried===0)return;
            const rate=pd.total>0?Math.min((pd.queried/pd.total)*100,100).toFixed(0)+"%":"—";
            pd.queriedDeals.forEach(d=>{
              lines.push([bucketLabel(bucket,gran),name,rate,pd.total,pd.queried,d.dealname||d.id,fmtDate(d.firstQueryDate),HS_BASE+d.id,d.queryReasons.join(", ")||""]);
            });
          });
        });
        return toCSV(lines);
      },[c7Table,gran]);

      // ── table data for urgent charts (c8, c9) ────────────────
      const c8Table=useMemo(()=>{
        const now=new Date();const pb=gran==="DoD"?25:gran==="WoW"?10:8;const bkts=[];
        for(let i=pb-1;i>=0;i--){const d=new Date(now);if(gran==="DoD")d.setDate(d.getDate()-i);else if(gran==="WoW")d.setDate(d.getDate()-i*7);else d.setMonth(d.getMonth()-i);bkts.push(dateToBucket(d,gran));}
        const seen=new Set();const uniq=bkts.filter(b=>{if(seen.has(b))return false;seen.add(b);return true;});

    // Rendered when the URL path is /tv. Polls /api/tv-deals every 5 min.

    function TVDashboard(){
      const[deals,setDeals]=useState([]);

      const[loading,setLoading]=useState(true);
      const[error,setError]=useState(null);

      const loadData=useCallback(async()=>{
        try{
          const res=await fetch("/api/tv-deals");
          if(!res.ok)throw new Error("Request failed");
          const result=await res.json();
          const rawDeals=result.deals||[];
          const ownerMap=result.ownerMap||{};
          const dOpts=result.draftingOwnerOptions||{};
          setDraftingOpts(dOpts);
          setDeals(processDeals(
            rawDeals,ownerMap,dOpts,
            result.proofOwnerOptions||{},
            result.queryReasonOptions||{},
            result.urgentReasonOptions||{},

            result.legacyAdvisorOptions||{},
            result.waiverOptions||{},
            result.dealExclusions||{},
            result.doNotUseStageIds||[],
            result.leadSourceTier3Options||{},
            result.productOptions||{},
            result.slaBreachReasonOptions||{},
            result.regionOptions||{},
            result.macmillanFollowUpOptions||{}

    // ─── Audit Dashboard (SLA compliance report at /audit) ─────
    // Authenticated standalone view. Reports deals whose End SLA date
    // (earliest of original Drafts With Customer / original Ready For Printing)
    // falls in the selected range, comparing actual working days from
    // Date of Appointment against the per-priority SLA target (20 working
    // days for standard, 3 working days for urgent).
    function AuditDashboard({embedded=false,sharedDeals=null,sharedLastRefresh=null}={}){
      // Embedded mode: rendered inside the main Dashboard (Reporting sidebar).
      // - Skips its own header/page chrome (parent provides them)
      // - Optionally reuses the parent Dashboard's already-fetched deals via
      //   `sharedDeals` so the audit view appears instantly when toggled and
      //   doesn't re-hit the API. Falls back to its own fetch when running
      //   standalone at /audit (sharedDeals === null).
      const[deals,setDeals]=useState(sharedDeals||[]);
      const[loading,setLoading]=useState(!sharedDeals);
      const[error,setError]=useState(null);
      const[lastRefresh,setLastRefresh]=useState(sharedLastRefresh||null);

      // Default: previous calendar month (single-month range by default).
      const today=new Date();
      const prevMonth=new Date(today.getFullYear(),today.getMonth()-1,1);
      const toYearMonth=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const defaultMonth=toYearMonth(prevMonth);
      const[fromMonth,setFromMonth]=useState(defaultMonth);
      const[toMonth,setToMonth]=useState(defaultMonth);
      // The audit is always scoped to a specific cohort (Macmillan or Coral) —
      // no mixed-cohort view because Macmillan and Coral have different SLA
      // rules and the aggregate would be meaningless. Default is Macmillan;
      // clicking a pill switches exclusively to that cohort.
      const[leadFilter,setLeadFilter]=useState(()=>new Set(["Macmillan"]));
      // Tab selector for the bottom-of-page table view. Only Drafting is
      // meaningful for Coral mode; EPA + CS are Macmillan-specific. The
      // useEffect below resets the active tab to Drafting if the user
      // switches to Coral while EPA/CS is selected.
      const[auditTab,setAuditTab]=useState("drafting");
      // Product filter is only meaningful in Coral mode (Will / LPA buckets).
      // We clear it automatically when leaving Coral mode (see effect below).
      const[productFilter,setProductFilter]=useState(()=>new Set());

      // Convert "YYYY-MM" to first / last instant of the month for inclusive
      // range comparison.
      const monthStart=ym=>{const[y,m]=ym.split("-").map(Number);return new Date(y,m-1,1,0,0,0,0);};
      const monthEnd=ym=>{const[y,m]=ym.split("-").map(Number);return new Date(y,m,0,23,59,59,999);};

      const loadData=useCallback(async()=>{
        setLoading(true);setError(null);
        try{
          const res=await fetch("/api/deals");
          if(!res.ok)throw new Error("Failed to fetch deals");
          const result=await res.json();
          setDeals(processDeals(
            result.deals||[],
            result.ownerMap||{},
            result.draftingOwnerOptions||{},
            result.proofOwnerOptions||{},
            result.queryReasonOptions||{},
            result.urgentReasonOptions||{},
            result.amendmentSourceOptions||{},
            result.leadSourceOptions||{},
            result.consultantQueryReasonOptions||{},
            result.legacyAdvisorOptions||{},
            result.waiverOptions||{},
            result.dealExclusions||{},
            result.doNotUseStageIds||[],
            result.leadSourceTier3Options||{},
            result.productOptions||{},
            result.slaBreachReasonOptions||{},
            result.regionOptions||{},
            result.macmillanFollowUpOptions||{}
          ));
          setLastRefresh(result._cachedAt?new Date(Number(result._cachedAt)):new Date());
        }catch(e){setError(e.message||String(e));}
        finally{setLoading(false);}
      },[]);

      // Standalone /audit: fetch on mount. Embedded: reuse sharedDeals
      // from parent Dashboard (kept in sync via the effect below).
      useEffect(()=>{if(!embedded)loadData();},[loadData,embedded]);
      useEffect(()=>{if(embedded&&sharedDeals){setDeals(sharedDeals);setLoading(false);}},[embedded,sharedDeals]);
      useEffect(()=>{if(embedded&&sharedLastRefresh)setLastRefresh(sharedLastRefresh);},[embedded,sharedLastRefresh]);

      // Build audit rows: deals that have completed (reached DWC or RFP)
      // and whose End date falls in [fromMonth, toMonth] (inclusive of both
      // full months — first instant of fromMonth → last instant of toMonth).
      const allRows=useMemo(()=>{
        const start=fromMonth?monthStart(fromMonth):null;
        const end=toMonth?monthEnd(toMonth):null;
        const out=[];
        deals.forEach(d=>{
          if(!d.dateOfAppointment)return;
          // Skip deals that have ever sat in a "DO NOT USE" pipeline stage (e.g.
          // the archived "DO NOT USE - Will Appointments" pipeline). Those deals
          // were reallocated into Estate Planning via workflow, so their Date of
          // Appointment refers to the original cycle — not the current EP cycle —
          // and the working-day calculation would be meaningless.
          if(d.wasInDoNotUse)return;
          // Skip deals that never entered Drafting Instructions (Estate Planning) — they
          // were either reallocated from another pipeline by a workflow (e.g. moved straight
          // to Will Verified or Amendment Requested) or are amendment-only deals. The audit
          // measures the standard drafting SLA, not those edge-case journeys.
          if(!d.origEnteredDrafting&&!d.enteredDrafting)return;
          // End = earliest of firstDWC, firstRFP, firstSentToCustomer
          const candidates=[];
          // Use the earliest of FIRST-entry estimates across the three completion stages.
          // firstDWC / firstRFP / firstSentToCustomer prefer the workflow-stamped
          // original_date_entered_<stage> when populated, and fall back to
          // (latest hs_v2_date_entered − cumulative_time_in) as an upper-bound
          // estimate when the original_* property is missing.
          if(d.firstDWC)candidates.push(d.firstDWC.getTime());
          if(d.firstRFP)candidates.push(d.firstRFP.getTime());
          if(d.firstSentToCustomer)candidates.push(d.firstSentToCustomer.getTime());
          if(!candidates.length)return;
          const endDate=new Date(Math.min(...candidates));
          if(start&&endDate<start)return;
          if(end&&endDate>end)return;
          // Base startDay (DoA) — used for Coral's 42 cal-day SLA and as a
          // floor for the standard SLA's anchor when no waiver applies.
          const startDay=new Date(d.dateOfAppointment);startDay.setHours(0,0,0,0);
          const endDay=new Date(endDate);endDay.setHours(0,0,0,0);

          // "Management Sign Off" exception (unchanged) — see comment below.
          const isMSOReason=r=>/management\s*sign[-\s]*off/i.test(String(r||"").trim());
          const isMSOOnly=d.isUrgent&&Array.isArray(d.urgentReason)&&d.urgentReason.length>0&&d.urgentReason.every(isMSOReason);
          const slaIsUrgent=d.isUrgent&&!isMSOOnly;

          // 14-day waiver — anchor shift, not extension. When the customer
          // hasn't signed, the SLA clock starts at the waiver expiry, not
          // at DoA. Up to that point the customer can still back out, so
          // measuring drafting time before then doesn't make sense. The
          // effective startDay shifts forward to the later of (DoA,
          // waiverAnchor).
          //
          //   waiverAnchor = waiver_expiry_date (when populated)
          //                OR origEnteredDrafting + 14 calendar days
          //                   (fallback when expiry date is missing)
          //
          // Urgent deals: not affected by waiver (rush jobs override the
          // grace-period concept).
          let effectiveStartDay=startDay;
          if(!slaIsUrgent&&d.waiverSigned14d===false){
            let waiverAnchor=null;
            if(d.waiverExpiryDate){
              waiverAnchor=new Date(d.waiverExpiryDate);
              waiverAnchor.setHours(0,0,0,0);
            }else if(d.origEnteredDrafting){
              waiverAnchor=new Date(new Date(d.origEnteredDrafting).getTime()+14*86400000);
              waiverAnchor.setHours(0,0,0,0);
            }
            if(waiverAnchor&&waiverAnchor>startDay)effectiveStartDay=waiverAnchor;
          }

          // Working days from the effective anchor to end. This is the
          // SLA-relevant duration; deals where the customer's waiver
          // window pushed the start later get less to deal with.
          const workingDays=endDay>=effectiveStartDay?(calcBusinessDaysUK(effectiveStartDay,endDay)||0):null;
          if(workingDays==null)return;
          // Calendar days for Coral SLA (still anchored at DoA — Coral
          // doesn't recognise the waiver as an anchor shift, see below).
          const calendarDays=Math.round((endDay-startDay)/86400000);

          // Standard target: 20wd for standard, 3wd for urgent. Waiver no
          // longer extends the target — it shifts the start instead. The
          // waiverExtension field carries the calendar days the anchor
          // moved forward (for badge display).
          const baseTarget=slaIsUrgent?3:20;
          const target=baseTarget;
          const waiverExtension=Math.round((effectiveStartDay-startDay)/86400000);
          const met=workingDays<=target;
          // Coral SLA: 42 calendar days from DoA to End. The 14-day waiver
          // extension applies: when the customer has NOT signed it, add
          // 14 calendar days to the Coral target. (Priority / urgent does
          // NOT adjust the Coral SLA per the source dbt model.)
          const coralBaseTarget=42;
          const coralWaiverExtension=d.waiverSigned14d===false?14:0;
          const coralTarget=coralBaseTarget+coralWaiverExtension;
          const coralMet=calendarDays<=coralTarget;
          // Cohort tagging: ep_lead_source covers Macmillan etc.; Coral is on
          // lead_source_tier_3 (substring match). Used by the filter pills.
          const isCoral=((d.leadSourceTier3||"").toLowerCase().includes("coral"));
          const baseCohorts=(d.leadSources&&d.leadSources.length)?d.leadSources.slice():[];
          if(isCoral&&!baseCohorts.includes("Coral"))baseCohorts.push("Coral");
          out.push({
            id:d.id,
            dealname:d.dealname,
            drafter:d.drafterName&&d.drafterName!=="Unknown"?d.drafterName:"Unassigned",
            leadSources:(d.leadSources&&d.leadSources.length)?d.leadSources:[""],
            leadSourceLabel:(d.leadSources&&d.leadSources.length)?d.leadSources.join(", "):"—",
            cohorts:baseCohorts,
            isCoral,
            hasWillProduct:!!d.hasWillProduct,
            hasLpaProduct:!!d.hasLpaProduct,
            isUrgent:slaIsUrgent,
            // Preserve the underlying flag so the CSV / drilldown can show
            // it (and so we can flip it back if someone asks why an MSO
            // deal isn't in the Urgent bucket).
            wasFlaggedUrgent:!!d.isUrgent,
            mgmtSignOffOnly:isMSOOnly,
            appointment:d.dateOfAppointment,
            endDate,
            workingDays,
            calendarDays,
            baseTarget,
            waiverExtension,
            // State flag for the "Waiver Unsigned" badge — set whenever the
            // customer hasn't signed even if the dynamic extension came
            // out to 0 (no expiry date populated AND fallback DI+14d <
            // standard target). Useful for spotting unsigned deals at a
            // glance even when no extension applies.
            waiverUnsigned:d.waiverSigned14d===false,
            target,
            coralBaseTarget,
            coralWaiverExtension,
            coralTarget,
            met,
            coralMet,
            status:met?"Met":"Breached",
            coralStatus:coralMet?"Met":"Breached",
            slaBreachReason:d.slaBreachReason||""
          });
        });
        out.sort((a,b)=>b.endDate-a.endDate);
        return out;
      },[deals,fromMonth,toMonth]);

      // Allowlist of lead sources that get surfaced as filter pills. Keeps
      // the audit focused on cohorts that have their own SLA. Add new
      // SLA-tracked sources here. Each cohort can have its own SLA logic
      // — see `filterMode` below.
      const AUDIT_LEAD_SOURCE_ALLOWLIST=["Macmillan","Coral"];
      const leadSourceOptions=useMemo(()=>{
        const seen=new Set();
        allRows.forEach(r=>(r.cohorts||[]).forEach(c=>{if(c)seen.add(c);}));
        return AUDIT_LEAD_SOURCE_ALLOWLIST.filter(ls=>seen.has(ls));
      },[allRows]);

      // When the Coral pill is the only active filter, swap the SLA engine:
      // 42 calendar days from DoA → End instead of 20 working days. Keeps
      // the rest of the audit shape identical so the page reads the same way.
      const filterMode=useMemo(()=>{
        if(leadFilter.size===1&&leadFilter.has("Coral"))return"coral";
        return"standard";
      },[leadFilter]);

      // Clear the product filter when leaving Coral mode — Will / LPA pills
      // are only shown in Coral mode so the filter would otherwise become
      // invisible-but-applied if the user switched back to standard.
      useEffect(()=>{if(filterMode!=="coral"&&productFilter.size>0)setProductFilter(new Set());},[filterMode,productFilter]);
      // EPA + CS tabs only apply to Macmillan. If user switches the lead
      // filter to Coral while EPA/CS is active, snap back to Drafting.
      useEffect(()=>{if(!leadFilter.has("Macmillan")&&(auditTab==="epa"||auditTab==="cs"))setAuditTab("drafting");},[leadFilter,auditTab]);

      // Will / LPA pill options — only surfaced in Coral mode, and only when
      // at least one Coral deal has the corresponding product flag.
      const productOptions=useMemo(()=>{
        if(filterMode!=="coral")return[];
        const out=[];
        if(allRows.some(r=>r.isCoral&&r.hasWillProduct))out.push("Will");
        if(allRows.some(r=>r.isCoral&&r.hasLpaProduct))out.push("LPA");
        return out;
      },[allRows,filterMode]);

      const rows=useMemo(()=>{
        let filtered=allRows;
        if(leadFilter.size>0){
          filtered=allRows.filter(r=>(r.cohorts||[]).some(c=>leadFilter.has(c)));
        }
        if(filterMode==="coral"&&productFilter.size>0){
          filtered=filtered.filter(r=>
            (productFilter.has("Will")&&r.hasWillProduct)||
            (productFilter.has("LPA")&&r.hasLpaProduct)
          );
        }
        // Decorate each row with the active SLA's display fields so the table
        // and stats can read uniform field names regardless of cohort.
        return filtered.map(r=>{
          // Tri-state: a breached deal whose SLA Breach Reason is "N/A" (case-
          // insensitive, exact match) is "Excluded" — kept in the table for
          // audit trail but pulled out of the compliance % denominator. Met
          // deals are always Met regardless of breach reason.
          const reasonNA=((r.slaBreachReason||"").trim().toLowerCase()==="n/a");
          if(filterMode==="coral"){
            const displayMet=r.coralMet;
            const displayExcluded=!displayMet&&reasonNA;
            return{...r,
              displayDays:r.calendarDays,
              displayDaysUnit:"cal",
              displayTarget:r.coralTarget,
              displayTargetUnit:"cal",
              displayMet,
              displayExcluded,
              displayStatus:displayMet?"Met":(displayExcluded?"Excluded":"Breached")};
          }
          const displayMet=r.met;
          const displayExcluded=!displayMet&&reasonNA;
          return{...r,
            displayDays:r.workingDays,
            displayDaysUnit:"wd",
            displayTarget:r.target,
            displayTargetUnit:"wd",
            displayMet,
            displayExcluded,
            displayStatus:displayMet?"Met":(displayExcluded?"Excluded":"Breached")};
        });
      },[allRows,leadFilter,filterMode,productFilter]);

      const stats=useMemo(()=>{
        // Compliance denominators exclude N/A-reason breaches everywhere —
        // they're shown in a separate "Excluded" card but don't drag the % down.
        const total=rows.length;
        const met=rows.filter(r=>r.displayMet).length;
        const excluded=rows.filter(r=>r.displayExcluded).length;
        const breached=total-met-excluded;
        const eligibilityCount=arr=>arr.filter(r=>!r.displayExcluded).length;
        const standard=rows.filter(r=>!r.isUrgent);
        const urgent=rows.filter(r=>r.isUrgent);
        const stdMet=standard.filter(r=>r.displayMet).length;
        const urgMet=urgent.filter(r=>r.displayMet).length;
        const stdEligible=eligibilityCount(standard);
        const urgEligible=eligibilityCount(urgent);
        const stdPct=stdEligible>0?Math.round((stdMet/stdEligible)*100):null;
        const urgPct=urgEligible>0?Math.round((urgMet/urgEligible)*100):null;
        // Will / LPA cohorts (Coral only). A deal with both products counts
        // in both — matches the original SQL semantics for "Will & LPA" rows.
        const wills=rows.filter(r=>r.hasWillProduct);
        const lpas=rows.filter(r=>r.hasLpaProduct);
        const willsMet=wills.filter(r=>r.displayMet).length;
        const lpasMet=lpas.filter(r=>r.displayMet).length;
        const willsEligible=eligibilityCount(wills);
        const lpasEligible=eligibilityCount(lpas);
        const willsPct=willsEligible>0?Math.round((willsMet/willsEligible)*100):null;
        const lpasPct=lpasEligible>0?Math.round((lpasMet/lpasEligible)*100):null;
        return{total,met,breached,excluded,stdPct,urgPct,stdMet,urgMet,stdCount:standard.length,urgCount:urgent.length,stdEligible,urgEligible,
          willsCount:wills.length,willsMet,willsPct,willsEligible,lpasCount:lpas.length,lpasMet,lpasPct,lpasEligible};
      },[rows]);

      // ─── Macmillan phone-call SLA compliance ──────────────────
      // SLA: outcome confirmed within 6 months of Date of Appointment via
      // up to 3 call attempts. Compliant when EITHER:
      //   - At least one Macmillan Call N = "Yes" (signing confirmed,
      //     further attempts unnecessary), OR
      //   - All three Macmillan Call N = "No" (full 3-attempt effort
      //     logged — we did everything we could).
      // Anything else (some blanks with no Yes recorded) is a breach.
      //
      // Intentionally looser than the queue's "all 3 fields filled" rule.
      // The queue forces the paper trail to be complete (advisors must
      // record Calls 2/3 even after an early Yes), but the AUDIT measures
      // whether the SLA outcome was achieved. A deal can be Compliant
      // here while still sitting in the queue waiting for trailing
      // outcome entries.
      //
      // Sub-stats:
      //   - "via Yes":     compliant deals with at least one Call N = Yes
      //   - "via 3 No's":  compliant deals where all three Call N = No
      //
      // Cohort filters mirror the Macmillan Follow-Up Queue: Macmillan lead
      // source, region ≠ Scotland, and "a draft exists" (workflow-stamped
      // DWC/RFP entry OR currently in DWC / RDWC / RFP / Sent To Customer,
      // to catch bulk-imported deals missing entry timestamps).
      // High-priority deals are included — same 3-call SLA applies.
      //
      // The audit's "End SLA Month" picker filters deals by their SLA
      // DEADLINE (DoA + 6 months) falling in the selected range — matching
      // how the drafting tiles work, where the picker scopes by when the
      // SLA was concluded. So "May 2026" surfaces deals with DoA Nov 2025
      // (their 6mo deadline lands in May 2026), not deals with DoA in May
      // (whose deadlines are still in the future).
      //
      // Additional gate: the deadline must be ≤ today (the SLA window has
      // fully closed) so we don't judge deals that still have time left.
      //
      // The legacy v2 outcome field is deliberately ignored — only the new
      // macmillan_call_1/2/3 properties count toward compliance.
      const macmillanCallStats=useMemo(()=>{
        if(!leadFilter.has("Macmillan"))return null;
        const today=new Date();today.setHours(0,0,0,0);
        const start=fromMonth?monthStart(fromMonth):null;
        const end=toMonth?monthEnd(toMonth):null;
        // Same draft-exists relaxation as the queue: workflow timestamps OR
        // currently in a post-DWC stage. Keeps audit population aligned with
        // queue population.
        const POST_DWC_STAGES=new Set(["1223620775","1223620776","1223620777","1223620778"]);
        let total=0,withYes=0,with3Nos=0;
        deals.forEach(d=>{
          if(!(d.leadSources||[]).includes("Macmillan"))return;
          if(!d.dateOfAppointment)return;
          if((d.region||"").trim()==="Scotland")return;
          // (Priority filter intentionally removed — High-priority Macmillan
          // deals follow the same 3-call SLA, same as in the queue.)
          const hasDraft=d.firstDWC||d.firstRFP||POST_DWC_STAGES.has(d.dealstage);
          if(!hasDraft)return;
          // Filter by SLA DEADLINE (DoA + 6 months) falling in the audit's
          // selected month range — matches how the drafting tiles work
          // ("End SLA Month" = when the SLA was concluded). Previously this
          // filtered by DoA in range, which meant "May 2026" never showed
          // any deals (their 6mo deadlines would still be in the future).
          const doa=new Date(d.dateOfAppointment);
          const deadline=new Date(doa.getFullYear(),doa.getMonth()+6,doa.getDate());
          deadline.setHours(0,0,0,0);
          if(start&&deadline<start)return;
          if(end&&deadline>end)return;
          // Only judge deals whose SLA window has actually closed (deadline
          // in the past). Future deadlines mean the deal still has time to
          // become compliant; counting them now would be premature.
          if(deadline>today)return;
          total++;
          const c1=d.macmillanCall1||"";
          const c2=d.macmillanCall2||"";
          const c3=d.macmillanCall3||"";
          // Compliant = at least one Yes (SLA met early) OR all three
          // Nos (full 3-attempt effort logged). This is the SLA outcome
          // rule per Ops, intentionally looser than the queue's "all 3
          // fields filled" rule — the queue forces the paper trail to
          // be complete, the audit measures whether the SLA was met.
          //
          // The legacy `confirmed_will_has_been_signed__macmillan__v2`
          // field counts too: if it's set to "Yes", credit the deal as
          // Compliant via Yes. This covers deals resolved before the
          // new Macmillan Call N schema rolled out — no need to backfill
          // their Call 1 just to get audit credit.
          const legacyYes=(d.macmillanFollowUpOutcome||"").trim().toLowerCase()==="yes";
          const hasYes=legacyYes||c1==="yes"||c2==="yes"||c3==="yes";
          const allNos=c1==="no"&&c2==="no"&&c3==="no";
          if(hasYes)withYes++;
          else if(allNos)with3Nos++;
        });
        const compliant=withYes+with3Nos;
        const breached=total-compliant;
        const pct=total>0?Math.round((compliant/total)*100):null;
        return{total,compliant,breached,withYes,with3Nos,pct};
      },[deals,fromMonth,toMonth,leadFilter]);

      // ─── Macmillan Service KPIs (Rows 4, 5, 7, 8 from the Macmillan
      // reporting spreadsheet) ──────────────────────────────────────
      // Cohort: Macmillan deals with createdate (= referral arrival) in
      // the selected End SLA Month range. Note: a third interpretation
      // of the date picker — drafting tiles use End date, phone-call
      // tile uses DoA + 6mo deadline, these use createdate. Section
      // header and tooltips call this out so users aren't confused.
      //
      // Sub-contractor mapping for Row 8: Thomas Bradley / Squiggle /
      // Adrian Gallagher / Lacuna are specific HubSpot owners. Anything
      // else (including "Unknown" / blank) buckets to OL (in-house).
      // Match is case-insensitive on the drafterName so minor casing
      // differences in HubSpot don't break the bucket.
      //
      // Row 6 (5-working-day rule between calls) intentionally skipped
      // for now — needs engagement-level data, deferred.
      const MACMILLAN_SUBCONTRACTORS=["Thomas Bradley","Squiggle","Adrian Gallagher","Lacuna"];
      const macmillanKPIs=useMemo(()=>{
        if(!leadFilter.has("Macmillan"))return null;
        const start=fromMonth?monthStart(fromMonth):null;
        const end=toMonth?monthEnd(toMonth):null;
        // Each KPI tracks total in cohort + count that failed.
        let k4Total=0,k4Fail=0;     // Row 4: initial contact > 3 days in Pending
        let k5Total=0,k5Fail=0;     // Row 5: urgent > 2 days in Pending
        let k6Total=0,k6Fail=0;     // Row 6: both stage exits populated (pass) — see below
        let k7Total=0,k7Fail=0;     // Row 7: no first-connected-call ever
        const subcontractorCounts={"OL":0};
        MACMILLAN_SUBCONTRACTORS.forEach(name=>{subcontractorCounts[name]=0;});

        const matchSub=drafter=>{
          if(!drafter||drafter==="Unknown"||/^\d+$/.test(drafter))return "OL";
          const dl=drafter.trim().toLowerCase();
          for(const sub of MACMILLAN_SUBCONTRACTORS){
            if(dl===sub.toLowerCase()||dl.includes(sub.toLowerCase()))return sub;
          }
          return "OL";
        };

        deals.forEach(d=>{
          if(!(d.leadSources||[]).includes("Macmillan"))return;
          if(!d.createDate)return;
          if(start&&d.createDate<start)return;
          if(end&&d.createDate>end)return;

          // Row 4 — every Macmillan deal in the cohort is in scope.
          // Fails when cumulative time in Pending - Macmillan > 3 days.
          k4Total++;
          if(d.pendingMacmillanDays!=null&&d.pendingMacmillanDays>3)k4Fail++;

          // Row 5 — urgent deals only. Same Pending-time anchor, > 2 days.
          // Spreadsheet treats `hs_priority = HIGH` OR a populated
          // urgent_request_reason as "urgent" for this row.
          const isUrgentForKPI=d.isUrgent||(Array.isArray(d.urgentReason)&&d.urgentReason.length>0);
          if(isUrgentForKPI){
            k5Total++;
            if(d.pendingMacmillanDays!=null&&d.pendingMacmillanDays>2)k5Fail++;
          }

          // Row 6 — Two further call attempts within 5 working days. The
          // spreadsheet's pass condition (per Ops): BOTH `hs_v2_date_exited
          // _112034598` (Pending - Macmillan exit) AND `hs_v2_date_exited
          // _1230854698` (Attempting to contact exit) are populated. The
          // logic: if both stages have been exited then the workflow ran
          // the deal through the full callback journey, implying ≥2 call
          // attempts were logged. Fail otherwise. Note: the literal "5
          // working days" SLA isn't directly checked — the existence of
          // both stage exits is a structural proxy for "the workflow saw
          // this deal through within the allowed time" (the workflow
          // wouldn't have advanced it past those stages otherwise).
          k6Total++;
          if(!d.pendingExitedDate||!d.attemptingExitedDate)k6Fail++;

          // Row 7 — Follow-up email if customer still unreached.
          // Pass condition (per Ops): BOTH `hs_v2_date_exited_112034598`
          // (Pending - Macmillan exit) is populated AND
          // `customer_email__macmillan_` is non-blank. Fail otherwise.
          k7Total++;
          if(!d.pendingExitedDate||!d.customerEmailMacmillan)k7Fail++;

          // Row 8 — count deals by sub-contractor (drafterName).
          const bucket=matchSub(d.drafterName);
          subcontractorCounts[bucket]=(subcontractorCounts[bucket]||0)+1;
        });

        const pctFail=(fail,total)=>total>0?Math.round((fail/total)*100):null;
        const subBuckets=Object.entries(subcontractorCounts)
          .map(([name,count])=>({name,count}))
          .sort((a,b)=>b.count-a.count);
        return{
          k4:{total:k4Total,fail:k4Fail,pct:pctFail(k4Fail,k4Total)},
          k5:{total:k5Total,fail:k5Fail,pct:pctFail(k5Fail,k5Total)},
          k6:{total:k6Total,fail:k6Fail,pct:pctFail(k6Fail,k6Total)},
          k7:{total:k7Total,fail:k7Fail,pct:pctFail(k7Fail,k7Total)},
          subBuckets,
          totalInCohort:k4Total
        };
      },[deals,fromMonth,toMonth,leadFilter]);

      // ─── EPA tab rows ────────────────────────────────────────────
      // Per-deal version of the Macmillan Service KPIs. Cohort matches
      // macmillanKPIs (Macmillan + createdate in range). Each row shows
      // Met / Failed / N/A for KPI 4, KPI 5, KPI 6, and KPI 7. KPI 5 only
      // applies to urgent deals — non-urgent rows get N/A there. KPI 4 /
      // 6 / 7 apply to every deal in the cohort.
      const epaRows=useMemo(()=>{
        if(!leadFilter.has("Macmillan"))return[];
        const start=fromMonth?monthStart(fromMonth):null;
        const end=toMonth?monthEnd(toMonth):null;
        const out=[];
        deals.forEach(d=>{
          if(!(d.leadSources||[]).includes("Macmillan"))return;
          if(!d.createDate)return;
          if(start&&d.createDate<start)return;
          if(end&&d.createDate>end)return;
          const isUrgentForKPI=d.isUrgent||(Array.isArray(d.urgentReason)&&d.urgentReason.length>0);
          const k4Status=d.pendingMacmillanDays==null?"N/A":(d.pendingMacmillanDays>3?"Failed":"Met");
          const k5Status=!isUrgentForKPI?"N/A":(d.pendingMacmillanDays==null?"N/A":(d.pendingMacmillanDays>2?"Failed":"Met"));
          // KPI 6 (Row 6) — pass requires BOTH stage exits populated. See
          // macmillanKPIs comment for the rationale.
          const k6Status=(d.pendingExitedDate&&d.attemptingExitedDate)?"Met":"Failed";
          // KPI 7 — pass requires Pending exit populated AND a captured
          // customer email. See macmillanKPIs comment.
          const k7Status=(d.pendingExitedDate&&d.customerEmailMacmillan)?"Met":"Failed";
          out.push({
            id:d.id,
            dealname:d.dealname,
            drafter:d.drafterName&&d.drafterName!=="Unknown"?d.drafterName:"Unassigned",
            createDate:d.createDate,
            pendingMacmillanDays:d.pendingMacmillanDays,
            isUrgent:isUrgentForKPI,
            firstConnectedCallDate:d.firstConnectedCallDate,
            pendingExitedDate:d.pendingExitedDate,
            attemptingExitedDate:d.attemptingExitedDate,
            customerEmailMacmillan:d.customerEmailMacmillan,
            k4Status,k5Status,k6Status,k7Status
          });
        });
        out.sort((a,b)=>(b.createDate?.getTime?.()||0)-(a.createDate?.getTime?.()||0));
        return out;
      },[deals,fromMonth,toMonth,leadFilter]);

      // ─── CS tab rows ─────────────────────────────────────────────
      // Per-deal version of the Phone-Call SLA tile. Cohort matches
      // macmillanCallStats (Macmillan + deadline (DoA + 6mo) in range +
      // has draft + region ≠ Scotland + deadline ≤ today). Compliance:
      // any Yes → Met (Yes); all 3 Nos → Met (3 No); else → Breached.
      const csRows=useMemo(()=>{
        if(!leadFilter.has("Macmillan"))return[];
        const today=new Date();today.setHours(0,0,0,0);
        const start=fromMonth?monthStart(fromMonth):null;
        const end=toMonth?monthEnd(toMonth):null;
        const POST_DWC_STAGES=new Set(["1223620775","1223620776","1223620777","1223620778"]);
        const out=[];
        deals.forEach(d=>{
          if(!(d.leadSources||[]).includes("Macmillan"))return;
          if(!d.dateOfAppointment)return;
          if((d.region||"").trim()==="Scotland")return;
          const hasDraft=d.firstDWC||d.firstRFP||POST_DWC_STAGES.has(d.dealstage);
          if(!hasDraft)return;
          const doa=new Date(d.dateOfAppointment);
          const deadline=new Date(doa.getFullYear(),doa.getMonth()+6,doa.getDate());
          deadline.setHours(0,0,0,0);
          if(start&&deadline<start)return;
          if(end&&deadline>end)return;
          if(deadline>today)return;
          const c1=d.macmillanCall1||"";
          const c2=d.macmillanCall2||"";
          const c3=d.macmillanCall3||"";
          // Legacy `confirmed_will_has_been_signed__macmillan__v2` = "Yes"
          // is treated as a compliant outcome — see macmillanCallStats
          // for the rationale (covers pre-new-schema deals).
          const legacyYes=(d.macmillanFollowUpOutcome||"").trim().toLowerCase()==="yes";
          const hasYes=legacyYes||c1==="yes"||c2==="yes"||c3==="yes";
          const allNos=c1==="no"&&c2==="no"&&c3==="no";
          const status=hasYes?"Met (Yes)":(allNos?"Met (3 No)":"Breached");
          out.push({
            id:d.id,
            dealname:d.dealname,
            legacyAdvisor:d.legacyAdvisor||"Unassigned",
            appointment:doa,
            deadline,
            call1:c1,call2:c2,call3:c3,
            legacyYes,
            willSignedLegacy:(d.macmillanFollowUpOutcome||"").trim(),
            status
          });
        });
        out.sort((a,b)=>b.deadline-a.deadline);
        return out;
      },[deals,fromMonth,toMonth,leadFilter]);

      // Exclusive selection — clicking a lead-source pill switches to it
      // and deselects everything else. We never allow an empty selection
      // because the audit needs a single SLA rule (Macmillan or Coral) to

      // CSV exports for the EPA + CS tabs (only meaningful in Macmillan mode).

                  </div>
                  {macmillanCallStats&&(
                    <div style={card} title="Macmillan phone-call SLA: outcome confirmed within 6 months of appointment via up to 3 calls. Compliant when ANY Macmillan Call N = 'Yes' (signing confirmed), OR the legacy 'confirmed_will_has_been_signed__macmillan__v2' = 'Yes' (pre-Call N schema deals), OR all three = 'No' (full 3-attempt effort logged). Some blanks with no Yes = breach. Looser than the queue's 'all 3 filled' rule on purpose: queue tracks paper-trail completion, audit measures SLA outcomes. The 'End SLA Month' picker filters by SLA DEADLINE (DoA + 6 months) — i.e. 'May 2026' = deals whose 6-month deadline landed in May (DoA Nov 2025). Same convention as the drafting compliance tiles.">

                      :"SLA = 20 working days for standard, 3 working days for urgent (Priority = High). Exception: deals flagged Urgent purely because Urgent Request Reason is \"Management Sign Off\" are treated as Standard (20 working days) — admin paperwork urgency isn't customer-driven time pressure. Those rows show an \"MSO → Standard\" badge. 14-day waiver: when the customer has NOT signed the waiver, the SLA clock STARTS at the waiver expiry date — anchor shifts forward, target stays 20wd. Waiver anchor = waiver_expiry_date if populated, else original_date_entered_drafting_instructions + 14 calendar days. Anchor only shifts forward (never earlier than DoA). Urgent SLA isn't affected by the waiver. End = earliest of \"Drafts With Customer\", \"Ready For Printing\", or \"Sent To Customer\". Working days exclude weekends and UK (England & Wales) bank holidays. Breached deals with SLA Breach Reason = N/A are flagged as Excluded and removed from compliance % calculations (still listed in the table for audit trail)."}
