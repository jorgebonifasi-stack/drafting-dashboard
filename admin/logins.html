<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Activity — Drafting Dashboard Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #1a1a1a; color: #ccc; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.4/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

    const C = {
      bg:"#1a1a1a", bgDarker:"#111", surface:"#242424",
      text:"#CCCCCC", white:"#FFFFFF", muted:"#888",
      grid:"#444", accent:"#3498DB", green:"#27AE60",
      red:"#E74C3C", amber:"#F39C12", border:"#333",
      bar:"#5DADE2", barFaded:"rgba(93,173,226,0.25)"
    };

    function fmtDateTime(iso){
      if(!iso)return"—";
      const d=new Date(iso);
      if(isNaN(d.getTime()))return iso;
      return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+", "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    }
    function daysBetween(a,b){return Math.floor((b-a)/86400000);}

    function StatCard({label,value,hint}){
      return(
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 20px 18px"}}>
          <div style={{fontSize:11,letterSpacing:1,textTransform:"uppercase",color:C.muted,fontWeight:600}}>{label}</div>
          <div style={{fontSize:34,fontWeight:700,color:C.white,marginTop:6,lineHeight:1}}>{value}</div>
          {hint&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>{hint}</div>}
        </div>
      );
    }

    function DarkTooltip({active,payload,label}){
      if(!active||!payload?.length)return null;
      return(
        <div style={{background:"#222",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.text}}>
          <div style={{fontWeight:600,color:C.white,marginBottom:4}}>{label}</div>
          {payload.map((p,i)=>(<div key={i} style={{color:p.color||C.text}}>{p.name}: {p.value}</div>))}
        </div>
      );
    }

    function App(){
      const[loading,setLoading]=useState(true);
      const[error,setError]=useState(null);
      const[logins,setLogins]=useState([]);

      useEffect(()=>{
        fetch("/api/logins").then(async r=>{
          if(!r.ok){const e=await r.json().catch(()=>({error:r.statusText}));throw new Error(e.error||"Request failed");}
          return r.json();
        }).then(d=>setLogins(d.logins||[]))
         .catch(e=>setError(e.message||String(e)))
         .finally(()=>setLoading(false));
      },[]);

      const stats=useMemo(()=>{
        const now=Date.now();
        const d7=now-7*86400000, d1=now-86400000;
        const valid=logins.filter(l=>l.timestamp&&!isNaN(new Date(l.timestamp).getTime()));
        const last7=valid.filter(l=>new Date(l.timestamp).getTime()>=d7).length;
        const last24=valid.filter(l=>new Date(l.timestamp).getTime()>=d1).length;
        const uniqueUsers=new Set(valid.map(l=>(l.email||"").toLowerCase()).filter(Boolean)).size;
        return{total:valid.length,uniqueUsers,last7,last24};
      },[logins]);

      const dailyChart=useMemo(()=>{
        const days=30;
        const now=new Date();now.setHours(0,0,0,0);
        const buckets={};
        for(let i=days-1;i>=0;i--){
          const d=new Date(now);d.setDate(d.getDate()-i);
          const key=d.toISOString().slice(0,10);
          const label=String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");
          buckets[key]={key,label,count:0};
        }
        logins.forEach(l=>{
          const ts=new Date(l.timestamp);
          if(isNaN(ts.getTime()))return;
          const key=ts.toISOString().slice(0,10);
          if(buckets[key])buckets[key].count++;
        });
        return Object.values(buckets);
      },[logins]);

      const recent=useMemo(()=>{
        return[...logins].sort((a,b)=>{
          const ta=new Date(a.timestamp).getTime()||0;
          const tb=new Date(b.timestamp).getTime()||0;
          return tb-ta;
        }).slice(0,100);
      },[logins]);

      return(
        <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Inter','Segoe UI',system-ui,sans-serif"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,padding:"20px 24px",background:C.bgDarker,borderBottom:`1px solid ${C.border}`}}>
            <div>
              <h1 style={{color:C.white,fontSize:20,fontWeight:700,margin:0}}>Login Activity <span style={{color:C.muted,fontWeight:400}}>— Drafting Dashboard Admin</span></h1>
            </div>
            <a href="/" style={{color:C.accent,textDecoration:"none",fontSize:13,fontWeight:500}}>{"\u2190 Back to dashboard"}</a>
          </div>

          <div style={{padding:"20px 24px"}}>
            {error&&<div style={{margin:"0 0 20px",padding:"12px 16px",background:"rgba(231,76,60,0.15)",border:`1px solid ${C.red}`,borderRadius:8,color:C.red,fontSize:13}}>{error}</div>}
            {loading?<div style={{padding:40,textAlign:"center",color:C.muted}}>Loading\u2026</div>:(
              <React.Fragment>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:16,marginBottom:24}}>
                  <StatCard label="Total logins" value={stats.total}/>
                  <StatCard label="Unique users" value={stats.uniqueUsers}/>
                  <StatCard label="Last 7 days" value={stats.last7}/>
                  <StatCard label="Last 24 hours" value={stats.last24}/>
                </div>

                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 20px 12px",marginBottom:24}}>
                  <div style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:2}}>Daily logins \u2014 Last 30 days</div>
                  <div style={{color:C.muted,fontSize:11,marginBottom:12}}>Count of sign-ins per day</div>
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={dailyChart} margin={{top:10,right:12,left:-8,bottom:4}}>
                      <CartesianGrid stroke={C.grid} strokeDasharray="3 3" vertical={false}/>
                      <XAxis dataKey="label" tick={{fill:C.text,fontSize:10}} axisLine={{stroke:C.grid}} interval={Math.floor(dailyChart.length/10)}/>
                      <YAxis tick={{fill:C.text,fontSize:11}} axisLine={{stroke:C.grid}} allowDecimals={false}/>
                      <Tooltip content={<DarkTooltip/>} cursor={{fill:"rgba(255,255,255,0.04)"}}/>
                      <Bar dataKey="count" name="Logins" fill={C.bar} radius={[4,4,0,0]} barSize={18}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{color:C.white,fontSize:14,fontWeight:600}}>Recent logins</div>
                    <div style={{color:C.muted,fontSize:11}}>Showing {recent.length} most recent</div>
                  </div>
                  {recent.length===0?(
                    <div style={{padding:"32px 12px",textAlign:"center",color:C.muted,fontSize:13}}>No logins recorded yet.</div>
                  ):(
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                        <thead>
                          <tr style={{borderBottom:`2px solid ${C.border}`,color:C.white,textAlign:"left"}}>
                            <th style={{padding:"10px 12px",fontWeight:600}}>When</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Email</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>Name</th>
                            <th style={{padding:"10px 12px",fontWeight:600}}>IP</th>
                          </tr>
                        </thead>
                        <tbody>
                          {recent.map((r,i)=>(
                            <tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
                              <td style={{padding:"10px 12px",whiteSpace:"nowrap"}}>{fmtDateTime(r.timestamp)}</td>
                              <td style={{padding:"10px 12px"}}>{r.email||"\u2014"}</td>
                              <td style={{padding:"10px 12px"}}>{r.name||"\u2014"}</td>
                              <td style={{padding:"10px 12px",color:C.muted,fontFamily:"monospace",fontSize:12}}>{r.ip||"\u2014"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
